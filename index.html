/* ============ MAGASINS PROCHES ============ */
.qg-stores-section {
  margin-top: 32px; padding: 28px;
  background: linear-gradient(135deg, #fff 0%, var(--paper-2) 100%);
  border: 1px solid var(--hair-light); border-radius: 12px;
  display: block !important;
}
.qg-stores-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 20px; margin-bottom: 0; flex-wrap: wrap;
}
.qg-stores-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; font-weight: 600;
  letter-spacing: 0.1em; color: var(--accent);
  margin-bottom: 8px;
}
.qg-stores-title {
  font-family: var(--font-display); font-size: 22px; font-weight: 700;
  letter-spacing: -0.02em; color: var(--ink); margin: 0 0 6px;
}
.qg-stores-sub {
  font-size: 13.5px; color: var(--t2-light);
  max-width: 56ch; margin: 0;
}
.qg-stores-cta {
  padding: 12px 22px;
  background: var(--ink); color: #fff;
  border: 0; border-radius: 6px; cursor: pointer;
  font-family: inherit; font-size: 13.5px; font-weight: 600;
  letter-spacing: -0.01em;
  transition: transform .12s, box-shadow .12s;
  flex-shrink: 0;
}
.qg-stores-cta:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(10,10,10,0.2); }
.qg-stores-body { margin-top: 24px; }
.qg-stores-loading {
  display: flex; align-items: center; gap: 12px;
  padding: 20px; color: var(--t2-light); font-size: 14px;
  font-family: 'JetBrains Mono', monospace; letter-spacing: 0.04em; text-transform: uppercase;
}
.qg-stores-spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--hair-light); border-top-color: var(--accent);
  border-radius: 50%; animation: qg-spin 0.7s linear infinite;
}
@keyframes qg-spin { to { transform: rotate(360deg); } }
.qg-stores-cities { padding: 16px 0; }
.qg-stores-cities-label {
  font-size: 13px; color: var(--t2-light); margin-bottom: 10px;
  font-weight: 500;
}
.qg-stores-city-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.qg-stores-city-chip {
  padding: 7px 14px;
  background: #fff; border: 1px solid var(--hair-light);
  border-radius: 4px; cursor: pointer;
  font-family: inherit; font-size: 13px; font-weight: 500;
  color: var(--t2-light);
  transition: all .15s;
}
.qg-stores-city-chip:hover {
  border-color: var(--accent); color: var(--accent); background: rgba(224,78,26,0.05);
}
.qg-stores-location {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 18px; background: #fff;
  border: 1px solid var(--hair-light); border-radius: 6px;
  margin-bottom: 16px; font-size: 13.5px; flex-wrap: wrap; gap: 10px;
}
.qg-stores-location b { color: var(--ink); }
.qg-stores-change {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase;
  background: transparent; border: 1px solid var(--hair-light);
  padding: 5px 10px; border-radius: 4px; cursor: pointer;
  color: var(--t2-light);
}
.qg-stores-change:hover { color: var(--accent); border-color: var(--accent); }
.qg-stores-grid {
  display: grid;
  /* minmax(0, 1fr) au lieu de 1fr → contenu trop long n'étend plus la colonne */
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 16px;
  align-items: start;
}
.qg-store-card {
  min-width: 0; /* CRITIQUE pour que le grid respecte la largeur */
  overflow: hidden;
}
/* Les longs noms de produits IA doivent wrap, pas overflow */
.qg-ia-product-row .qg-ia-product-name {
  word-break: break-word;
  overflow-wrap: anywhere;
}
.qg-ia-product-row .qg-ia-product-text {
  min-width: 0;
}
/* Responsive : 1 col en mobile, 2 cols en tablet, 3 cols desktop */
@media (max-width: 980px) {
  .qg-stores-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}
@media (max-width: 640px) {
  .qg-stores-grid { grid-template-columns: 1fr; }
}
@media (max-width: 980px) { .qg-stores-grid { grid-template-columns: 1fr; } }
.qg-store-card {
  background: #fff; border: 1px solid var(--hair-light);
  border-radius: 10px; padding: 18px;
  transition: border-color .15s, transform .15s, box-shadow .15s;
}
.qg-store-card:hover {
  border-color: var(--ink);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(10,10,10,0.08);
}
.qg-store-card-head {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 12px; margin-bottom: 12px;
}
.qg-store-pill {
  display: inline-block; padding: 3px 9px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  margin-bottom: 6px; border-radius: 3px;
}
.qg-store-name {
  font-family: var(--font-display); font-size: 15px; font-weight: 600;
  letter-spacing: -0.015em; color: var(--ink); margin-bottom: 3px;
  line-height: 1.25;
}
.qg-store-addr { font-size: 11.5px; color: var(--t3-light); line-height: 1.3; }
.qg-store-dist { text-align: right; flex-shrink: 0; }
.qg-store-dist .km {
  font-family: var(--font-display); font-size: 28px; font-weight: 700;
  letter-spacing: -0.04em; color: var(--ink); line-height: 1;
}
.qg-store-dist .lbl {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--t3-light); margin-top: 2px;
}
.qg-store-stats {
  display: flex; gap: 6px; flex-wrap: wrap;
  padding: 10px 0; border-top: 1px solid var(--hair-lighter);
  border-bottom: 1px dashed var(--hair-light); margin-bottom: 10px;
}
.qg-store-stat {
  font-size: 10.5px; font-weight: 600; padding: 2px 7px; border-radius: 3px;
  font-family: 'JetBrains Mono', monospace; letter-spacing: 0.02em;
}
.qg-store-stat.ok    { background: rgba(27,94,32,0.10); color: #1B5E20; }
.qg-store-stat.order { background: rgba(180,83,9,0.10); color: #B45309; }
.qg-store-stat.none  { background: rgba(124,45,45,0.10); color: #7C2D2D; }
.qg-store-items { padding: 4px 0 8px; display: flex; flex-direction: column; gap: 2px; }

/* Lignes cliquables (lien vers le magasin) */
.qg-store-item-row.clickable {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 10px; gap: 10px;
  font-size: 12px; text-decoration: none;
  border-radius: 6px;
  transition: background .15s, transform .15s, box-shadow .15s;
  position: relative;
}
.qg-store-item-row.clickable:hover {
  background: var(--paper-2);
  transform: translateX(2px);
}
.qg-store-item-row.clickable:hover .d { color: var(--ink); }
.qg-store-item-row.clickable:hover .qg-av-arrow { transform: translateX(3px); opacity: 1; }
.qg-store-item-row .d {
  color: var(--t2-light); line-height: 1.35;
  transition: color .15s; flex: 1;
}

/* ====================================================== *
 *   BADGES DISPONIBILITÉ — Premium, fluides, animés
 * ====================================================== */
.qg-av-badge {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 6px 14px 6px 7px;
  border-radius: 999px;
  font-family: 'Inter Tight', 'Inter', sans-serif;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
  white-space: nowrap;
  position: relative; flex-shrink: 0;
  animation: qg-badge-in .55s cubic-bezier(.34, 1.56, .64, 1) backwards;
  isolation: isolate; /* contient les z-index internes */
}
@keyframes qg-badge-in {
  0%   { opacity: 0; transform: scale(.6) translateY(4px); }
  60%  { opacity: 1; transform: scale(1.08); }
  100% { opacity: 1; transform: scale(1); }
}

.qg-av-icon {
  width: 20px; height: 20px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 50%; flex-shrink: 0;
  position: relative;
  z-index: 1;
}
.qg-av-text { line-height: 1; position: relative; z-index: 1; }
.qg-av-arrow {
  opacity: 0; transition: transform .25s var(--ease, cubic-bezier(.22,1,.36,1)), opacity .25s;
  margin-left: 2px;
  position: relative; z-index: 1;
}

/* ─── EN STOCK — gradient animé + check qui se dessine + halo respirant + sparkle ─── */
.qg-av-badge.ok {
  background: linear-gradient(110deg,
    #d1fae5 0%, #a7f3d0 25%, #ecfdf5 50%, #a7f3d0 75%, #d1fae5 100%);
  background-size: 240% 100%;
  color: #064e3b;
  box-shadow:
    0 1px 2px rgba(6,78,59,0.10),
    0 0 0 1px rgba(16,185,129,0.18) inset;
  animation:
    qg-badge-in .55s cubic-bezier(.34, 1.56, .64, 1) backwards,
    qg-shimmer-ok 3.2s ease-in-out infinite;
}
@keyframes qg-shimmer-ok {
  0%   { background-position: 240% 50%; }
  100% { background-position: -240% 50%; }
}

.qg-av-badge.ok .qg-av-icon {
  background: linear-gradient(135deg, #10b981 0%, #059669 100%);
  color: #fff;
  box-shadow:
    0 2px 6px rgba(16,185,129,0.45),
    0 0 0 2px rgba(255,255,255,0.85);
}

/* halo qui pulse en continu autour du badge */
.qg-av-badge.ok::before {
  content: ''; position: absolute; inset: -2px;
  border-radius: 999px; pointer-events: none;
  background: radial-gradient(closest-side, rgba(16,185,129,0.40), transparent 70%);
  filter: blur(6px);
  opacity: 0; z-index: 0;
  animation: qg-glow-pulse 2.6s ease-in-out infinite;
}
@keyframes qg-glow-pulse {
  0%, 100% { opacity: 0;    transform: scale(.92); }
  50%      { opacity: 0.55; transform: scale(1.06); }
}

/* ring qui s'étend depuis le centre de l'icône */
.qg-av-badge.ok::after {
  content: ''; position: absolute;
  width: 20px; height: 20px;
  left: 7px; top: 50%; transform: translateY(-50%);
  border-radius: 50%; pointer-events: none;
  box-shadow: 0 0 0 0 rgba(16,185,129,0.65);
  z-index: 0;
  animation: qg-ring-expand 2.4s ease-out infinite;
}
@keyframes qg-ring-expand {
  0%   { box-shadow: 0 0 0 0     rgba(16,185,129,0.55); }
  70%  { box-shadow: 0 0 0 12px  rgba(16,185,129,0);    }
  100% { box-shadow: 0 0 0 0     rgba(16,185,129,0);    }
}

/* Le check qui se dessine puis se redessine en boucle */
.qg-check-path {
  stroke-dasharray: 22;
  stroke-dashoffset: 22;
  animation: qg-draw-check 2.6s cubic-bezier(.22,1,.36,1) infinite;
}
@keyframes qg-draw-check {
  0%        { stroke-dashoffset: 22; }
  25%       { stroke-dashoffset: 0;  }
  75%       { stroke-dashoffset: 0;  }
  90%, 100% { stroke-dashoffset: 0;  }
}

/* Petite étincelle qui tourne autour du badge */
.qg-av-badge.ok .qg-sparkle {
  position: absolute; width: 3px; height: 3px;
  border-radius: 50%; background: #34d399;
  box-shadow: 0 0 6px 2px #6ee7b7;
  top: 0; left: 50%;
  transform-origin: 0 12px;
  z-index: 0;
  animation: qg-sparkle-orbit 3.8s linear infinite;
  opacity: 0.85;
}
@keyframes qg-sparkle-orbit {
  0%   { transform: rotate(0deg)   translateX(-50%); opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 1; }
  100% { transform: rotate(360deg) translateX(-50%); opacity: 0; }
}

/* ─── SUR COMMANDE — gradient ambre, dot qui pulse, shimmer plus lent ─── */
.qg-av-badge.order {
  background: linear-gradient(110deg, #fef3c7 0%, #fde68a 25%, #fffbeb 50%, #fde68a 75%, #fef3c7 100%);
  background-size: 240% 100%;
  color: #78350f;
  box-shadow:
    0 1px 2px rgba(120,53,15,0.10),
    0 0 0 1px rgba(217,119,6,0.20) inset;
  animation:
    qg-badge-in .55s cubic-bezier(.34, 1.56, .64, 1) backwards,
    qg-shimmer-order 4s ease-in-out infinite;
}
@keyframes qg-shimmer-order {
  0%   { background-position: 240% 50%; }
  100% { background-position: -240% 50%; }
}
.qg-av-badge.order .qg-av-icon {
  background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
  box-shadow:
    0 2px 6px rgba(245,158,11,0.45),
    0 0 0 2px rgba(255,255,255,0.85);
}
.qg-av-pulse {
  width: 8px; height: 8px; border-radius: 50%;
  background: #fff;
  animation: qg-pulse-dot 1.4s ease-in-out infinite;
}
@keyframes qg-pulse-dot {
  0%, 100% { transform: scale(1);    opacity: 1;   box-shadow: 0 0 0 0 rgba(255,255,255,0.7); }
  50%      { transform: scale(0.55); opacity: 0.7; box-shadow: 0 0 0 6px rgba(255,255,255,0); }
}

/* ─── INDISPO — rouge muté, statique mais propre ─── */
.qg-av-badge.none {
  background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
  color: #7f1d1d;
  box-shadow:
    0 1px 2px rgba(127,29,29,0.08),
    0 0 0 1px rgba(220,38,38,0.18) inset;
  opacity: 0.92;
}
.qg-av-badge.none .qg-av-icon {
  background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
  color: #fff;
  box-shadow:
    0 2px 4px rgba(239,68,68,0.35),
    0 0 0 2px rgba(255,255,255,0.85);
}

/* Hover effects : lift + accélération du shimmer */
.qg-store-item-row.clickable:hover .qg-av-badge.ok {
  transform: translateY(-1px);
  animation-duration: .55s, 1.6s; /* shimmer x2 plus rapide */
  box-shadow:
    0 4px 12px rgba(16,185,129,0.25),
    0 0 0 1px rgba(16,185,129,0.30) inset;
}
.qg-store-item-row.clickable:hover .qg-av-badge.order {
  transform: translateY(-1px);
  animation-duration: .55s, 2s;
}
.qg-store-item-row.clickable:hover .qg-av-arrow {
  opacity: 1; transform: translateX(2px);
}
.qg-av-badge { transition: transform .2s, box-shadow .2s; }

/* Teinte du fond de la ligne selon l'état au hover */
.qg-store-item-row.av-ok:hover    { background: linear-gradient(90deg, rgba(16,185,129,0.06), var(--paper-2)); }
.qg-store-item-row.av-order:hover { background: linear-gradient(90deg, rgba(245,158,11,0.06), var(--paper-2)); }
.qg-store-item-row.av-none:hover  { background: linear-gradient(90deg, rgba(239,68,68,0.06), var(--paper-2)); }

/* ============ IA PRODUCT FINDER ============ */
.qg-ia-find-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; margin-top: 16px; padding: 14px 16px;
  background: linear-gradient(135deg, #1c1917 0%, #0a0a0a 100%);
  color: #fff;
  border: 0; border-radius: 10px; cursor: pointer;
  font-family: 'Inter Tight', 'Inter', sans-serif;
  font-size: 13.5px; font-weight: 600;
  letter-spacing: -0.01em;
  position: relative; overflow: hidden;
  transition: transform .15s, box-shadow .15s;
  box-shadow: 0 2px 8px rgba(10,10,10,0.18);
}
.qg-ia-find-btn::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.15) 50%, transparent 70%);
  background-size: 240% 100%;
  animation: qg-ia-shimmer 3.4s ease-in-out infinite;
  pointer-events: none;
}
@keyframes qg-ia-shimmer {
  0%   { background-position: 240% 50%; }
  100% { background-position: -240% 50%; }
}
.qg-ia-find-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 18px rgba(10,10,10,0.3);
}
.qg-ia-star {
  display: inline-flex;
  background: linear-gradient(135deg, #fbbf24, #f59e0b);
  -webkit-background-clip: text; background-clip: text;
  color: transparent;
  font-size: 14px;
  filter: drop-shadow(0 0 4px rgba(251,191,36,0.5));
  animation: qg-star-twinkle 2.2s ease-in-out infinite;
}
@keyframes qg-star-twinkle {
  0%, 100% { transform: scale(1) rotate(0deg); }
  50%      { transform: scale(1.2) rotate(15deg); }
}

.qg-ia-loading-row {
  display: flex; align-items: center; gap: 10px;
  padding: 14px; margin-top: 10px;
  background: var(--paper-2);
  border-radius: 8px;
  font-size: 12.5px; color: var(--t2-light);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.02em;
}
.qg-ia-error-row {
  padding: 10px 14px; margin-top: 10px;
  background: rgba(220,38,38,0.06);
  border: 1px solid rgba(220,38,38,0.2);

  font-size: 12px; color: #7f1d1d;
}

.qg-ia-results {

  background: linear-gradient(135deg, #fafaf9 0%, #f5f5f4 100%);
  border: 1px solid rgba(180,83,9,0.18);
  border-radius: 10px;
  position: relative; overflow: hidden;
}
.qg-ia-results::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, #fbbf24 0%, #f59e0b 50%, #fbbf24 100%);
  background-size: 200% 100%;
  animation: qg-ia-shimmer 3s ease-in-out infinite;
}
.qg-ia-results-header {
  display: flex; justify-content: space-between; align-items: center;
  padding-bottom: 8px; margin-bottom: 8px;
  border-bottom: 1px dashed rgba(180,83,9,0.20);
}
.qg-ia-results-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: #92400e;
}
.qg-ia-count-note {
  font-weight: 500;
  color: #a16207;
  letter-spacing: 0.04em;
  margin-left: 4px;
  text-transform: none;
}
.qg-ia-refresh {
  background: transparent; border: 1px solid rgba(180,83,9,0.30);
  padding: 3px 8px; border-radius: 4px; cursor: pointer;
  font-size: 13px; color: #92400e;
  transition: all .15s;
}
.qg-ia-refresh:hover { background: #fef3c7; transform: rotate(90deg); }

.qg-ia-product-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  background: #fff; border: 1px solid var(--hair-light);
  border-radius: 10px;

.qg-ia-product-row:hover {
  border-color: #f59e0b;
  background: #fffbeb;
  transform: translateX(2px);
  box-shadow: 0 4px 14px rgba(245,158,11,0.15);
}
.qg-ia-product-row:hover .qg-ia-product-arrow {
  transform: translateX(3px);
  color: #f59e0b;
}
.qg-ia-product-row.fallback {
  border-style: dashed; opacity: 0.92;
}
.qg-ia-product-row.fallback:hover { opacity: 1; }

/* Image produit miniature */
.qg-ia-product-img {
  width: 52px; height: 52px;
  object-fit: cover; flex-shrink: 0;
  border-radius: 6px;
  border: 1px solid var(--hair-light);
  background: var(--paper-2);
}

.qg-ia-product-text { flex: 1; min-width: 0; }
.qg-ia-product-name {
  font-family: 'Inter Tight', 'Inter', sans-serif;
  font-size: 13.5px; font-weight: 600;
  color: var(--ink); line-height: 1.3;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.qg-ia-product-meta {
  display: flex; align-items: center; gap: 8px;
  margin-top: 4px;
  flex-wrap: wrap;
}
/* ─── Refonte UI géoloc magasins (DevisFlash 2026) ─── */
.qg-stores-batch-row {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 20px;
  padding: 14px 18px;
  background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 6%, transparent), transparent 60%);
  border: 1px solid color-mix(in srgb, var(--accent) 18%, transparent);
  border-radius: 12px;
  flex-wrap: wrap;
}
.qg-stores-batch-btn {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 11px 22px;
  background: var(--ink); color: #fff;
  border: 0; border-radius: 8px;
  font-family: 'Inter', sans-serif; font-weight: 600; font-size: 14px;
  cursor: pointer;
  transition: background .15s, transform .05s;
  letter-spacing: -0.005em;
}
.qg-stores-batch-btn:hover:not(:disabled) { background: #1f1f1f; }
.qg-stores-batch-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.qg-stores-batch-hint {
  font-size: 12.5px; color: var(--t3-light);
  flex: 1; min-width: 200px;
  line-height: 1.4;
}

/* Card "MEILLEUR CHOIX" — bordure accent + ombre subtile */
.qg-store-card.is-best {
  border: 2px solid var(--accent);
  box-shadow: 0 6px 24px color-mix(in srgb, var(--accent) 12%, transparent), 0 1px 3px rgba(0,0,0,0.04);
  position: relative;
}
.qg-store-best-badge {
  position: absolute; top: -10px; left: 14px;
  background: var(--accent); color: #fff;
  padding: 4px 12px;
  border-radius: 999px;
  font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.04em;
  box-shadow: 0 2px 6px rgba(224, 78, 26, 0.3);
  z-index: 1;
}

/* Stats compactes par magasin */
.qg-store-stats {
  display: flex; gap: 14px;
  padding: 12px 14px;
  margin: 12px 0;
  background: #FAFAFA;
  border: 1px solid rgba(10,10,10,0.06);
  border-radius: 10px;
  flex-wrap: wrap;
}
.qg-store-stat {
  display: flex; flex-direction: column;
  align-items: flex-start;
  gap: 2px;
  min-width: 60px;
}
.qg-store-stat-dot {
  font-size: 9px;
  display: inline-block;
  vertical-align: middle;
  margin-right: 3px;
  line-height: 1;
}
.qg-store-stat-val {
  font-family: 'Inter Tight', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: #0A0A0A;
  letter-spacing: -0.01em;
  line-height: 1.1;
}
.qg-store-stat-val .qg-store-stat-dot { font-size: 11px; }
.qg-store-stat-lbl {
  font-size: 10.5px;
  color: #6E6E6E;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

/* Pastille stock visuelle (remplace l'ancienne qg-ia-product-avail) */
.qg-ia-stock-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 9px;
  border-radius: 999px;
  font-size: 11px; font-weight: 600;
  line-height: 1.2;
  white-space: nowrap;
  border: 1px solid transparent;
}
.qg-ia-stock-pill .qg-ia-stock-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
  display: inline-block;
}
.qg-ia-stock-pill.stock-ok       { background: #DCFCE7; color: #166534; border-color: #BBF7D0; }
.qg-ia-stock-pill.stock-ok .qg-ia-stock-dot       { background: #16A34A; box-shadow: 0 0 0 2px rgba(22,163,74,0.18); }
.qg-ia-stock-pill.stock-order    { background: #FEF3C7; color: #92400E; border-color: #FDE68A; }
.qg-ia-stock-pill.stock-order .qg-ia-stock-dot    { background: #D97706; box-shadow: 0 0 0 2px rgba(217,119,6,0.18); }
.qg-ia-stock-pill.stock-none     { background: #FEE2E2; color: #991B1B; border-color: #FECACA; }
.qg-ia-stock-pill.stock-none .qg-ia-stock-dot     { background: #DC2626; box-shadow: 0 0 0 2px rgba(220,38,38,0.18); }
.qg-ia-stock-pill.stock-unknown  { background: #F4F4F2; color: #6E6E6E; border-color: rgba(10,10,10,0.08); }
.qg-ia-stock-pill.stock-unknown .qg-ia-stock-dot  { background: #A1A1A1; }

/* ─── Bandeau pré-remplissage fiche entreprise ─── */
.qg-prefill-banner {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px; margin: 0 0 20px;
  background: linear-gradient(180deg, #FFF7ED 0%, #fff 100%);
  border: 1px solid #FED7AA; border-radius: 14px;
}
.qg-prefill-ic { font-size: 22px; line-height: 1; flex-shrink: 0; }
.qg-prefill-txt { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 0; }
.qg-prefill-txt b { font-size: 14px; color: var(--t1-light); }
.qg-prefill-txt span { font-size: 12.5px; color: var(--t2-light); line-height: 1.45; }
.qg-prefill-btn {
  flex-shrink: 0; cursor: pointer;
  padding: 9px 16px; border-radius: 9px; font-size: 13px; font-weight: 700;
  background: var(--accent); color: #fff; border: none; white-space: nowrap;
  transition: background .15s, transform .12s;
}
.qg-prefill-btn:hover { background: #C13E10; transform: translateY(-1px); }
@media (max-width: 560px) {
  .qg-prefill-banner { flex-wrap: wrap; }
  .qg-prefill-btn { width: 100%; }
}

/* ═══ LISTE DE COURSES — liens directs magasins (design propre) ═══ */
.qg-shop { margin-top: 22px; }
.qg-shop-stores {
  display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px;
}
.qg-shop-store {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 9px 14px; border-radius: 12px;
  border: 1px solid var(--hair-light); background: #fff;
  text-decoration: none; transition: border-color .15s, box-shadow .15s, transform .12s;
}
.qg-shop-store:hover { border-color: var(--accent); box-shadow: 0 6px 18px rgba(10,10,10,.07); transform: translateY(-1px); }
.qg-shop-store-pill {
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px; font-weight: 700;
  letter-spacing: .03em; padding: 3px 8px; border-radius: 6px; text-transform: uppercase;
}
.qg-shop-store-dist { font-size: 12.5px; font-weight: 600; color: var(--t2-light); }
.qg-shop-store-go { font-size: 12px; font-weight: 600; color: var(--accent); }

.qg-shop-list { display: flex; flex-direction: column; gap: 10px; }
.qg-shop-item {
  border: 1px solid var(--hair-light); border-radius: 14px;
  padding: 14px 16px; background: #fff;
  transition: border-color .15s, box-shadow .15s;
}
.qg-shop-item:hover { border-color: rgba(10,10,10,.16); box-shadow: 0 4px 16px rgba(10,10,10,.05); }
.qg-shop-item-info {
  display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-bottom: 11px;
}
.qg-shop-item-name {
  font-family: 'Inter Tight', sans-serif; font-weight: 600; font-size: 14.5px; color: var(--t1-light);
  line-height: 1.3;
}
.qg-shop-item-qty {
  font-size: 11.5px; font-weight: 600; color: var(--t3-light);
  background: var(--paper-2); padding: 2px 9px; border-radius: 999px; white-space: nowrap;
}
.qg-shop-item-links { display: flex; flex-wrap: wrap; gap: 8px; }
.qg-shop-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 12px; border-radius: 9px; text-decoration: none;
  font-size: 12.5px; font-weight: 600; color: var(--t1-light);
  background: var(--paper); border: 1px solid var(--hair-light);
  transition: background .14s, border-color .14s, transform .12s, color .14s;
}
.qg-shop-chip:hover { background: #fff; border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
.qg-shop-chip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.qg-shop-chip svg { opacity: .55; }
.qg-shop-chip:hover svg { opacity: 1; }
.qg-shop-foot {
  margin: 16px 0 0; font-size: 12.5px; color: var(--t3-light); line-height: 1.5;
  padding: 12px 14px; background: #FFF7ED; border: 1px solid #FED7AA; border-radius: 10px;
}
.qg-shop-empty {
  margin-top: 18px; padding: 18px; text-align: center;
  font-size: 13.5px; color: var(--t3-light);
  background: var(--paper-2); border-radius: 12px; border: 1px dashed var(--hair-light);
}
@media (max-width: 560px) {
  .qg-shop-store { flex: 1 1 100%; justify-content: space-between; }
}

/* ─── COMPARATEUR PRIX MAGASINS — Refonte DevisFlash ─── */
.qg-comp-wrapper {
  margin-top: 24px;
  background: #fff;
  border-radius: 16px;
  border: 1px solid rgba(10,10,10,0.08);
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(10,10,10,0.04);
}
.qg-comp-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 24px;
  background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 4%, transparent), transparent 70%);
  border-bottom: 1px solid rgba(10,10,10,0.08);
  flex-wrap: wrap; gap: 14px;
}
.qg-comp-header-title {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: 'Inter Tight', sans-serif;
  font-size: 17px; font-weight: 700;
  color: #0A0A0A;
  letter-spacing: -0.01em;
}
.qg-comp-best-summary {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 14px; color: #404040;
  background: #FFF7ED;
  border: 1px solid #FED7AA;
  padding: 8px 14px; border-radius: 999px;
  font-weight: 500;
  flex-wrap: wrap;
}
.qg-comp-best-summary b { color: var(--accent); font-weight: 700; }

.qg-comp-scroll {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.qg-comp-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  table-layout: fixed;
  min-width: 720px;
}
.qg-comp-table th, .qg-comp-table td {
  vertical-align: top;
  padding: 14px 14px;
  border-bottom: 1px solid rgba(10,10,10,0.06);
}

/* En-tête colonne produit (1ère colonne, sticky à gauche) */
.qg-comp-th-product {
  width: 28%;
  background: #FAFAFA;
  text-align: left;
  font-family: 'Inter', sans-serif;
  font-size: 11.5px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #6E6E6E;
  position: sticky; left: 0;
  border-right: 1px solid rgba(10,10,10,0.08);
  z-index: 2;
}

/* En-tête colonnes magasins */
.qg-comp-th-store {
  width: 24%;
  background: #FFFFFF;
  text-align: left;
  vertical-align: top;
  position: relative;
}
.qg-comp-th-store.is-best {
  background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 8%, transparent), transparent);
}
.qg-comp-th-store-inner {
  display: flex; flex-direction: column; gap: 6px;
  position: relative;
  min-height: 92px;
  justify-content: flex-start;
}
.qg-comp-th-best-tag {
  position: absolute; top: -22px; left: 0;
  background: var(--accent); color: #fff;
  font-size: 9.5px; font-weight: 800;
  letter-spacing: 0.08em;
  padding: 3px 10px; border-radius: 999px;
  box-shadow: 0 2px 6px rgba(224,78,26,0.3);
  z-index: 2;
}
/* Slot d'espace réservé pour le badge "LE PLUS PROCHE" — présent dans toutes les colonnes pour aligner */
.qg-comp-th-best-tag-slot {
  height: 22px;
  display: flex; align-items: center;
}
.qg-comp-th-best-tag-inline {
  background: var(--accent); color: #fff;
  font-size: 9.5px; font-weight: 800;
  letter-spacing: 0.08em;
  padding: 3px 10px; border-radius: 999px;
  box-shadow: 0 2px 6px rgba(224,78,26,0.3);
  display: inline-block;
}
.qg-comp-th-name {
  font-family: 'Inter Tight', sans-serif;
  font-size: 13.5px; font-weight: 600;
  min-height: 36px;
  color: #0A0A0A;
  letter-spacing: -0.005em;
  line-height: 1.2;
}
.qg-comp-th-dist {
  font-size: 11.5px; color: #6E6E6E;
  line-height: 1.3;
}
.qg-comp-th-dist a {
  color: var(--accent);
  text-decoration: underline; text-decoration-color: rgba(224,78,26,0.3);
  text-underline-offset: 2px;
}

/* Lignes corps : produit */
.qg-comp-td-product {
  background: #FAFAFA;
  position: sticky; left: 0;
  border-right: 1px solid rgba(10,10,10,0.08);
  z-index: 1;
}
.qg-comp-td-product-name {
  font-size: 13.5px; font-weight: 500;
  color: #0A0A0A;
  line-height: 1.35;
  word-break: break-word;
}
.qg-comp-td-product-qty {
  font-size: 11.5px; color: #6E6E6E;
  margin-top: 4px;
}

/* Cellules prix */
.qg-comp-td-cell {
  background: #fff;
  padding: 0; /* link prendra tout */
  position: relative;
}
.qg-comp-cell-link {
  display: flex; flex-direction: row; gap: 10px;
  padding: 12px 14px;
  text-decoration: none;
  color: inherit;
  height: 100%; min-height: 70px;
  border-radius: 8px;
  margin: 4px;
  transition: background .15s, transform .05s;
  align-items: flex-start;
}
.qg-comp-cell-link:hover {
  background: #FAFAFA;
}
.qg-comp-cell-link:active { transform: scale(0.99); }
.qg-comp-cell-img {
  width: 44px; height: 44px;
  object-fit: contain;
  border-radius: 6px;
  background: #F4F4F2;
  flex-shrink: 0;
}
.qg-comp-cell-body {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  gap: 8px;
}
.qg-comp-cell-name {
  font-size: 12.5px;
  line-height: 1.35;
  color: #404040;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  word-break: break-word;
}
.qg-comp-cell-bottom {
  display: flex; flex-direction: column;
  gap: 5px;
  margin-top: auto;
}
.qg-comp-cell-price {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: 'Inter Tight', sans-serif;
  font-size: 15px; font-weight: 700;
  color: #0A0A0A;
  letter-spacing: -0.01em;
}
.qg-comp-cell-badge-min {
  display: inline-flex; align-items: center;
  background: #DCFCE7;
  color: #166534;
  font-size: 9.5px; font-weight: 800;
  padding: 2px 7px;
  border-radius: 999px;
  letter-spacing: 0.06em;
}
.qg-comp-cell-price-na {
  font-size: 13px; color: #6E6E6E;
  font-weight: 500;
}

/* Cellule meilleur prix */
.qg-comp-td-cell.is-min-price {
  background: linear-gradient(180deg, #F0FDF4 0%, transparent 100%);
}
.qg-comp-td-cell.is-min-price .qg-comp-cell-link {
  background: #F0FDF4;
}
.qg-comp-td-cell.is-min-price .qg-comp-cell-link:hover {
  background: #DCFCE7;
}

.qg-comp-td-empty, .qg-comp-td-not-found {
  background: #FAFAFA;
  text-align: center;
  color: #A1A1A1;
}
.qg-comp-td-wait {
  font-size: 24px; color: #D1D1D0;
}
.qg-comp-td-na {
  font-size: 12px; color: #A1A1A1;
  font-style: italic;
}

/* Pied de page : totaux */
.qg-comp-table tfoot td {
  background: #F4F4F2;
  border-top: 2px solid #0A0A0A;
  padding: 16px 14px;
}
.qg-comp-tf-label {
  background: #FAFAFA !important;
  font-family: 'Inter Tight', sans-serif;
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: #0A0A0A;
  position: sticky; left: 0;
  z-index: 1;
}
.qg-comp-tf-total {
  display: table-cell;
  text-align: left;
}
.qg-comp-tf-total.is-best {
  background: color-mix(in srgb, var(--accent) 10%, #F4F4F2) !important;
}
.qg-comp-tf-price {
  display: block;
  font-family: 'Inter Tight', sans-serif;
  font-size: 18px; font-weight: 800;
  color: #0A0A0A;
  letter-spacing: -0.015em;
  line-height: 1.1;
}
.qg-comp-tf-total.is-best .qg-comp-tf-price { color: var(--accent); }
.qg-comp-tf-info {
  display: block;
  font-size: 11px; color: #6E6E6E;
  margin-top: 4px;
}
.qg-comp-tf-na { color: #A1A1A1; font-size: 14px; }

/* Loading indicator */
.qg-comp-loading {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 14px 24px;
  color: #6E6E6E;
  font-size: 13px;
}

/* Responsive : sur mobile on garde le scroll horizontal */
@media (max-width: 760px) {
  .qg-comp-th-product, .qg-comp-td-product { width: 200px; }
  .qg-comp-th-store, .qg-comp-td-cell { width: 200px; }
  .qg-comp-table { min-width: 800px; }
  .qg-comp-header { padding: 16px 18px; }
  .qg-comp-header-title { font-size: 15px; }
}

.qg-ia-product-avail {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 500;
  letter-spacing: 0.04em;
  color: var(--t3-light);
}
.qg-ia-other-store {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px; font-weight: 600;
  letter-spacing: 0.06em;
  color: #92400e;
  padding: 1px 6px;
  background: rgba(180, 83, 9, 0.10);
  border-radius: 3px;
}
.qg-ia-product-price {
  font-family: var(--font-display);
  font-size: 16px; font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--ink);
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}
.qg-ia-product-price-na {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--t2-light);
  padding: 4px 8px;
  background: var(--paper-2);
  border-radius: 4px;
  flex-shrink: 0;
}
.qg-ia-product-arrow {
  color: var(--t3-light);
  transition: transform .2s, color .2s;
  flex-shrink: 0;
}

/* Wrapper avec bouton fallback à droite */
.qg-ia-product-row-wrap {
  display: flex; align-items: stretch; gap: 4px;
  margin-bottom: 8px;
}
.qg-ia-product-row-wrap:last-child { margin-bottom: 0; }
.qg-ia-product-row-wrap .qg-ia-product-row { flex: 1; margin-bottom: 0; }
.qg-ia-fallback-btn {
  display: flex; align-items: center; justify-content: center;
  width: 36px; flex-shrink: 0;
  background: #fff;
  border: 1px solid var(--hair-light);
  border-radius: 10px;
  color: var(--t3-light);
  text-decoration: none;
  transition: all .15s var(--ease, cubic-bezier(.22,1,.36,1));
}
.qg-ia-fallback-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(224,78,26,0.05);
  transform: rotate(-8deg);
}

/* "+ N autres produits" → bouton cliquable */
.qg-store-more-btn {
  display: block; width: 100%;
  margin-top: 8px; padding: 8px 12px;
  background: transparent;
  border: 1px dashed var(--hair-light);
  border-radius: 6px; cursor: pointer;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--t2-light);
  transition: all .15s;
}
.qg-store-more-btn:hover {
  border-color: var(--accent); color: var(--accent); border-style: solid;
  background: rgba(224,78,26,0.04);
}
.qg-store-more {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; color: var(--t3-light);
  letter-spacing: 0.04em; padding-top: 6px;
}
.qg-store-actions {
  display: flex; gap: 6px; padding-top: 10px;
  border-top: 1px solid var(--hair-lighter); margin-top: 6px;
}
.qg-store-actions a {
  flex: 1; padding: 7px 8px; border-radius: 4px;
  border: 1px solid var(--hair-light); background: #fff;
  text-decoration: none; color: var(--t2-light);
  font-size: 11.5px; font-weight: 500; text-align: center;
  transition: all .15s;
}
.qg-store-actions a:hover {
  border-color: var(--accent); color: var(--accent);
  background: rgba(224,78,26,0.04);
}
.qg-edit-total {
  text-align: right; font-variant-numeric: tabular-nums;
  font-weight: 600; padding-right: 12px;
}
.qg-edit-actions-col { width: 32px; padding-left: 0 !important; padding-right: 8px !important; }
.qg-edit-del {
  background: transparent; border: 0;
  padding: 4px 6px; cursor: pointer;
  color: var(--t2-light); border-radius: 3px;
  transition: color .12s, background .12s;
}
.qg-edit-del:hover { color: #DC2626; background: #FEE2E2; }

.qg-edit-add-line {
  display: inline-flex; align-items: center; gap: 6px;
  margin-top: 4px; padding: 8px 14px;
  background: var(--paper-2); border: 1px dashed var(--hair-light);
  border-radius: 4px; cursor: pointer;
  font-family: inherit; font-size: 13px; font-weight: 500;
  color: var(--t2-light);
  transition: all .15s;
}
.qg-edit-add-line:hover {
  border-color: var(--accent); color: var(--accent);
  border-style: solid; background: white;
}

.qg-edit-totals {
  margin-top: 18px; margin-left: auto;
  border-collapse: collapse;
  min-width: 280px;
}
.qg-edit-totals td {
  padding: 8px 14px;
  border-top: 1px solid var(--hair-light);
}
.qg-edit-totals td:last-child {
  text-align: right; font-variant-numeric: tabular-nums;
}
.qg-edit-totals tr:last-child td {
  border-top: 2px solid var(--ink);
  font-size: 15px;
}

.qg-acompte-input {
  width: 55px; padding: 4px 6px;
  border: 1px solid var(--hair-light); border-radius: 3px;
  font-family: inherit; font-size: 13.5px;
  text-align: right; font-variant-numeric: tabular-nums;
}
.qg-acompte-input:focus {
  outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(224, 78, 26, 0.1);
}

@media print {
  .qg-ia-panel { display: none !important; }
  .qg-edit-input { border: 0 !important; background: transparent !important; padding: 4px 0 !important; }
  .qg-edit-del, .qg-edit-add-line, .qg-edit-actions-col { display: none !important; }
  .qg-acompte-input { border: 0 !important; padding: 0 !important; width: auto !important; }
}

/* Toggle "Paramètres avancés" */
.qg-advanced-toggle {
  display: inline-flex; align-items: center; gap: 6px;
  margin-top: 10px;
  padding: 6px 0;
  background: transparent; border: 0;
  color: var(--t2-light); font-family: inherit;
  font-size: 12.5px; font-weight: 500; cursor: pointer;
  transition: color .12s;
}
.qg-advanced-toggle:hover { color: var(--accent); }
.qg-hint {
  font-size: 11.5px; color: var(--t2-light);
  margin-top: 4px; line-height: 1.4;
  font-style: italic;
}

/* Badge niveau de confiance IA */
.qg-confidence {
  display: block;
  padding: 10px 14px;
  border: 1.5px solid currentColor;
  border-radius: 4px;
  background: rgba(0,0,0,0.02);
  font-size: 13.5px;
  margin-bottom: 18px;
  line-height: 1.5;
}
@media print {
  .qg-confidence { background: white !important; }
}

/* Sections internes artisan (marge, liste de courses) — visibles à l'écran, masquées à l'impression */
.qg-internal {
  background: #FEF3C7;
  border-left: 3px solid #F59E0B;
  padding: 14px 18px;
  border-radius: 4px;
  margin: 18px 0;
  font-size: 13.5px;
  color: #78350F;
}
.qg-internal h3 {
  font-family: 'Inter Tight', sans-serif !important;
  font-size: 15px !important;
  font-weight: 700 !important;
  color: #78350F !important;
  margin: 0 0 8px !important;
  letter-spacing: 0 !important;
}
.qg-internal p { margin: 0 0 6px; }
.qg-internal em { color: #92400E; font-style: italic; }
.qg-internal ul { margin: 4px 0 0; padding-left: 22px; }
.qg-internal li { margin-bottom: 2px; }
.qg-internal strong { color: #78350F; font-weight: 700; }
@media print { .qg-internal { display: none !important; } }

/* Spinner de chargement IA */
.qg-spinner {
  display: inline-block; width: 12px; height: 12px;
  border: 2px solid currentColor; border-right-color: transparent;
  border-radius: 50%;
  animation: qgSpin .8s linear infinite;
  margin-right: 8px; vertical-align: -2px;
}
@keyframes qgSpin { to { transform: rotate(360deg); } }

/* Panneau historique des devis */
.qg-history-overlay {
  position: fixed; inset: 0;
  background: rgba(15, 15, 15, 0.55);
  backdrop-filter: blur(4px);
  z-index: 10000;
  display: flex; justify-content: flex-end;
  animation: qgFadeIn .2s ease;
}
@keyframes qgFadeIn { from { opacity: 0; } to { opacity: 1; } }
.qg-history-panel {
  width: min(480px, 100vw); height: 100%;
  background: var(--paper); padding: 28px;
  overflow-y: auto;
  box-shadow: -20px 0 60px rgba(0,0,0,0.2);
  animation: qgSlideIn .25s cubic-bezier(.2,.8,.2,1);
  position: relative;
}
@keyframes qgSlideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
.qg-history-head {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 16px; margin-bottom: 24px;
}
.qg-history-head .qg-close { position: static; }
.qg-history-empty {
  text-align: center; color: var(--t2-light);
  padding: 60px 20px; font-size: 13.5px; line-height: 1.7;
  background: var(--paper-2); border-radius: 4px;
}
.qg-history-list { display: flex; flex-direction: column; gap: 8px; }
.qg-history-item {
  display: flex; align-items: stretch;
  border: 1px solid var(--hair-light); border-radius: 4px;
  background: var(--paper); overflow: hidden;
  transition: border-color .15s;
}
.qg-history-item:hover { border-color: var(--ink); }
.qg-history-item-main {
  flex: 1; text-align: left; padding: 12px 14px;
  background: transparent; border: 0;
  font-family: inherit; cursor: pointer;
  display: flex; align-items: center; gap: 12px;
  transition: background .15s;
}
.qg-history-item-main:hover { background: var(--paper-2); }
.qg-history-item-main > div { flex: 1; }
.qg-history-item-title { font-size: 14px; font-weight: 500; color: var(--ink); margin-bottom: 3px; }
.qg-history-item-meta { font-size: 11.5px; color: var(--t2-light); }
.qg-history-item-arrow {
  font-size: 16px; color: var(--t3-light);
  opacity: 0; transform: translateX(-4px);
  transition: opacity .15s, transform .15s, color .15s;
}
.qg-history-item-main:hover .qg-history-item-arrow { opacity: 1; transform: translateX(0); color: var(--accent); }
.qg-history-item-del {
  background: transparent; border: 0; border-left: 1px solid var(--hair-light);
  padding: 0 14px; color: var(--t2-light); cursor: pointer;
  transition: color .15s, background .15s;
}
.qg-history-item-del:hover { color: #DC2626; background: #FEE2E2; }

/* Restaure le curseur système à l'intérieur du modal devis (le custom cursor reste sur le site) */
.qg-overlay, .qg-overlay * { cursor: auto !important; }
.qg-overlay button, .qg-overlay .qg-history-item-main, .qg-overlay .qg-name-result,
.qg-overlay .qg-history-item-del, .qg-overlay .qg-close,
.qg-overlay .qg-voice-btn, .qg-overlay .qg-history-btn,
.qg-overlay .qg-siret-btn, .qg-overlay a { cursor: pointer !important; }
.qg-overlay input, .qg-overlay textarea { cursor: text !important; }

/* Print mode — n'imprimer que le devis généré (display:none au lieu de visibility pour éviter pages blanches) */
@media print {
  body { background: white !important; cursor: auto !important; }
  .cursor { display: none !important; }
  /* Tout est caché par défaut */
  body * { display: none !important; }
  /* On rétablit uniquement la chaîne d'ancêtres jusqu'au devis */
  #root, .qg-overlay, .qg-modal { display: block !important; }
  /* Le devis et tous ses descendants retrouvent leur affichage natif */
  .qg-result, .qg-result * { display: revert !important; }
  /* MAIS on re-cache TOUS les contrôles d'édition (boutons, undo bar, ajouts, etc.) */
  /* Specificité >= 0,2,0 pour battre `.qg-result *` */
  .qg-result .no-print,
  .qg-result .qg-undo-bar,
  .qg-result .qg-undo-bar *,
  .qg-result .qg-edit-add-line,
  .qg-result .qg-edit-del,
  .qg-result .qg-line-del,
  .qg-result .qg-line-actions,
  .qg-result .qg-edit-actions-col,
  .qg-result .qg-edit-controls,
  .qg-result .qg-edit-help,
  .qg-result .qg-toolbar,
  .qg-result .qg-internal,
  .qg-result [data-no-print] { display: none !important; }
  /* Champs éditables : enlever bordures et fond gris pour rendu print propre */
  .qg-result [contenteditable] {
    outline: none !important;
    border: none !important;
    background: transparent !important;
    box-shadow: none !important;
    padding: 0 !important;
  }
  /* Le tableau a besoin de display explicites (revert peu fiable selon UA) */
  .qg-result table { display: table !important; width: 100% !important; }
  .qg-result thead { display: table-header-group !important; }
  .qg-result tbody { display: table-row-group !important; }
  .qg-result tr { display: table-row !important; }
  .qg-result td, .qg-result th { display: table-cell !important; }
  /* Reset des conteneurs */
  .qg-overlay {
    position: static !important; background: none !important;
    padding: 0 !important; backdrop-filter: none !important;
    width: auto !important; height: auto !important;
  }
  .qg-modal {
    box-shadow: none !important; padding: 0 !important;
    max-width: none !important; max-height: none !important;
    overflow: visible !important; border-radius: 0 !important;
    background: white !important; width: 100% !important;
  }
  .qg-result {
    border: 0 !important; padding: 8mm 12mm !important;
    margin: 0 !important; max-width: none !important;
    background: white !important;
    font-size: 11.5px !important;
    line-height: 1.4 !important;
  }
  /* Compactage : titres et espaces réduits pour économiser de la place */
  .qg-result h1 { font-size: 20px !important; margin: 0 0 8px !important; padding: 0 !important; }
  .qg-result h2 { font-size: 14px !important; margin: 10px 0 4px !important; }
  .qg-result h3 { font-size: 12px !important; margin: 8px 0 3px !important; }
  .qg-result p { margin: 0 0 4px !important; }
  .qg-result hr { margin: 6px 0 !important; }
  .qg-result ul, .qg-result ol { margin: 0 0 6px !important; padding-left: 16px !important; }
  .qg-result li { margin-bottom: 1px !important; font-size: 10.5px !important; line-height: 1.35 !important; }
  .qg-result table { margin: 4px 0 !important; }
  .qg-result th, .qg-result td { padding: 4px 6px !important; font-size: 10.5px !important; }
  .qg-result blockquote { margin: 4px 0 !important; padding: 4px 8px !important; font-size: 10.5px !important; }
  /* Évite les coupures malheureuses entre les pages */
  .qg-result h1, .qg-result h2, .qg-result h3 { page-break-after: avoid !important; break-after: avoid !important; }
  .qg-edit-table tr.qg-edit-section-row,
  .qg-edit-table tr.qg-edit-subsection-row,
  .qg-result tr.qg-section-row,
  .qg-result tr.qg-subsection-row {
    page-break-inside: avoid !important;
    break-inside: avoid !important;
    page-break-after: avoid !important;
    break-after: avoid !important;
  }
  .qg-edit-table tbody tr, .qg-result table tbody tr {
    page-break-inside: avoid !important;
    break-inside: avoid !important;
  }
  /* Mentions légales restent ensemble si possible */
  .qg-result ul { page-break-inside: avoid !important; break-inside: avoid !important; }
  @page { margin: 0; size: A4; }
}

/* ────────────────────────────────────────────────────────
   AUTH MODAL — login / signup
   ──────────────────────────────────────────────────────── */
.af-overlay {
  position: fixed; inset: 0;
  background: rgba(10,10,10,.78);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  z-index: 10000;
  display: grid;
  place-items: center;
  padding: 40px 20px;
  overflow-y: auto;
  animation: qg-fade .25s var(--ease);
}
.af-overlay, .af-overlay * { cursor: auto !important; }
.af-overlay button, .af-overlay a, .af-overlay .af-country-trigger { cursor: pointer !important; }
.af-overlay input, .af-overlay select { cursor: text !important; }

.af-modal {
  background: #fff;
  border-radius: 14px;
  width: 100%;
  max-width: 480px;
  padding: 40px 38px 36px;
  position: relative;
  box-shadow: 0 40px 80px rgba(0,0,0,.45);
  animation: qg-rise .35s var(--ease);
}
.af-close {
  position: absolute; top: 14px; right: 14px;
  width: 32px; height: 32px;
  display: grid; place-items: center;
  border-radius: 50%;
  font-size: 18px;
  color: var(--t2-light);
  background: transparent;
  border: 1px solid var(--hair-light);
  transition: all .15s;
}
.af-close:hover { background: var(--paper-2); color: var(--ink); }

.af-back {
  position: absolute; top: 18px; left: 18px;
  width: 36px; height: 36px;
  display: grid; place-items: center;
  border-radius: 8px;
  color: var(--t2-light);
  background: transparent;
  border: 1px solid var(--hair-light);
  transition: all .15s;
}
.af-back:hover { background: var(--paper-2); color: var(--ink); }

.af-title {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--ink);
  text-align: center;
  margin: 6px 0 6px;
}
.af-sub {
  text-align: center;
  color: var(--t2-light);
  font-size: 14px;
  margin: 0 0 22px;
}

.af-google {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  height: 46px;
  border-radius: 8px;
  border: 1px solid #DADCE0;
  background: #fff;
  color: #3C4043;
  font-weight: 500;
  font-size: 14.5px;
  transition: background .15s, box-shadow .15s;
}
.af-google:hover { background: #F8F9FA; box-shadow: 0 1px 2px rgba(60,64,67,.3); }
.af-google svg { width: 18px; height: 18px; }

.af-google-card {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  border-radius: 10px;
  border: 1px solid #E5E7EB;
  background: #fff;
  padding: 10px 14px;
  margin-bottom: 16px;
  transition: background .15s;
}
.af-google-card:hover { background: #F9FAFB; }
.af-google-card .av {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, #FFB68F, #E04E1A);
  display: grid; place-items: center;
  color: #fff; font-weight: 600;
  font-size: 14px;
  flex-shrink: 0;
}
.af-google-card .info { flex: 1; min-width: 0; text-align: left; }
.af-google-card .info .nm { font-size: 13.5px; font-weight: 600; color: var(--ink); display: flex; align-items: center; gap: 6px; }
.af-google-card .info .em { font-size: 12px; color: var(--t2-light); }
.af-google-card .ggl { flex-shrink: 0; }

.af-sep {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 18px 0;
  color: var(--t3-light);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: .12em;
}
.af-sep::before, .af-sep::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--hair-light);
}

.af-input-group {
  display: flex;
  align-items: center;
  border: 1px solid #E5E7EB;

}
.af-input-group:focus-within {

}
.af-input-group.error { border-color: #DC2626; }
.af-input-group .ic {
  width: 46px;
  display: grid;
  place-items: center;
  color: var(--t3-light);
  flex-shrink: 0;
}
.af-input-group .ic svg { width: 18px; height: 18px; }
.af-input-group input,
.af-input-group select {
  flex: 1;
  min-width: 0;
  height: 46px;
  border: 0;
  background: transparent;
  font-size: 14px;
  color: var(--ink);
  font-family: inherit;
  outline: none;
  padding: 0 14px 0 0;
}
.af-input-group .toggle-eye {
  margin-right: 8px;
  width: 32px; height: 32px;
  display: grid; place-items: center;
  border-radius: 6px;
  color: var(--t3-light);
}
.af-input-group .toggle-eye:hover { background: var(--paper-2); color: var(--ink); }

/* Side-by-side first/last name */
.af-row-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}
.af-row-2 > * { min-width: 0; }
.af-row-2 .af-input-group { margin-bottom: 0; }

  background: #fff;
  font-size: 14px;

}
.af-country-trigger:hover { border-color: #B0B0B0; }
.af-country-trigger .flag { font-size: 20px; margin-right: 10px; }
.af-country-trigger .name { flex: 1; text-align: left; font-weight: 500; }
.af-country-trigger .hint {

.af-helper-red {

  margin: 8px 0 18px;

}

.af-section-label {

  font-size: 14px;
  color: var(--ink);

/* ─── Toast (DevisFlash custom — replaces native alert()) ─── */
.df-toast-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 2147483647; display: flex; flex-direction: column-reverse; gap: 10px; pointer-events: none; max-width: calc(100vw - 48px); }
.df-toast { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; background: #fff; border: 1px solid rgba(10,10,10,.08); border-radius: 12px; box-shadow: 0 12px 32px rgba(10,10,10,.10), 0 2px 6px rgba(10,10,10,.04); min-width: 300px; max-width: 420px; pointer-events: auto; transform: translateY(20px); opacity: 0; animation: df-toast-in .28s cubic-bezier(.22,1,.36,1) forwards; font-family: 'Inter', system-ui, sans-serif; }
.df-toast.df-leaving { animation: df-toast-out .22s cubic-bezier(.22,1,.36,1) forwards; }
@keyframes df-toast-in { to { transform: translateY(0); opacity: 1; } }
@keyframes df-toast-out { to { transform: translateY(20px); opacity: 0; } }
.df-toast .df-toast-ic { flex-shrink: 0; width: 28px; height: 28px; display: grid; place-items: center; border-radius: 50%; margin-top: -1px; }
.df-toast .df-toast-ic svg { width: 16px; height: 16px; }
.df-toast.success .df-toast-ic { background: #DCFCE7; color: #166534; }
.df-toast.error   .df-toast-ic { background: #FEE2E2; color: #B91C1C; }
.df-toast.info    .df-toast-ic { background: color-mix(in srgb, var(--accent) 12%, transparent); color: var(--accent); }
.df-toast .df-toast-body { flex: 1; min-width: 0; padding-top: 1px; }
.df-toast .df-toast-title { font-size: 14px; font-weight: 600; color: #0A0A0A; line-height: 1.35; letter-spacing: -0.005em; }
.df-toast .df-toast-msg { font-size: 13px; color: #404040; margin-top: 3px; line-height: 1.45; word-break: break-word; }
.df-toast .df-toast-close { width: 26px; height: 26px; display: grid; place-items: center; border-radius: 6px; color: #6E6E6E; flex-shrink: 0; cursor: pointer; margin: -3px -6px 0 0; background: none; border: 0; transition: background .15s, color .15s; }
.df-toast .df-toast-close:hover { background: #F4F4F2; color: #0A0A0A; }
.df-toast .df-toast-close svg { width: 14px; height: 14px; }

  <script>
/* ──────────────────────────────────────────────────────────
   DevisFlash auth store — VRAIE auth via Supabase (cloud)
   Remplace l'ancien store localStorage.
   Garde la MÊME API publique pour que l'UI existante marche.
   Expose window.DevisFlashAuth.
   ────────────────────────────────────────────────────────── */
// Liste des emails admin (accès au panel admin)
window.DEVISFLASH_ADMIN_EMAILS = ['redaaouad6@gmail.com'];
window.SUPABASE_URL     = 'https://podbqjmubzaofrehxvxo.supabase.co';
window.SUPABASE_ANON_KEY = 'sb_publishable_n5kv-sOx9oG5XyP7emLVLg_bFrSjMZU';
window.TRIAL_DAYS = 14;

// IMPORTANT : le SDK supabase-js expose window.supabase comme objet contenant createClient.
// On crée NOTRE client sous window.sb pour ne pas écraser le SDK.
window.sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

/* ───── DevisFlash Toast ─────
   Remplace les alert() natifs par un toast stylé.
   API : window.dfToast({ type: 'success'|'error'|'info', title, message, duration })
*/
window.dfToast = (function () {
  let wrap = null;
  const ensureWrap = () => {
    if (wrap && document.body.contains(wrap)) return wrap;
    wrap = document.createElement('div');
    wrap.className = 'df-toast-wrap';
    document.body.appendChild(wrap);
    return wrap;
  };
  const ICONS = {
    success: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 12 10 17 19 7"/></svg>',
    error:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>',
    info:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="11" x2="12" y2="16"/><circle cx="12" cy="8" r=".6" fill="currentColor"/></svg>'
  };
  const CLOSE_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>';
  return function show(opts) {
    if (typeof opts === 'string') opts = { message: opts };
    const { type = 'info', title, message = '', duration = 4500 } = opts || {};
    const root = ensureWrap();
    const t = document.createElement('div');
    t.className = 'df-toast ' + type;
    const esc = (s) => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    t.innerHTML =
      '<div class="df-toast-ic">' + (ICONS[type] || ICONS.info) + '</div>' +
      '<div class="df-toast-body">' +
        (title ? '<div class="df-toast-title">' + esc(title) + '</div>' : '') +
        (message ? '<div class="df-toast-msg">' + esc(message) + '</div>' : '') +
      '</div>' +
      '<button class="df-toast-close" type="button" aria-label="Fermer">' + CLOSE_ICON + '</button>';
    root.appendChild(t);
    const dismiss = () => {
      if (t.classList.contains('df-leaving')) return;
      t.classList.add('df-leaving');
      setTimeout(() => { if (t.parentNode) t.parentNode.removeChild(t); }, 250);
    };
    t.querySelector('.df-toast-close').addEventListener('click', dismiss);
    if (duration > 0) setTimeout(dismiss, duration);
    return dismiss;
  };
})();


window.DevisFlashAuth = (function () {
  const subs = new Set();
  let current = null;     // utilisateur connecté (objet enrichi avec profil)
  let initializing = true;

  const notify = () => subs.forEach(fn => { try { fn(current); } catch (e) { console.error(e); } });

  // Fusionne user Supabase auth + profil de la table 'profiles'
  const buildUserObject = (supaUser, profile) => {
    if (!supaUser) return null;
    const trialStart = profile?.trial_start ? new Date(profile.trial_start) : new Date(supaUser.created_at);
    const trialEnd   = new Date(trialStart.getTime() + window.TRIAL_DAYS * 24 * 60 * 60 * 1000);
    const now = new Date();
    const subscriptionActive = !!profile?.subscription_active;
    const trialActive = !subscriptionActive && now < trialEnd;
    const daysLeft = Math.max(0, Math.ceil((trialEnd - now) / (24 * 60 * 60 * 1000)));
    return {
      id: supaUser.id,
      email: supaUser.email,
      provider: supaUser.app_metadata?.provider || 'email',
      firstName: profile?.first_name || '',
      lastName:  profile?.last_name  || '',
      company:   profile?.company    || '',
      metier:    profile?.metier     || '',
      city:      profile?.city       || '',
      phone:     profile?.phone      || '',
      address:   profile?.address    || { street:'', complement:'', postalCode:'', city:'', country:'France' },
      country:   profile?.country    || 'France',
      countryCode: profile?.country_code || 'FR',
      // Nouveaux champs fiche entreprise (Tolteck-style)
      siret:     profile?.siret      || '',
      siren:     profile?.siren      || '',
      rcs:       profile?.rcs        || '',
      rm:        profile?.rm         || '',
      tvaIntra:  profile?.tva_intra  || '',
      formeJuridique: profile?.forme_juridique || '',
      capitalSocial:  profile?.capital_social  || '',
      codeApe:   profile?.code_ape   || '',
      iban:      profile?.iban       || '',
      siteWeb:   profile?.site_web   || '',
      assureurDecennale: profile?.assureur_decennale || '',
      numeroDecennale:   profile?.numero_decennale   || '',
      validiteDevisJours: profile?.validite_devis_jours || 90,
      noteFinDevis: profile?.note_fin_devis || '',
      logoUrl:   profile?.logo_url   || '',
      trialStart: trialStart.toISOString(),
      trialEnd:   trialEnd.toISOString(),
      trialActive,
      subscriptionActive,
      subscriptionPlan: profile?.subscription_plan || null,
      daysLeft,
      accessAllowed: subscriptionActive || trialActive,
      createdAt: new Date(supaUser.created_at).getTime(),
      updatedAt: profile?.updated_at ? new Date(profile.updated_at).getTime() : Date.now(),
    };
  };

  // Va chercher le profil et reconstitue l'objet user complet
  const refreshFromSupabase = async () => {
    try {
      const { data: { user: supaUser } } = await window.sb.auth.getUser();
      if (!supaUser) { current = null; notify(); return; }
      const { data: profile, error } = await window.sb
        .from('profiles')
        .select('*')
        .eq('id', supaUser.id)
        .maybeSingle();
      if (error && error.code !== 'PGRST116') console.warn('[Auth] profile fetch:', error.message);
      current = buildUserObject(supaUser, profile);
      notify();
    } catch (e) {
      console.error('[Auth] refresh error:', e);
    }
  };

  // Initialisation : écoute les changements de session Supabase
  (async () => {
    await refreshFromSupabase();
    initializing = false;
    notify();
    window.sb.auth.onAuthStateChange((event, session) => {
      // Refresh complet à chaque changement (login, logout, refresh token)
      refreshFromSupabase();
    });
  })();

  return {
    isReady: () => !initializing,
    getUser: () => current,
    subscribe: (fn) => { subs.add(fn); fn(current); return () => subs.delete(fn); },

    // Récupère l'IP publique avec fallbacks multiples (CRITIQUE pour anti-abus)
    async getUserIP() {
      const services = [
        { url: 'https://api.ipify.org?format=json', parse: d => d.ip },
        { url: 'https://api.ip.pe/json', parse: d => d.ip },
        { url: 'https://ipwho.is/', parse: d => d.ip_address },
      ];

      for (const svc of services) {
        try {
          const res = await fetch(svc.url, { signal: AbortSignal.timeout(3000) });
          if (!res.ok) continue;
          const data = await res.json();
          const ip = svc.parse(data);
          if (ip && /^[\d.]+$/.test(ip)) {
            console.log('[Auth] IP captured:', ip);
            return ip;
          }
        } catch (e) {
          console.warn(`[Auth] ${svc.url} failed:`, e.message);
        }
      }
      throw new Error('Connexion impossible pour le moment. Vérifie ta connexion internet et réessaie.');
    },

    async checkIPAvailable(ip) {
      if (!ip) return false; // IP obligatoire
      try {
        const { data, error } = await window.sb.from('profiles').select('id').eq('signup_ip', ip).limit(1);
        if (error) throw error;
        return !data || data.length === 0;
      } catch (e) {
        console.error('[Auth] checkIP error:', e.message);
        throw new Error('Vérification IP échouée : ' + e.message);
      }
    },

    async signup({ firstName, lastName, email, password, company }) {
      email = (email || '').trim().toLowerCase();

      // VALIDATION BASIQUE EN PREMIER
      if (!firstName || !lastName) throw new Error('Renseigne ton prénom et ton nom.');
      if (!email || !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) throw new Error('Adresse email invalide.');
      if (!password || password.length < 6) throw new Error('Mot de passe : 6 caractères minimum.');
      if (!company) throw new Error('Renseigne le nom de ton entreprise.');

      // ANTI-ABUS STRICT : 1 compte par IP — IP est OBLIGATOIRE
      const userIP = await this.getUserIP(); // Throw si échoue
      const ipAvailable = await this.checkIPAvailable(userIP); // Throw si erreur
      if (!ipAvailable) {
        throw new Error("Un compte a déjà été créé depuis cette adresse IP. Si c'est ton compte, connecte-toi avec ton email existant. Sinon, écris-nous via la page Contact (en bas du site).");
      }

      // Signup Supabase
      const { data, error } = await window.sb.auth.signUp({
        email, password,
        options: {
          data: {
            first_name: firstName.trim(),
            last_name:  lastName.trim(),
            company:    company.trim(),
          },
          emailRedirectTo: window.location.origin + window.location.pathname,
        },
      });
      if (error) {
        if (error.message?.includes('already registered')) throw new Error("Un compte existe déjà avec cet email. Connecte-toi.");
        throw new Error(error.message || "Inscription impossible.");
      }

      // SAVE IP IMMÉDIATEMENT — CRITIQUE (obligatoire)
      if (data.user?.id) {
        try {
          await window.sb.from('profiles').update({ signup_ip: userIP }).eq('id', data.user.id);
          console.log('[Auth] IP saved for user:', data.user.id);
        } catch (e) {
          console.error('[Auth] CRITICAL: save signup_ip failed:', e.message);
          throw new Error('Impossible de sauvegarder vos données de sécurité. Essayez de nouveau.');
        }
      }

      // Si email confirmation activée, data.session est null → on prévient l'user
      if (!data.session) {
        const e = new Error("Compte créé ! Vérifie ta boîte mail et clique sur le lien de confirmation pour activer ton compte.");
        e.needsEmailConfirm = true;
        throw e;
      }
      await refreshFromSupabase();
      return current;
    },

    async login(email, password) {
      email = (email || '').trim().toLowerCase();
      const { data, error } = await window.sb.auth.signInWithPassword({ email, password });
      if (error) {
        if (error.message?.includes('Invalid login')) throw new Error("Email ou mot de passe incorrect.");
        if (error.message?.includes('Email not confirmed')) throw new Error("Email non confirmé. Vérifie ta boîte mail et clique sur le lien de confirmation.");
        throw new Error(error.message || "Connexion impossible.");
      }
      await refreshFromSupabase();
      return current;
    },

    async googleAuth() {
      // OAuth Google via Supabase — nécessite configuration côté Supabase Dashboard
      const { error } = await window.sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + window.location.pathname },
      });
      if (error) throw new Error("Google : " + error.message);
      // Le navigateur sera redirigé, donc on ne retourne rien
    },

    async completeProfile({ country, countryCode, address, phone, company, metier, city }) {
      if (!current) throw new Error("Pas connecté.");
      const patch = {};
      if (country)     patch.country = country;
      if (countryCode) patch.country_code = countryCode;
      if (address)     patch.address = { ...(current.address || {}), ...address };
      if (phone !== undefined) patch.phone = phone;
      if (company)     patch.company = company;
      if (metier)      patch.metier = metier;
      if (city)        patch.city = city;
      const { error } = await window.sb.from('profiles').update(patch).eq('id', current.id);
      if (error) throw new Error("Mise à jour profil : " + error.message);
      await refreshFromSupabase();
      return current;
    },

    async updateUser(patch) {
      if (!current) return null;
      // Map les champs UI vers les colonnes BD
      const dbPatch = {};
      if (patch.firstName !== undefined) dbPatch.first_name = patch.firstName;
      if (patch.lastName !== undefined)  dbPatch.last_name = patch.lastName;
      if (patch.company !== undefined)   dbPatch.company = patch.company;
      if (patch.metier !== undefined)    dbPatch.metier = patch.metier;
      if (patch.city !== undefined)      dbPatch.city = patch.city;
      if (patch.phone !== undefined)     dbPatch.phone = patch.phone;
      if (patch.address !== undefined)   dbPatch.address = patch.address;
      if (patch.country !== undefined)   dbPatch.country = patch.country;
      if (patch.countryCode !== undefined) dbPatch.country_code = patch.countryCode;
      // Nouveaux champs fiche entreprise (style Tolteck)
      if (patch.siret !== undefined)     dbPatch.siret = patch.siret;
      if (patch.siren !== undefined)     dbPatch.siren = patch.siren;
      if (patch.rcs !== undefined)       dbPatch.rcs = patch.rcs;
      if (patch.rm !== undefined)        dbPatch.rm = patch.rm;
      if (patch.tvaIntra !== undefined)  dbPatch.tva_intra = patch.tvaIntra;
      if (patch.formeJuridique !== undefined) dbPatch.forme_juridique = patch.formeJuridique;
      if (patch.capitalSocial !== undefined)  dbPatch.capital_social = patch.capitalSocial;
      if (patch.codeApe !== undefined)   dbPatch.code_ape = patch.codeApe;
      if (patch.iban !== undefined)      dbPatch.iban = patch.iban;
      if (patch.siteWeb !== undefined)   dbPatch.site_web = patch.siteWeb;
      if (patch.assureurDecennale !== undefined) dbPatch.assureur_decennale = patch.assureurDecennale;
      if (patch.numeroDecennale !== undefined)   dbPatch.numero_decennale = patch.numeroDecennale;
      if (patch.validiteDevisJours !== undefined) dbPatch.validite_devis_jours = patch.validiteDevisJours;
      if (patch.noteFinDevis !== undefined) dbPatch.note_fin_devis = patch.noteFinDevis;
      if (patch.logoUrl !== undefined)   dbPatch.logo_url = patch.logoUrl;
      if (Object.keys(dbPatch).length === 0) return current;
      const { error } = await window.sb.from('profiles').update(dbPatch).eq('id', current.id);
      if (error) {
        console.error('[Auth] update error:', error);
        throw new Error(error.message || "Impossible de sauvegarder le profil.");
      }
      await refreshFromSupabase();
      return current;
    },

    async logout() {
      await window.sb.auth.signOut();
      current = null;
      notify();
    },

    // ─── VÉRIFICATION CODE OTP (reçu par email, 6 à 8 chiffres selon config Supabase) ───
    async verifyOtp(email, token) {
      email = (email || '').trim().toLowerCase();
      token = (token || '').replace(/\D/g, '').trim(); // garde seulement les chiffres
      if (!email) throw new Error("Email manquant.");
      if (!token || token.length < 6 || token.length > 8) throw new Error("Le code doit faire entre 6 et 8 chiffres.");
      const { data, error } = await window.sb.auth.verifyOtp({
        email, token, type: 'signup',
      });
      if (error) {
        if (error.message?.includes('expired')) throw new Error("Code expiré. Renvoie-toi un nouveau code.");
        if (error.message?.includes('invalid')) throw new Error("Code incorrect. Vérifie bien le code reçu par email.");
        throw new Error(error.message || "Vérification impossible.");
      }
      await refreshFromSupabase();
      return current;
    },

    // Renvoyer un nouveau code (si le précédent a expiré ou est perdu)
    async resendOtp(email) {
      email = (email || '').trim().toLowerCase();
      const { error } = await window.sb.auth.resend({ type: 'signup', email });
      if (error) throw new Error("Impossible de renvoyer le code : " + error.message);
    },

    // Legacy : plus utilisé avec Supabase, on retourne vide pour compat
    listKnownGoogleAccounts() { return []; },

    // ─── DEVIS persistence (cloud) ───
    async saveDevis(devisData) {
      if (!current) throw new Error("Pas connecté.");
      const row = {
        user_id: current.id,
        client_nom: devisData.client_nom || null,
        client_ville: devisData.client_ville || null,
        objet: devisData.objet || null,
        total_ht: devisData.total_ht || 0,
        total_ttc: devisData.total_ttc || 0,
        tva_taux: devisData.tva_taux || null,
        payload: devisData, // JSON complet pour rouvrir plus tard
      };
      const { data, error } = await window.sb.from('devis').insert(row).select().single();
      if (error) { console.error('[saveDevis]', error); throw new Error("Sauvegarde impossible : " + error.message); }
      return data;
    },

    async listDevis() {
      if (!current) return [];
      const { data, error } = await window.sb.from('devis').select('*').order('created_at', { ascending: false }).limit(100);
      if (error) { console.warn('[listDevis]', error.message); return []; }
      return data || [];
    },

    async deleteDevis(devisId) {
      if (!current) throw new Error("Pas connecté.");
      const { error } = await window.sb.from('devis').delete().eq('id', devisId);
      if (error) throw new Error("Suppression impossible : " + error.message);
    },
  };
})();
