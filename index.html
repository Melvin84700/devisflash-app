// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

// DevisFlash v3 — cursor, nav, hero, logos
const { useState, useEffect, useRef } = React;

// reveal hook
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal, .split');
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const t = e.target;
          if (t.classList.contains('split')) {
            t.querySelectorAll('.split-word').forEach((w, i) => {
              setTimeout(() => w.classList.add('in'), i * 60);
            });
          } else {
            t.classList.add('in');
          }
          obs.unobserve(t);
        }
      });
    }, { threshold: .2, rootMargin: '0px 0px -80px 0px' });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}

// SplitText
function SplitText({ text, as: Tag = 'span', className = '' }) {
  const words = text.split(' ');
  return (
    <Tag className={"split " + className}>
      {words.map((w, i) => (
        <React.Fragment key={i}>
          <span className="split-word">{w}</span>
          {i < words.length - 1 ? ' ' : null}
        </React.Fragment>
      ))}
    </Tag>
  );
}

// Custom Cursor
function Cursor() {
  const ref = useRef(null);
  const ringRef = useRef(null);
  useEffect(() => {
    let x = -100, y = -100, rx = -100, ry = -100;
    const move = (e) => { x = e.clientX; y = e.clientY; };
    const tick = () => {
      rx += (x - rx) * .2;
      ry += (y - ry) * .2;
      if (ref.current) { ref.current.style.left = x + 'px'; ref.current.style.top = y + 'px'; }
      requestAnimationFrame(tick);
    };
    const over = (e) => {
      const a = e.target.closest('a, button, .hov');
      if (a && ref.current) ref.current.classList.add('ring');
      else if (ref.current) ref.current.classList.remove('ring');
    };
    const out = () => { if (ref.current) ref.current.classList.add('hidden'); };
    const enter = () => { if (ref.current) ref.current.classList.remove('hidden'); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseover', over);
    document.body.addEventListener('mouseleave', out);
    document.body.addEventListener('mouseenter', enter);
    tick();
    return () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseover', over);
      document.body.removeEventListener('mouseleave', out);
      document.body.removeEventListener('mouseenter', enter);
    };
  }, []);
  return <div ref={ref} className="cursor"/>;
}

// Navbar

  const [onDark, setOnDark] = useState(false);

// STATS — huge numbers on black
function Stats() {
  const [v, setV] = useState([0,0,0,0]);
  const targets = [8, 6, 2, 4];
  const ref = useRef(null);
  const [started, setStarted] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting && !started) {
        setStarted(true);
        const start = performance.now();
        const dur = 1600;
        const tick = (t) => {
          const p = Math.min(1, (t - start) / dur);
          const eased = 1 - Math.pow(1 - p, 3);
          setV(targets.map(x => x * eased));
          if (p < 1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
        obs.disconnect();
      }
    }, { threshold: 0.4 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [started]);
  const fmt = (n, d=0) => n.toLocaleString('fr-FR', { minimumFractionDigits: d, maximumFractionDigits: d });
  return (
    <section className="stats-section" ref={ref}>
      <div className="container">
        <div className="numeral reveal" style={{marginBottom:24}}>
          <span className="ln"/>
          <span className="rn">V</span>

            <div className="stat-sub">LEROY MERLIN · CASTORAMA · BRICO DÉPÔT · POINT P · BRICOMAN · TOUT FAIRE</div>
          </div>
          <div className="stat-cell">
            <div className="stat-num">{fmt(Math.round(v[2]))}<span className="u">×</span></div>
            <div className="stat-lbl">Vérification : IA chiffre, code recalcule, alertes prix marché</div>

          </div>
        </div>
      </div>
    </section>
  );
}

// === API officielle Recherche d'Entreprises (data.gouv.fr) ===
// Gratuite, sans auth, 7 req/s. Documentation : https://recherche-entreprises.api.gouv.fr/docs
async function lookupSiret(query) {
  const clean = query.replace(/\s/g, '');
  if (!/^\d{9}$|^\d{14}$/.test(clean)) {
    throw new Error("Le numéro doit faire 9 chiffres (SIREN) ou 14 chiffres (SIRET).");
  }
  const isSiret = clean.length === 14;
  // Requête brute : marche pour SIREN comme SIRET
  const url = `https://recherche-entreprises.api.gouv.fr/search?q=${encodeURIComponent(clean)}&per_page=5`;

  let res;
  try {
    res = await fetch(url, { headers: { 'Accept': 'application/json' } });
  } catch (e) {
    throw new Error("Impossible de joindre l'API (vérifie ta connexion internet).");
  }
  if (!res.ok) throw new Error(`Erreur API (HTTP ${res.status}). Réessaie dans un instant.`);
  const data = await res.json();
  if (!data.results || data.results.length === 0) {
    // Erreur enrichie avec un lien vérifiable
    const checkUrl = isSiret
      ? `https://annuaire-entreprises.data.gouv.fr/etablissement/${clean}`
      : `https://annuaire-entreprises.data.gouv.fr/entreprise/${clean}`;
    const err = new Error(`Aucune entreprise trouvée. L'entreprise est peut-être non diffusible (art. R123-232-1 CGI) ou le numéro est incorrect. Tu peux vérifier directement sur l'annuaire officiel.`);
    err.checkUrl = checkUrl;
    throw err;
  }

  // Si SIRET, trouver le résultat où matching_etablissements contient ce SIRET
  let bestResult = data.results[0];
  if (isSiret) {
    for (const r of data.results) {
      const found = (r.matching_etablissements || []).some(e => e.siret === clean)
        || (r.siege && r.siege.siret === clean);
      if (found) { bestResult = r; break; }
    }
  }
  return extractCompanyInfo(bestResult, clean, isSiret);
}

function extractCompanyInfo(r, requestedSiret, isSiret) {
  // Trouver le bon établissement
  let etab = null;
  if (isSiret) {
    etab = (r.matching_etablissements || []).find(e => e.siret === requestedSiret);
  }
  etab = etab || r.siege || (r.matching_etablissements && r.matching_etablissements[0]);

  const nom = r.nom_complet || r.nom_raison_sociale || '';
  const libelleActivite = r.libelle_activite_principale
    || (etab && etab.libelle_activite_principale)
    || '';

  let adresse = '';
  if (etab) {
    if (etab.adresse) {
      adresse = etab.adresse;
    } else {
      const voie = [etab.numero_voie, etab.indice_repetition, etab.type_voie, etab.libelle_voie].filter(Boolean).join(' ');
      const ville = [etab.code_postal, etab.libelle_commune].filter(Boolean).join(' ');
      adresse = [voie, ville].filter(Boolean).join(', ');
    }
  }

  return {
    entreprise: nom,
    siret: (isSiret ? requestedSiret : (etab && etab.siret) || ''),
    adresse,
  };
}

<instructions_de_traitement>

ÉTAPE 1 — DÉTECTION BRIEF VAGUE
Applique <regle_critique_brief_vague>. Si mode="questions_critiques", SAUTE les étapes 2-8 et ne renvoie que niveau_confiance, questions_critiques, message_client (demande de visite).

ÉTAPE 2 — DÉTECTION TVA RÉELLE
Applique <regle_tva_obligatoire>.

ÉTAPE 3 — ANTI-OUBLI + CHECKLIST MÉTIER
Applique <regle_checklist_metier>. Postes invisibles habituels : protection chantier, dépose, évacuation gravats, préparation supports, consommables, manutention (étages, accès), nettoyage fin de chantier, frais de déplacement.

ÉTAPE 4 — AVERTISSEMENTS TECHNIQUES (formulation prudente)
Risques POTENTIELS, "à vérifier" : amiante (<1997), plomb (<1949), conformité NF, humidité, structure, ventilation.

ÉTAPE 5 — CONTRAINTES & MAJORATIONS
Pénibilité (hauteur, étages, accès, site occupé, urgence) → ligne "Majoration pour contraintes" si justifié.

ÉTAPE 6 — HYPOTHÈSES & POINTS À CONFIRMER + QUESTIONS CRITIQUES
Liste explicite. Chaque hypothèse a une raison ("supposé 150m² car non précisé"). questions_critiques = questions à poser au client AVANT de finaliser (minimum 3 si confiance <70).

ÉTAPE 7a — AUTORISATIONS ADMINISTRATIVES
Applique <regle_autorisations_administratives>. Si déclenchée → ajoute alerte_litige + facteurs_risque + points_a_confirmer.

ÉTAPE 7b — VALEURS THERMIQUES si isolation présente
Applique <regle_valeurs_thermiques_isolation>. Les valeurs R doivent apparaître dans la designation de la ligne.

ÉTAPE 7c — MULTI-CORPS si prestations hors métier déclaré
Applique <regle_multi_corps>. Choisis 1 des 3 stratégies (sous-traitance / exclusion / attentes techniques) et l'expliciter.

ÉTAPE 7d — ALERTES RENTABILITÉ + LITIGE + SANITY CHECK PRIX
Applique <regle_sanity_check_prix>. Alertes litige = formulations vagues qui peuvent créer un contentieux, postes ambigus.

ÉTAPE 8 — DEVIS STANDARD (structure hiérarchique)
- Standard : qualité courante conforme normes. UN SEUL devis, pas de variante Premium.

STRUCTURE HIÉRARCHIQUE OBLIGATOIRE (style Vertuoza/Tolteck) :
- "prestations" (postes principaux) — ex : "Démolition - Construction", "Plomberie", "Électricité", "Carrelage", "Peinture", "Préparation chantier".
- Chaque prestation : "numero" (01, 02…), "titre", "total_ht" = somme des sous_postes.
- "sous_postes" thématiques — ex : "1.1 Cloison / Mur", "1.2 Menuiserie", "1.3 Sol".
- Chaque sous_poste : "numero" (1.1, 1.2…), "titre", "total_ht", liste de "lignes".
- Chaque ligne : "localisation" courte (Entrée, Salon, Cuisine, SDB, Chambres, Tous lieux) + "designation" descriptive.
- Cohérence des sommes : sum(lignes.total_ht) == sous_poste.total_ht == sum(sous_postes.total_ht) == prestation.total_ht. sum(prestations.total_ht) == devis.total_ht.
- 3 à 6 prestations max, 1 à 4 sous_postes max par prestation.

ÉTAPE 9 — LISTE DE COURSES, ACOMPTE, DÉLAI, MESSAGE CLIENT
- liste_courses_fournisseur : matériaux UNIQUEMENT (pas main d'œuvre), quantités CONCRÈTES, marges techniques (+10% coupe carrelage), marques/références si pertinent. PAS de "quantité suffisante".
- Acompte (% + justification métier).
- Délai estimé (durée + commentaire).
- message_client : version_courte (SMS, 1-2 phrases) + version_pro (email, 3-5 phrases).

ÉTAPE 10 — NIVEAU DE CONFIANCE + RENTABILITÉ
- niveau_confiance_global : 0-100 sur la fiabilité (qualité brief + données dispo). NE descends pas à <10 mécaniquement — si tu chiffres, vise 40-70.
- marge_estimee_pourcentage (entre 20 et 60).

</instructions_de_traitement>

// Post-validation : checklist obligatoire par métier — backstop si l'IA oublie un item critique.
// Injecte les items manquants dans analyse_ia.postes_oublies_ajoutes pour qu'ils apparaissent dans le panneau.
function enforceMetierChecklist(result, metier, dictee) {
  if (!result || typeof result !== 'object') return;
  const stripDiacritics = (s) => (s || '').normalize('NFD').replace(/[̀-ͯ]/g, '');
  const normalize = (s) => stripDiacritics(s).toLowerCase().replace(/ç/g, 'c').replace(/[^a-z0-9 ]/g, '');
  const m = normalize(metier);
  const brief = normalize(dictee);
  const all = normalize(JSON.stringify(result));
  const has = (...needles) => needles.some(n => all.includes(normalize(n)));
  const briefHas = (...needles) => needles.some(n => brief.includes(normalize(n)));

  // Définition des items obligatoires par métier
  const checklist = [];
  if (m.includes('electricien') || m.includes('électricien')) {
    checklist.push(['Attestation CONSUEL — obligatoire en neuf et extension significative', () => has('consuel')]);
    checklist.push(['Mise à la terre + liaison équipotentielle SDB obligatoires (NF C 15-100)', () => has('mise a la terre', 'mise à la terre', 'équipotentielle', 'equipotentielle')]);
    checklist.push(['Détecteur autonome de fumée DAAF — 1 par étage minimum (loi Morange)', () => has('daaf', 'detecteur de fumee', 'détecteur de fumée')]);
    checklist.push(['Coffret VDI / GTL — obligatoire pour communication (NF C 15-100)', () => has('vdi', 'gtl', 'gaine technique')]);
    checklist.push(['Parafoudre Type 2 — recommandé selon zone géographique (AQ Sud-Ouest/Sud-Est/montagnes)', () => has('parafoudre')]);
    if (briefHas('borne', 'recharge', 've ', ' ve')) {
      checklist.push(['Borne VE : protection différentielle Type B 30mA + déclaration ENEDIS si >3,6 kW', () => has('type b', 'enedis', 'protection borne')]);
    }
  }
  if (m.includes('plombier') || m.includes('chauffagiste')) {
    if (briefHas('douche', 'sdb', 'salle de bain', 'salle d eau', 'salle d eau')) {
      checklist.push(['Étanchéité SPEC sous douche/SDB + procès-verbal de réception', () => has('spec', 'étanchéité', 'etancheite')]);
      checklist.push(['VMC obligatoire pièces humides', () => has('vmc')]);
    }
    checklist.push(['Test de mise en eau + procès-verbal', () => has('mise en eau', 'test étanchéité', 'test etancheite')]);
    if (briefHas('pac', 'pompe a chaleur', 'pompe à chaleur', 'chaudiere', 'chaudière', 'maprimerenov', 'maprimerénov')) {
      checklist.push(['Certification RGE QualiPAC/QualiBat — obligatoire pour MaPrimeRénov', () => has('rge', 'qualipac', 'qualibat')]);
    }
    if (briefHas('cuve fioul', 'cuve à fioul', 'fioul')) {
      checklist.push(['Dégazage + neutralisation cuve fioul + certificat', () => has('dégaz', 'degaz', 'neutralis')]);
    }
  }
  if (m.includes('macon') || m.includes('maçon')) {
    if (briefHas('neuf', 'neuve', 'construction', 'construit', 'construire')) {
      checklist.push(['Étude de sol G2 obligatoire (loi ELAN 2020 zones argileuses)', () => has('g2', 'étude de sol', 'etude de sol')]);
      checklist.push(['Étude thermique RE2020 obligatoire (neuf depuis 2022)', () => has('re2020', 'étude thermique', 'etude thermique')]);
      checklist.push(['Assurance Dommages-Ouvrage AVANT chantier (obligatoire neuf)', () => has('dommages-ouvrage', 'dommages ouvrage', 'do ')]);
    }
    if (briefHas('transformer', 'transformation', 'changement', 'garage en', 'grenier en', 'combles en', 'en habitable', 'en studio', 'en chambre', 'en bureau', 'en piece', 'en pièce')) {
      checklist.push(['⚠️ Autorisation d\'urbanisme requise (DP ou PC). NON incluse dans le devis — à régulariser par le client avant démarrage', () => has('déclaration préalable', 'declaration prealable', 'permis de construire', 'changement de destination', 'r421', 'urbanisme')]);
      checklist.push(['Impact fiscal : taxe foncière + DPE actualisé + déclaration H1 aux impôts (90 jours)', () => has('taxe foncière', 'taxe fonciere', 'fiscal', 'h1', 'impôts', 'impots')]);
      checklist.push(['Étude thermique RT existant — recommandée pour création de pièce habitable', () => has('rt existant', 're2020', 'étude thermique', 'etude thermique')]);
    }
  }
  if (m.includes('peintre')) {
    checklist.push(['Protection meubles + sols (bâches, scotch) — anti-oubli majeur', () => has('protection', 'bache', 'bâche')]);
    if (briefHas('occupé', 'occupe', 'habité', 'habite', 'reste', 'restent')) {
      checklist.push(['Majoration pénibilité 10-20% (site occupé)', () => has('majoration', 'pénibilité', 'penibilite', 'site occupé', 'site occupe')]);
    }
  }
  if (m.includes('couvreur') || m.includes('zingueur')) {
    checklist.push(['Échafaudage — ligne obligatoire (sécurité travail en hauteur)', () => has('échafaudage', 'echafaudage')]);
    checklist.push(['Harnais + EPI travail en hauteur', () => has('harnais', 'epi')]);
    const yearMatch = brief.match(/\b(19[0-8][0-9]|19[0-9][0-6])\b/);
    if (yearMatch || briefHas('ancien', 'ancienne')) {
      checklist.push(['Diagnostic amiante recommandé (bâti potentiellement <1997)', () => has('amiante')]);
    }
  }
  if (m.includes('menuisier')) {
    checklist.push(['Étanchéité périphérique (compriband + mousse expansive + mastic)', () => has('compriband', 'étanchéité périphérique', 'mastic', 'mousse expansive')]);
    if (briefHas('maprimerenov', 'maprimerénov', 'cee', 'thermique', 'double vitrage', 'isolation')) {
      checklist.push(['Certification RGE QualiBat obligatoire pour MaPrimeRénov/CEE', () => has('rge', 'qualibat')]);
    }
    checklist.push(['Préciser la fourniture des menuiseries (artisan ou client)', () => has('fourniture des menuiserie', 'fourniture menuiserie', 'qui fournit', 'fournies par')]);
  }
  if (m.includes('carreleur')) {
    checklist.push(['Primaire d\'accrochage selon support', () => has('primaire', 'accrochage')]);
    if (briefHas('douche', 'receveur', 'italienne')) {
      checklist.push(['Étanchéité SPEC sous receveur (obligatoire douche)', () => has('spec', 'étanchéité', 'etancheite')]);
    }
    if (briefHas('fourni', 'client fourni', 'client fournit')) {
      checklist.push(['Marge technique +10% coupe si client fournit le carrelage', () => has('+10', '10%', 'marge', 'coupe', 'casse')]);
    }
  }
  if (m.includes('façadier') || m.includes('facadier') || m.includes('ravalement')) {
    checklist.push(['Échafaudage — obligatoire si façade >2m', () => has('échafaudage', 'echafaudage')]);
    checklist.push(['Hydrofuge en finition — recommandé pour ravalement', () => has('hydrofuge', 'hydrofugation')]);
    if (briefHas('fissure')) {
      checklist.push(['Traitement des fissures (souple ou structurel selon nature)', () => has('fissure')]);
    }
  }

  // Items globaux : isolation → valeurs R
  if (briefHas('isolation', 'isoler', 'isolant')) {
    checklist.push(['Valeurs R thermiques explicites dans les lignes (R≥3,7 murs, R≥7 combles perdus, R≥6 rampants)', () => /r\s*[=≥]\s*[3-9]/i.test(JSON.stringify(result))]);
  }

  // Items globaux : autorisations urbanisme (en plus du maçon)
  if (briefHas('extension', 'agrandissement', 'véranda', 'veranda', 'surélévation', 'surelevation')) {
    checklist.push(['⚠️ Autorisation d\'urbanisme requise selon surface (DP 5-20m², PC >20m²)', () => has('déclaration préalable', 'declaration prealable', 'permis de construire', 'urbanisme')]);
  }
  // Chauffage absent dans une pièce habitable → impact DPE + habitabilité
  if (briefHas('pas de chauffage', 'sans chauffage', 'aucun chauffage', 'pas chauffé', 'pas chauffe')) {
    checklist.push(['Chauffage absent → impact DPE défavorable + non utilisable en hiver. Recommander solution avant livraison', () => has('chauffage', 'dpe', 'habitabilité', 'habitabilite', 'hiver')]);
  }

  // Injection des items manquants
  const missing = checklist.filter(([, fn]) => !fn());
  if (missing.length > 0) {
    result.analyse_ia = result.analyse_ia || {};
    result.analyse_ia.postes_oublies_ajoutes = result.analyse_ia.postes_oublies_ajoutes || [];
    for (const [item] of missing) {
      result.analyse_ia.postes_oublies_ajoutes.push('🔧 [Vérifié par DevisFlash] ' + item);
    }
  }
  return result;
}

// ─────────────────────────────────────────────────────────────────────
// POST-VALIDATOR ARITHMÉTIQUE — recalcule TOUS les totaux depuis les lignes.
// L'IA peut faire des erreurs d'addition (ex: déclare un sous-poste à 13 200€
// alors que la somme des lignes fait 22 200€). Le code, lui, ne se trompe jamais.
// Bloque aussi les valeurs absurdes (prix négatifs, quantités folles).
// ─────────────────────────────────────────────────────────────────────
function _r2(n) { return Math.round((Number(n) || 0) * 100) / 100; }

function fixDevis(result) {
  const report = { corrections: [], blocages: [], warnings: [] };
  if (!result || typeof result !== 'object') {
    report.blocages.push('Résultat invalide');
    return { result, report };
  }
  const variant = result.devis_variante_standard;
  if (variant && typeof variant === 'object') {
    _fixVariant(variant, 'devis_variante_standard', report);
  }
  return { result, report };
}

function _fixVariant(variant, variantKey, report) {
  if (!Array.isArray(variant.prestations)) variant.prestations = [];
  let totalDevisHT = 0;
  for (const p of variant.prestations) {
    if (!p || typeof p !== 'object') continue;
    if (!Array.isArray(p.sous_postes)) p.sous_postes = [];
    let totalPrestationHT = 0;
    for (const sp of p.sous_postes) {
      if (!sp || typeof sp !== 'object') continue;
      if (!Array.isArray(sp.lignes)) sp.lignes = [];
      let totalSousPosteHT = 0;
      for (const l of sp.lignes) {
        if (!l || typeof l !== 'object') continue;
        let qte = Number(l.quantite);
        let pu = Number(l.prix_unitaire_ht);
        // Blocage valeurs absurdes
        if (!Number.isFinite(qte) || qte < 0) {
          report.blocages.push('Ligne "' + String(l.designation || '').slice(0, 40) + '" : quantité invalide (' + l.quantite + ') → forcée à 0');
          qte = 0;
        }
        if (qte > 100000) {
          report.blocages.push('Ligne "' + String(l.designation || '').slice(0, 40) + '" : quantité absurde (' + qte + ') → forcée à 0');
          qte = 0;
        }
        if (!Number.isFinite(pu) || pu < 0) {
          report.blocages.push('Ligne "' + String(l.designation || '').slice(0, 40) + '" : prix unitaire invalide (' + l.prix_unitaire_ht + ') → forcé à 0');
          pu = 0;
        }
        if (pu > 100000) {
          report.blocages.push('Ligne "' + String(l.designation || '').slice(0, 40) + '" : prix unitaire absurde (' + pu + '€) → forcé à 0');
          pu = 0;
        }
        l.quantite = qte;
        l.prix_unitaire_ht = pu;
        const totalLigne = _r2(qte * pu);
        const totalDecl = Number(l.total_ht);
        if (Number.isFinite(totalDecl) && Math.abs(totalLigne - totalDecl) > 0.01) {
          report.corrections.push('Ligne "' + String(l.designation || '').slice(0, 40) + '" : ' + totalDecl + '€ → ' + totalLigne + '€');
        }
        l.total_ht = totalLigne;
        totalSousPosteHT += totalLigne;
      }
      totalSousPosteHT = _r2(totalSousPosteHT);
      const totalSPDecl = Number(sp.total_ht);
      if (Number.isFinite(totalSPDecl) && Math.abs(totalSousPosteHT - totalSPDecl) > 0.01) {
        report.corrections.push('Sous-poste "' + String(sp.titre || '').slice(0, 40) + '" : ' + totalSPDecl + '€ → ' + totalSousPosteHT + '€');
      }
      sp.total_ht = totalSousPosteHT;
      totalPrestationHT += totalSousPosteHT;
    }
    totalPrestationHT = _r2(totalPrestationHT);
    const totalPDecl = Number(p.total_ht);
    if (Number.isFinite(totalPDecl) && Math.abs(totalPrestationHT - totalPDecl) > 0.01) {
      report.corrections.push('Prestation "' + String(p.titre || '').slice(0, 40) + '" : ' + totalPDecl + '€ → ' + totalPrestationHT + '€');
    }
    p.total_ht = totalPrestationHT;
    totalDevisHT += totalPrestationHT;
  }
  totalDevisHT = _r2(totalDevisHT);
  const totalHTDecl = Number(variant.total_ht);
  if (Number.isFinite(totalHTDecl) && Math.abs(totalDevisHT - totalHTDecl) > 0.01) {
    report.corrections.push(variantKey + ' TOTAL HT : ' + totalHTDecl + '€ → ' + totalDevisHT + '€');
  }
  variant.total_ht = totalDevisHT;
  // TVA
  let tauxTVA = Number(variant.taux_tva);
  if (!Number.isFinite(tauxTVA) || tauxTVA < 0 || tauxTVA > 100) {
    tauxTVA = Number(variant.tva_taux) || 10;
    variant.taux_tva = tauxTVA;
  }
  const tvaCalc = _r2(totalDevisHT * tauxTVA / 100);
  const tvaDecl = Number(variant.tva);
  if (Number.isFinite(tvaDecl) && Math.abs(tvaCalc - tvaDecl) > 0.01) {
    report.corrections.push(variantKey + ' TVA ' + tauxTVA + '% : ' + tvaDecl + '€ → ' + tvaCalc + '€');
  }
  variant.tva = tvaCalc;
  // TTC
  const ttcCalc = _r2(totalDevisHT + tvaCalc);
  const ttcDecl = Number(variant.total_ttc);
  if (Number.isFinite(ttcDecl) && Math.abs(ttcCalc - ttcDecl) > 0.01) {
    report.corrections.push(variantKey + ' TOTAL TTC : ' + ttcDecl + '€ → ' + ttcCalc + '€');
  }
  variant.total_ttc = ttcCalc;
  // Acompte
  if (variant.acompte != null) {
    const acpCalc = _r2(ttcCalc * 0.30);
    const acpDecl = Number(variant.acompte);
    if (Number.isFinite(acpDecl) && Math.abs(acpCalc - acpDecl) > 0.01) {
      report.corrections.push(variantKey + ' acompte 30% : ' + acpDecl + '€ → ' + acpCalc + '€');
    }
    variant.acompte = acpCalc;
  }

  // ─── SANITY CHECKS MÉTIER : détecte les prix aberrants ───
  // Liste les unités usuelles et leurs fourchettes (€HT) pour repérer les outliers
  const UNIT_BANDS = {
    'm2':  [3, 800],   // peinture 12€/m², carrelage 60€/m², ITE 250€/m², menuiserie HG 800€/m²
    'm²':  [3, 800],
    'ml':  [5, 500],   // moulures simples 8€/ml, garde-corps 350€/ml
    'm':   [5, 500],
    'u':   [1, 15000], // 1 prise 25€, 1 chaudière 8000€, 1 portail motorisé 14000€
    'h':   [25, 120],  // taux horaire artisan 30-100€/h
    'jour':[150, 800], // 1 jour artisan 250-700€
    'forfait': [50, 50000], // grosses fourchettes acceptables sur forfaits
  };
  for (const p of (variant.prestations || [])) {
    for (const sp of (p.sous_postes || [])) {
      for (const l of (sp.lignes || [])) {
        if (!l || !l.designation) continue;
        const unite = String(l.unite || '').toLowerCase().trim();
        const band = UNIT_BANDS[unite];
        if (!band) continue;
        const pu = Number(l.prix_unitaire_ht);
        if (!Number.isFinite(pu) || pu === 0) continue;
        if (pu < band[0]) {
          report.warnings.push('⚠️ Prix probablement trop bas : "' + String(l.designation).slice(0, 50) + '" à ' + pu + '€/' + unite + ' (marché : ' + band[0] + '-' + band[1] + '€)');
        } else if (pu > band[1]) {
          report.warnings.push('⚠️ Prix probablement trop haut : "' + String(l.designation).slice(0, 50) + '" à ' + pu + '€/' + unite + ' (marché : ' + band[0] + '-' + band[1] + '€)');
        }
      }
    }
  }
}

// Liste de modèles à essayer dans l'ordre — priorité vitesse, fallback vers plus puissant si saturé
// Ordre issu d'un vrai bench (2026-07-12, 4 passages sur une dictée d'électricien,
// mesuré sur les oublis métier repérés — terre, amiante, circuits cuisine, VDI, Enedis) :
//   gemini-3-flash-preview  6/6 · ~10s · 0 échec  ← le meilleur ET le plus rapide
//   gemini-3.5-flash        5-6/6 · ~20s · JSON invalide 1 fois sur 4
//   gemini-3.1-flash-lite   4/6 · ~2s · rate le nb de prises cuisine et la puissance Enedis
// Les anciens (gemini-1.5/2.0/2.5-flash) ont été RETIRÉS par Google → 404.
// Les modèles "pro" sont inaccessibles en gratuit → 429. Tester avant d'en ajouter un.
const GEMINI_MODELS_FALLBACK = ["gemini-3-flash-preview", "gemini-3.5-flash", "gemini-3.1-flash-lite"];

// Compresse une image File en base64 JPEG (max 1200px, qualité 0.8)
function compressImageToBase64(file, maxSize = 1200, quality = 0.8) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxSize || height > maxSize) {
          const ratio = Math.min(maxSize / width, maxSize / height);
          width = Math.round(width * ratio);
          height = Math.round(height * ratio);
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        canvas.toBlob(blob => {
          if (!blob) return reject(new Error("Compression échouée"));
          const r2 = new FileReader();
          r2.onload = e2 => {
            const dataUrl = e2.target.result;
            resolve({ dataUrl, base64: dataUrl.split(',')[1], mimeType: 'image/jpeg', size: blob.size });
          };
          r2.onerror = reject;
          r2.readAsDataURL(blob);
        }, 'image/jpeg', quality);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// Compresse un LOGO d'entreprise → dataURL PNG (préserve transparence), max 400px.
// Renvoie une dataURL prête à mettre dans <img src> et à stocker.
function compressLogoToDataUrl(file, maxSize = 400) {
  return new Promise((resolve, reject) => {
    if (!file) return reject(new Error("Aucun fichier."));
    if (!/^image\//.test(file.type)) return reject(new Error("Choisis une image (PNG, JPG…)."));
    if (file.size > 5 * 1024 * 1024) return reject(new Error("Image trop lourde (5 Mo max)."));
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxSize || height > maxSize) {
          const ratio = Math.min(maxSize / width, maxSize / height);
          width = Math.round(width * ratio);
          height = Math.round(height * ratio);
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        // PNG → conserve la transparence (logos sur fond transparent restent propres)
        try { resolve(canvas.toDataURL('image/png')); }
        catch (err) { reject(new Error("Conversion du logo échouée.")); }
      };
      img.onerror = () => reject(new Error("Image illisible."));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error("Lecture du fichier échouée."));
    reader.readAsDataURL(file);
  });
}

// === PERPLEXITY BRIDGE — appel vers le bridge local Playwright ===
async function tryPerplexityBridge(prompt) {
  let res;
  if (!PERPLEXITY_BRIDGE_URL) {
    // Hors dev local : pas de bridge à joindre. On saute directement au fallback
    // plutôt que d'appeler le port 3001 de la machine du visiteur.
    const e = new Error('Perplexity bridge indisponible hors environnement local.');
    e.netError = true;
    e.bridgeOffline = true;
    throw e;
  }
  try {
    const headers = { 'Content-Type': 'application/json' };
    if (PERPLEXITY_BRIDGE_TOKEN) {
      headers['Authorization'] = 'Bearer ' + PERPLEXITY_BRIDGE_TOKEN;
    }
    res = await fetch(PERPLEXITY_BRIDGE_URL, {
      method: 'POST',
      headers,
      body: JSON.stringify({ prompt, focus: 'pro' }),
      // Timeout long car Perplexity prend 30-90s
      signal: AbortSignal.timeout(180000),
    });
  } catch (netErr) {
    const e = new Error('Perplexity bridge offline ou inatteignable (' + (netErr?.message || 'fetch fail') + ').');
    e.netError = true;
    e.bridgeOffline = true;
    throw e;
  }
  if (!res.ok) {
    let msg = `HTTP ${res.status}`;
    try { const err = await res.json(); if (err.error) msg = err.error; } catch {}
    const e = new Error('Perplexity bridge: ' + msg);
    e.status = res.status;
    throw e;
  }
  const data = await res.json();
  if (data.parsed) {
    console.info(`[DevisFlash] Perplexity OK en ${data.elapsed_ms}ms`);
    return data.parsed;
  }
  if (data.parseError) {
    // Tentative d'extraction manuelle
    const match = (data.raw || '').match(/\{[\s\S]*\}/);
    if (match) {
      try { return JSON.parse(match[0]); } catch {}
    }
    throw new Error('Perplexity réponse mais JSON invalide: ' + data.parseError);
  }
  throw new Error('Perplexity réponse vide.');
}

// === AWS Bedrock Converse API ===
// Auth Bearer Token (feature API Keys d'Amazon Bedrock, lancée août 2024).
// Le navigateur enverra peut-être une preflight OPTIONS — AWS Bedrock peut ne PAS répondre CORS.
// Si tu vois "CORS policy" dans la console navigateur, il faut un proxy serveur.
//
// PROMPT CACHING ACTIVÉ : la partie statique du prompt (toutes les règles + format JSON,
// ~95% du prompt) est mise en cache côté Bedrock. Coût input réduit de 90%, latence -80%
// sur les appels suivants dans les 5 minutes qui suivent.
async function tryBedrockModel(modelId, promptParts, key, photos) {
  const url = `https://bedrock-runtime.${BEDROCK_REGION}.amazonaws.com/model/${encodeURIComponent(modelId)}/converse`;

  // Si on reçoit un string (ancien format), on le passe en partie dynamique uniquement
  const isParts = promptParts && typeof promptParts === 'object' && promptParts.system_static;
  const systemBlocks = isParts
    ? [
        { text: promptParts.system_static },
        { cachePoint: { type: 'default' } }, // ← marque la fin du bloc à cacher
      ]
    : null;
  const userText = isParts ? promptParts.user_dynamic : promptParts;

  const userContent = [{ text: userText }];
  if (Array.isArray(photos)) {
    for (const p of photos) {
      if (p && p.base64) {
        userContent.push({
          image: {
            format: (p.mimeType || 'image/jpeg').replace('image/', ''), // jpeg | png | gif | webp
            source: { bytes: p.base64 },
          },
        });
      }
    }
  }

  const body = {
    messages: [{ role: 'user', content: userContent }],
    inferenceConfig: { maxTokens: 16000, temperature: 0.1 }, // 0.1 au lieu de 0.4 → prix stables pour le même devis
  };
  if (systemBlocks) body.system = systemBlocks;

  let res;
  try {
    res = await fetch(url, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${key}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(body),
    });
  } catch (netErr) {
    const e = new Error("RÉSEAU Bedrock: " + (netErr?.message || 'fetch failed') + " — probable CORS (AWS ne sert pas les requêtes navigateur direct). Un proxy serveur est requis.");
    e.netError = true;
    console.error('[DevisFlash] Erreur réseau Bedrock:', netErr);
    throw e;
  }
  if (!res.ok) {
    let msg = `HTTP ${res.status}`;
    try { const err = await res.json(); if (err.message || err.Message) msg = err.message || err.Message; } catch {}
    const e = new Error('Bedrock: ' + msg);
    e.status = res.status;
    e.overloaded = (res.status === 503 || res.status === 429 || /throttl|overload|capacity|unavailable/i.test(msg));
    throw e;
  }
  const data = await res.json();
  const text = data.output?.message?.content?.[0]?.text;
  if (!text) throw new Error("Réponse Bedrock vide.");

  // Log cache stats si présent (pour vérifier que le caching marche)
  if (data.usage) {
    const u = data.usage;
    const cacheRead = u.cacheReadInputTokens || u.cache_read_input_tokens || 0;
    const cacheWrite = u.cacheWriteInputTokens || u.cache_creation_input_tokens || 0;
    if (cacheRead > 0 || cacheWrite > 0) {
      console.info(`[Bedrock] Cache: read=${cacheRead}, write=${cacheWrite}, total_input=${u.inputTokens || u.input_tokens || '?'}`);
    }
  }

  // Claude peut entourer le JSON de markdown — on extrait le bloc {…}
  const jsonText = text.replace(/```(?:json)?\s*|\s*```$/g, '').trim();
  const match = jsonText.match(/\{[\s\S]*\}/);
  if (!match) throw new Error("Claude n'a pas renvoyé de JSON valide.");
  try { return JSON.parse(match[0]); }
  catch { throw new Error("Le JSON renvoyé par Claude est invalide."); }
}

// ─── APPEL IA : deux chemins, zéro clé exposée ───
// • Site public : via le PROXY (fonction serveur Supabase) qui détient la clé.
// • Dev local : appel Google direct avec la clé de keys.local.js (gitignoré) —
//   permet de développer sans dépendre du proxy déployé.
// Renvoie le texte brut de l'IA. `search: true` active la recherche Google
// (comparateur de prix) — dans ce cas le JSON est extrait du texte par l'appelant.
async function callIaRaw(modelName, prompt, photos, opts = {}) {
  const localKey = IS_LOCAL_DEV ? getGeminiKey() : "";
  const wantSearch = opts.search === true;

  let res;
  try {
    if (localKey) {
      const parts = [{ text: prompt }];
      if (Array.isArray(photos)) {
        for (const p of photos) {
          if (p && p.base64) parts.push({ inlineData: { mimeType: p.mimeType || 'image/jpeg', data: p.base64 } });
        }
      }
      res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${localKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts }],
          ...(wantSearch ? { tools: [{ google_search: {} }] } : {}),
          generationConfig: {
            temperature: opts.temperature ?? 0.1,
            ...(opts.maxOutputTokens ? { maxOutputTokens: opts.maxOutputTokens } : {}),
            ...(wantSearch ? {} : { responseMimeType: "application/json" }),
          },
        }),
      });
    } else {
      const parts = Array.isArray(photos)
        ? photos.filter(p => p && p.base64).map(p => ({ base64: p.base64, mimeType: p.mimeType || 'image/jpeg' }))
        : [];
      res = await fetch(IA_PROXY_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': 'Bearer ' + (await getAccessToken()),
        },
        body: JSON.stringify({
          prompt, model: modelName, photos: parts,
          temperature: opts.temperature ?? 0.1,
          search: wantSearch,
          max_output_tokens: opts.maxOutputTokens,
        }),
      });
    }
  } catch (netErr) {
    const e = new Error("RÉSEAU: " + (netErr && netErr.message ? netErr.message : 'fetch failed') + " — vérifie : extensions navigateur (uBlock, AdGuard), antivirus, ou navigation privée.");
    e.netError = true;
    console.error('[DevisFlash] Erreur réseau IA:', netErr);
    throw e;
  }

  const data = await res.json().catch(() => ({}));
  if (!res.ok) {
    const msg = data.error?.message || data.error || `HTTP ${res.status}`;
    const e = new Error(msg);
    e.status = res.status;
    e.overloaded = (res.status === 503 || res.status === 429 || res.status === 502 || /overload|unavailable|quota|rate/i.test(String(msg)));
    throw e;
  }
  const text = localKey
    ? (data.candidates?.[0]?.content?.parts?.map(p => p.text || '').join('') || '')
    : (data.text || '');
  if (!text) throw new Error("Réponse vide de l'IA.");
  return text;
}

// Génération structurée (devis, conseil) : texte IA → objet JSON.
async function tryGeminiModel(modelName, prompt, key, photos) {
  const text = await callIaRaw(modelName, prompt, photos);
  try { return JSON.parse(text); }
  catch {
    // Un JSON malformé arrive ~1 fois sur 4 sur certains modèles. Ce n'est pas
    // une erreur fatale : on marque l'échec comme "réessayable" pour que la
    // cascade retente, puis bascule sur le modèle suivant. Sans ce flag,
    // l'utilisateur voyait une erreur alors qu'un simple retry suffisait.
    const e = new Error("L'IA n'a pas renvoyé un JSON valide.");
    e.status = 502;
    e.overloaded = true;
    throw e;
  }
}

const sleep = (ms) => new Promise(r => setTimeout(r, ms));

async function callGeminiExpert(ctx, dictee, photos) {
  const hasPhotos = Array.isArray(photos) && photos.length > 0;
  const promptParts = _buildExpertPromptParts(ctx, dictee, hasPhotos);
  // Concaténation pour Perplexity + Gemini (qui ne supportent pas le cache)
  const promptFull = promptParts.system_static + '\n\n' + promptParts.user_dynamic;

  // ─── PRIMAIRE : Perplexity Bridge (compte Pro via Playwright) ───
  // Photos non supportées par le bridge (Perplexity webapp n'accepte pas images programmatiquement)
  if (!hasPhotos) {
    try {
      console.info('[DevisFlash] Tentative Perplexity Bridge...');
      const result = await tryPerplexityBridge(promptFull);
      return result;
    } catch (e) {
      if (e.bridgeOffline) {
        console.warn('[DevisFlash] Perplexity bridge offline, bascule sur Bedrock.');
      } else {
        console.warn('[DevisFlash] Perplexity bridge échec (' + e.message + '), bascule sur Bedrock.');
      }
    }
  }

  // ─── SECONDAIRE : AWS Bedrock — Sonnet 4.6 / Haiku 4.5 / Sonnet 4.5 (avec prompt caching) ───
  const bedrockKey = getBedrockKey();
  if (bedrockKey) {
    let bedrockLastErr = null;
    for (const modelId of BEDROCK_MODELS_FALLBACK) {
      for (let attempt = 0; attempt < 2; attempt++) {
        try {
          console.info('[DevisFlash] Tentative Bedrock', modelId, 'attempt', attempt + 1);
          // ON PASSE LES PARTS pour activer le prompt caching côté Bedrock
          return await tryBedrockModel(modelId, promptParts, bedrockKey, photos);
        } catch (e) {
          bedrockLastErr = e;
          // Erreur réseau (CORS notamment) ou clé refusée → on bascule directement sur Gemini
          if (e.netError || e.status === 403 || e.status === 401) {
            console.warn('[DevisFlash] Bedrock indisponible (' + (e.netError ? 'CORS/réseau' : 'HTTP ' + e.status) + '), bascule sur Gemini.');
            bedrockLastErr = null; // pas une vraie erreur, fallback normal
            break; // sort des 2 boucles for via le break externe ci-dessous
          }
          // Erreur 400 (modèle inconnu, accès non activé) → on tente le modèle suivant
          if (e.status === 400 || e.status === 404) {
            console.warn('[DevisFlash] Bedrock model rejected:', modelId, '—', e.message);
            break; // sort de la boucle attempt, passe au modèle suivant
          }
          if (!e.overloaded) {
            // erreur grave (autre 4xx/5xx non recoverable) → on remonte
            throw new Error("Bedrock: " + (e.message || `HTTP ${e.status}`));
          }
          if (attempt === 0) await sleep(1200);
        }
      }
      // Si on a eu netError/401/403, on arrête la boucle Bedrock complètement
      if (bedrockLastErr === null) break;
    }
    // Si on arrive ici sans return, Bedrock a échoué — on continue vers Gemini
  }

  // ─── Gemini via le proxy serveur (plus de clé côté navigateur) ───
  const key = null; // la clé vit sur le serveur ; conservé pour la signature d'appel
  let lastErr = null;
  for (let i = 0; i < GEMINI_MODELS_FALLBACK.length; i++) {
    const model = GEMINI_MODELS_FALLBACK[i];
    for (let attempt = 0; attempt < 2; attempt++) {
      try {
        return await tryGeminiModel(model, promptFull, key, photos);
      } catch (e) {
        lastErr = e;
        if (!e.status) {
          if (e.netError) throw e;
          throw new Error("Erreur réseau : " + (e.message || 'inconnue'));
        }
        if (!e.overloaded) {
          if (e.status === 400) { console.error("[DevisFlash] IA HTTP 400:", e.message); throw new Error("L'assistant IA n'a pas pu traiter ta demande. Réessaie — si ça persiste, reformule ta description."); }
          if (e.status === 403) { console.error("[DevisFlash] IA HTTP 403:", e.message); throw new Error("L'assistant IA est momentanément indisponible. Réessaie dans quelques minutes."); }
          throw new Error(`HTTP ${e.status} — ${e.message || 'erreur inconnue'}`);
        }
        if (attempt === 0) await sleep(1200);
      }
    }
  }
  throw new Error("L'assistant IA est très demandé en ce moment. Réessaie dans une minute.");
}

// === PRODUCT FINDER IA (Gemini + Google Search grounding) ===
// Trouve les vraies fiches produits dans le catalogue d'un magasin avec recherche web live.
//
// STRATÉGIE : on découpe en BATCHES de 3 produits et on appelle Gemini en parallèle.
// Avec grounding, Gemini a une limite de tool calls/requête. Sur 9 produits il abandonne ;
// sur 3 il fait du bon boulot. 3 appels parallèles × 3 produits = 9 produits couverts en
// le même temps qu'un appel mono mais avec une qualité bien plus stable.
const IA_BATCH_SIZE = 3;

async function findProductsWithGemini(store, productLines) {
  const key = null; // clé côté serveur (proxy) — plus rien dans le navigateur

  if (productLines.length === 0) return [];

  // Découpe en batches de 3 max
  const batches = [];
  for (let i = 0; i < productLines.length; i += IA_BATCH_SIZE) {
    batches.push(productLines.slice(i, i + IA_BATCH_SIZE));
  }

  // SÉQUENTIEL + retry avec backoff long pour respecter rate limit Gemini (15 RPM free)
  const results = [];
  for (let batchIdx = 0; batchIdx < batches.length; batchIdx++) {
    const batch = batches[batchIdx];
    let batchResult = null;

    // Tente jusqu'à 2 fois avec délais longs (rate limit Gemini)
    for (let attempt = 1; attempt <= 2; attempt++) {
      try {
        batchResult = await findProductsBatch(store, batch, batchIdx * IA_BATCH_SIZE, key);
        break;
      } catch (err) {
        const isRateLimit = /rate|429|quota|limit/i.test(err.message);
        console.warn(`[DevisFlash IA] Batch ${batchIdx} attempt ${attempt}/2 (rate: ${isRateLimit}):`, err.message);
        if (attempt < 2) {
          // Si rate limit → attendre 30s (window Gemini RPM). Sinon: 3s.
          await sleep(isRateLimit ? 30000 : 3000);
        }
      }
    }

    // Fallback si echec
    if (!batchResult) {
      batchResult = batch.map((line, j) => ({
        index: batchIdx * IA_BATCH_SIZE + j + 1,
        query_devis: line.designation,
        found: false,
        product_name: line.designation,
        url: null,
        price_eur: null,
        availability: 'À vérifier — clic relance recherche',
        image_url: null
      }));
    }

    results.push(...batchResult);

    // Pause 4s entre batches (rate limit Gemini : 15 RPM = 1 toutes les 4s max)
    if (batchIdx < batches.length - 1) {
      await sleep(4000);
    }
  }

  return results;
}

   - 2ème si rien : "[matériau] acheter prix" (sans contrainte de site)
   - 3ème si rien : "[matériau] marque" (ex: Geberit, Grohe, Jacob Delafon, Schneider, Legrand)

2. PRIORITÉ ABSOLUE AUX FICHES PRODUITS : l'URL doit pointer vers une page produit individuelle avec photo + prix visible.
   ❌ PAS d'articles de blog
   ❌ PAS de "conseils d'experts"

3. SI VRAIMENT RIEN sur ${store.name} → propose un produit équivalent chez :
   Leroy Merlin, Castorama, Brico Dépôt, ManoMano, Lapeyre, Mr.Bricolage.
   L'artisan préfère un lien utile chez un autre fournisseur qu'un "non trouvé".

4. PRIX RÉEL OBLIGATOIRE : extrais le prix EXACT affiché sur la fiche.

5. AVAILABILITY — RÈGLE PAR DÉFAUT : "En stock"
   Si le produit a une fiche en ligne avec prix → "En stock" (présomption raisonnable).
   N'utilise "Indisponible / Rupture" QUE si tu vois explicitement "Rupture", "Épuisé", "Hors stock" ou "Non commercialisé" sur la page.
   Statuts acceptés :
   - "En stock" (défaut, si fiche produit visible) ← UTILISE EN PRIORITÉ
   - "Sur commande Xj" (si délai mentionné)
   - "Devis pro sur demande" (sites B2B comme Point.P, Cedeo, etc.)
   - "Rupture" / "Épuisé" (UNIQUEMENT si vu textuellement sur la fiche)
   ⚠️ Ne JAMAIS mettre "Indisponible" par défaut.

6. ⛔ NE JAMAIS renvoyer "found: false" SANS URL.
   Si rien d'idéal n'existe → propose au MINIMUM une page catégorie ou une recherche sur le site, mais TOUJOURS un lien utile.

7. IMAGE : si tu vois une image produit dans les résultats, donne son URL absolue.

FORMAT DE SORTIE — JSON STRICT, AUCUN TEXTE AVANT OU APRÈS, dans un bloc \`\`\`json :

\`\`\`json
{
  "results": [
    {
      "index": 1,
      "query_devis": "Texte original de la ligne du devis",
      "found": true,
      "store_name": "${store.name} ou autre enseigne si trouvé ailleurs",
      "product_name": "Nom exact du produit sur la fiche",
      "url": "URL fiche produit (OBLIGATOIRE, jamais vide)",
      "price_eur": 245.0,
      "availability": "En stock | Sur commande Xj | Devis pro | ...",
      "image_url": "https://... ou null"
    }
  ]
}
\`\`\`

JSON parsable obligatoire.`;

  // Recherche de prix en ligne : passe par le chemin IA unifié (proxy en prod,
  // clé locale en dev) avec la recherche Google activée. Le modèle vient de la
  // cascade à jour — l'ancien appel figeait un modèle aujourd'hui retiré (404).
  const text = await callIaRaw(GEMINI_MODELS_FALLBACK[0], prompt, null, {
    search: true,
    temperature: 0,
    maxOutputTokens: 16384,
  });
  const finishReason = ''; // plus exposé par le chemin unifié — servait uniquement aux logs

  // Extrait le JSON du bloc markdown ou du texte brut
  const jsonMatch = text.match(/```json\s*([\s\S]*?)\s*```/) ||
                    text.match(/```\s*([\s\S]*?)\s*```/) ||
                    text.match(/(\{[\s\S]*\})/);
  if (!jsonMatch) {
    console.warn('[DevisFlash IA] Pas de JSON dans la réponse:', text.slice(0, 500));
    throw new Error("Format de réponse non reconnu.");
  }

  let parsed;
  try { parsed = JSON.parse(jsonMatch[1]); }
  catch (e) {
    console.warn('[DevisFlash IA] JSON invalide. Raw:', jsonMatch[1].slice(0, 500));
    throw new Error("JSON invalide : " + e.message);
  }

  const rawResults = parsed.results || [];
  // Remappe les index + force "En stock" par défaut si URL valide + prix
  // (Gemini renvoie souvent "Indisponible" par défaut alors que les produits sont OK)
  const results = rawResults.map((r, i) => {
    let availability = r.availability || '';
    const hasValidUrl = r.url && r.url.startsWith('http');
    const hasPrice = r.price_eur != null && Number(r.price_eur) > 0;

    // Si Gemini dit "Indisponible" mais qu'on a URL + prix → probablement "En stock"
    if (hasValidUrl && hasPrice) {
      const lowered = availability.toLowerCase();
      const isUncertain = !lowered || /indisponible|non disponible|inconnu|à vérifier/.test(lowered);
      if (isUncertain) {
        availability = 'En stock';
      }
    }

    return {
      ...r,
      availability,
      index: startIndex + i + 1
    };
  });
  // Log si Gemini en a renvoyé moins que demandé (utile pour debug)
  if (results.length < expectedCount) {
    console.warn(`[DevisFlash IA] Batch (start=${startIndex}) : Gemini a renvoyé ${results.length}/${expectedCount} résultats (finishReason: ${finishReason}).`);
  }
  // Si Gemini a tronqué (MAX_TOKENS), on remonte un drapeau pour info UI
  if (finishReason === 'MAX_TOKENS') {
    console.warn('[DevisFlash IA] Réponse tronquée par MAX_TOKENS');
  }
  return results;
}

// Aplatit une structure hiérarchique prestations/sous_postes/lignes en lignes flat.
// IMPORTANT : recalcule les sous-totaux côté client (les valeurs annoncées par Gemini peuvent être erronées).
function flattenPrestations(variantData) {
  const out = [];
  if (Array.isArray(variantData.prestations)) {
    for (const pr of variantData.prestations) {
      if (!Array.isArray(pr.sous_postes)) continue;
      // Recalcule total de la prestation depuis les lignes
      let prRecomputed = 0;
      for (const sp of pr.sous_postes) {
        if (!Array.isArray(sp.lignes)) continue;
        let spRecomputed = 0;
        for (const l of sp.lignes) {
          const q = parseFloat(l.quantite) || 0;
          const p = parseFloat(l.prix_unitaire_ht) || 0;
          spRecomputed += Math.round(q * p * 100) / 100;
        }
        spRecomputed = Math.round(spRecomputed * 100) / 100;
        // Remplace le total annoncé par le recalculé
        const spFixed = { ...sp, total_ht: spRecomputed };
        prRecomputed += spRecomputed;
        for (const l of sp.lignes) {
          out.push({ ...l, _prestation: { ...pr }, _sousPoste: spFixed });
        }
      }
      prRecomputed = Math.round(prRecomputed * 100) / 100;
      // Patch _prestation.total_ht avec la valeur recalculée pour TOUTES les lignes de cette prestation
      for (const item of out) {
        if (item._prestation && item._prestation.numero === pr.numero && item._prestation.titre === pr.titre) {
          item._prestation.total_ht = prRecomputed;
        }
      }
    }
  } else if (Array.isArray(variantData.lignes)) {
    // Backward-compat : ancienne structure plate
    for (const l of variantData.lignes) out.push(l);
  }
  return out;
}

function geminiToMarkdown(geminiResult, variantKey, artisan, client, projet) {
  const variantData = geminiResult[variantKey === 'standard' ? 'devis_variante_standard' : 'devis_variante_premium'];
  if (!variantData) throw new Error("Données IA incomplètes.");
  const flat = flattenPrestations(variantData);
  if (flat.length === 0) throw new Error("Aucune ligne de devis dans la réponse IA.");

  const lines = flat.map(l => {
    const q = parseFloat(l.quantite) || 0;
    const p = parseFloat(l.prix_unitaire_ht) || 0;
    const baseDesc = l.designation || 'Prestation';
    const loc = l.localisation && l.localisation.trim();
    const description = loc ? `${loc} : ${baseDesc}` : baseDesc;
    return {
      description,
      quantity: q,
      unit: normUnit(l.unite || 'u'),
      unitPrice: p,
      total: Math.round(q * p * 100) / 100,
      _section: l._prestation ? `${l._prestation.numero || ''} ${l._prestation.titre || ''}`.trim() : null,
      _subsection: l._sousPoste ? `${l._sousPoste.numero || ''} ${l._sousPoste.titre || ''}`.trim() : null,
      _sectionTotal: l._prestation ? parseFloat(l._prestation.total_ht) : null,
      _subsectionTotal: l._sousPoste ? parseFloat(l._sousPoste.total_ht) : null,
    };
  });

  let md = buildQuoteMarkdown(artisan, client, projet, lines);

  // ========== BLOC D'ANALYSE IA (après "Objet :") ==========
  let prefix = '';

  // Niveau de confiance global (badge en tête)
  const confiance = parseInt(geminiResult.niveau_confiance_global, 10);
  if (Number.isFinite(confiance) && confiance > 0) {
    const color = confiance >= 80 ? '#15803D' : (confiance >= 60 ? '#B45309' : '#B91C1C');
    prefix += `<div class="qg-confidence" style="border-color:${color};color:${color}"><b>Niveau de confiance IA : ${confiance} %</b> — Devis basé sur les informations fournies ; à valider avec les points à confirmer ci-dessous.</div>\n\n`;
  }

  // Argumentaire Premium
  if (variantKey === 'premium') {
    const arg = variantData.argumentaire_client || variantData.explication_upsell;
    if (arg) prefix += `> **Argumentaire Premium** — ${arg}\n\n`;
  }

  // Hypothèses faites par l'IA
  if (Array.isArray(geminiResult.hypotheses) && geminiResult.hypotheses.length) {
    prefix += `> **Hypothèses prises par l'IA** — ${geminiResult.hypotheses.join(' · ')}\n\n`;
  }

  // Points à confirmer sur place
  if (Array.isArray(geminiResult.points_a_confirmer) && geminiResult.points_a_confirmer.length) {
    prefix += `> **À confirmer sur place avant démarrage** — ${geminiResult.points_a_confirmer.join(' · ')}\n\n`;
  }

  const a = geminiResult.analyse_ia || {};

  // Avertissements techniques (formulation prudente)
  if (Array.isArray(a.avertissements_techniques) && a.avertissements_techniques.length) {
    prefix += `> **À vérifier (avertissements techniques)** — ${a.avertissements_techniques.join(' · ')}\n\n`;
  }

  // Postes ajoutés par l'IA (anti-oubli)
  const postesAjoutes = a.postes_oublies_ajoutes || a.oublis_detectes;
  if (Array.isArray(postesAjoutes) && postesAjoutes.length) {
    prefix += `> **Postes ajoutés automatiquement par l'IA** — ${postesAjoutes.join(', ')}\n\n`;
  }

  // Facteurs de risque / contraintes
  if (Array.isArray(a.facteurs_risque) && a.facteurs_risque.length) {
    prefix += `> **Contraintes identifiées** — ${a.facteurs_risque.join(' · ')}\n\n`;
  }

  if (prefix) {
    const idx = md.indexOf('**Objet :**');
    if (idx >= 0) {
      const eol = md.indexOf('\n\n', idx);
      if (eol > 0) md = md.substring(0, eol + 2) + prefix + md.substring(eol + 2);
    }
  }

  // ========== BLOC AVANT "MENTIONS LÉGALES" ==========
  const mlIdx = md.indexOf('**Mentions légales**');
  if (mlIdx >= 0) {
    let insertions = '';

    // Délai estimé (public)
    if (geminiResult.delai_estime && (geminiResult.delai_estime.duree || geminiResult.delai_estime.commentaire)) {
      const d = geminiResult.delai_estime;
      insertions += `**Délai d'exécution estimé :** ${d.duree || 'à définir'}${d.commentaire ? ' — ' + d.commentaire : ''}\n\n`;
    }

    // Acompte recommandé (public, remplace l'acompte générique)
    if (geminiResult.acompte_recommande && Number.isFinite(parseFloat(geminiResult.acompte_recommande.pourcentage))) {
      const ac = geminiResult.acompte_recommande;
      insertions += `**Acompte recommandé :** ${ac.pourcentage} %${ac.justification ? ` — ${ac.justification}` : ''}\n\n`;
    }

    // Alertes rentabilité (info artisan)
    if (Array.isArray(a.alertes_rentabilite) && a.alertes_rentabilite.length) {
      insertions += `<div class="qg-internal"><b>Alertes rentabilité (info artisan)</b><ul>${a.alertes_rentabilite.map(x => `<li>${x}</li>`).join('')}</ul></div>\n\n`;
    }

    // Alertes litige (info artisan)
    if (Array.isArray(a.alertes_litige) && a.alertes_litige.length) {
      insertions += `<div class="qg-internal"><b>Alertes litige (info artisan)</b><ul>${a.alertes_litige.map(x => `<li>${x}</li>`).join('')}</ul></div>\n\n`;
    }

    // Marge estimée (info artisan)
    const marge = variantData.marge_estimee_pourcentage;
    if (marge && Number.isFinite(parseFloat(marge))) {
      insertions += `<div class="qg-internal"><p><em>Marge nette estimée : ${parseFloat(marge).toFixed(0)} % (info artisan, non visible client)</em></p></div>\n\n`;
    }

    if (insertions) {
      md = md.substring(0, mlIdx) + insertions + md.substring(mlIdx);
    }
  }

  // ========== BLOCS EN FIN DE DEVIS ==========

  // Message client prêt à envoyer (info artisan)
  if (geminiResult.message_client && (geminiResult.message_client.version_courte || geminiResult.message_client.version_pro)) {
    const mc = geminiResult.message_client;
    md += `\n\n<div class="qg-internal">\n\n### Message client prêt à envoyer\n\n*À copier-coller dans ton SMS ou email — info artisan.*\n\n`;
    if (mc.version_courte) md += `**Version SMS (courte) :**\n\n> ${mc.version_courte}\n\n`;
    if (mc.version_pro) md += `**Version email (pro) :**\n\n> ${mc.version_pro}\n\n`;
    md += `</div>`;
  }

  // Liste de courses fournisseur (info artisan)
  if (Array.isArray(geminiResult.liste_courses_fournisseur) && geminiResult.liste_courses_fournisseur.length) {
    md += `\n\n<div class="qg-internal">\n\n### Liste de courses fournisseur\n\n*Matériaux à commander chez le grossiste (basé sur la variante Standard) — info artisan.*\n\n`;
    for (const item of geminiResult.liste_courses_fournisseur) {
      const nom = item.materiel || item.designation || 'Matériel';
      const qte = item.quantite_estimee || item.quantite || 'quantité à confirmer';
      md += `- **${nom}** — ${qte}\n`;
    }
    md += `\n</div>`;
  }

  return md;
}

function lookupBTPPrice(designation) {
  if (!designation) return null;
  for (const item of BTP_PRICES_DB) {
    if (item.match.test(designation)) {
      return {
        name: item.name,
        priceMin: item.min,
        priceMax: item.max,
        priceAvg: Math.round((item.min + item.max) / 2),
        unit: item.unit,
      };
    }
  }
  return null;
}

// Extrait un terme de recherche court et UTILE depuis une désignation pleine.
// Stratégie : ne garder QUE le matériau, virer le verbe d'action + chiffres/unités/dimensions.
function searchTermFromDesignation(desig) {
  if (!desig) return '';
  let s = desig
    // 0. Vire le verbe d'action en TÊTE de ligne (sinon Google trouve "comment poser X" au lieu de "X")
    .replace(/^\s*[-–·•]?\s*(?:fourniture\s+(?:et|&|\+)\s+pose|fourniture\s+(?:et|&|\+)\s+installation|installation\s+(?:et|&|\+)\s+raccordement)\s+(?:de\s+|du\s+|d['']\s*|des\s+)?/i, '')
    .replace(/^\s*[-–·•]?\s*(?:pose|dépose|d[ée]molition|démontage|évacuation|installation|raccordement|montage|fourniture|achat|reprise|remplacement|découpe|tirage|saignées?|raccord|raccordage|raclage)\s+(?:de\s+|du\s+|d['']\s*|des\s+|la\s+|le\s+|les\s+)?/i, '')
    // 1. Vire les parenthèses et leur contenu : "(8m²)", "(estimation)", "(fourni par le client)"
    .replace(/\([^)]*\)/g, ' ')
    // 2. Vire les dimensions : "60x30", "60×30", "90x120"
    .replace(/\b\d+\s*[x×]\s*\d+(?:\s*[x×]\s*\d+)?\b/gi, ' ')
    // 3. Vire les nombres avec unités : "8m²", "180 ml", "14 h", "3 jours"
    .replace(/\b\d+(?:[.,]\d+)?\s*(?:m²|m2|m³|m3|ml|kg|tonnes?|litres?|heures?|jours?|cm|mm|km|forfait)s?\b/gi, ' ')
    // 4. Vire les nombres restants suivis d'un mot d'unité court (h, m, l, t, u)
    .replace(/\b\d+(?:[.,]\d+)?\s*[hmltu]\b/gi, ' ')
    // 5. Vire les nombres seuls
    .replace(/\b\d+(?:[.,]\d+)?\b/g, ' ')
    // 6. Vire la ponctuation et tirets résiduels
    .replace(/[·•:;,\-–—]+/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();

  // Découpe en mots, filtre les mots-vides courts et les conjonctions
  const STOPWORDS = new Set(['et', 'ou', 'le', 'la', 'les', 'de', 'du', 'des', 'au', 'aux', 'un', 'une', 'avec', 'sans', 'pour', 'par', 'en']);
  const words = s.split(' ').filter(w => w.length > 1 && !STOPWORDS.has(w.toLowerCase()));

  // Garde les 4 premiers mots utiles — suffisant pour Google
  return words.slice(0, 4).join(' ') || desig.trim();
}
