                    <option value="electricien">Électricien</option>
                    <option value="plombier">Plombier / chauffagiste</option>
                    <option value="macon">Maçon / gros œuvre</option>
                    <option value="peintre">Peintre</option>
                    <option value="couvreur">Couvreur / zingueur</option>
                    <option value="menuisier">Menuisier</option>
                    <option value="carreleur">Carreleur</option>
                    <option value="facadier">Façadier</option>
                    <option value="autre">Autre métier BTP</option>
                  </select>
                </div>
                <label className="af-terms">
                  <input type="checkbox" checked={su.terms} onChange={(e) => setSu({...su, terms: e.target.checked})}/>
                  <span>J'ai lu les <a href="#" onClick={(e) => { e.preventDefault(); window.dispatchEvent(new CustomEvent('devisflash:open-legal', { detail: 'cgv' })); }}>conditions d'utilisation</a> de DevisFlash et je les accepte.</span>
                </label>
                <button className="af-submit" type="submit" disabled={loading}>
                  {loading ? 'Création en cours…' : 'Créer mon compte (14 jours gratuits)'}
                </button>
              </form>
              <p className="af-foot">
                Tu as déjà un compte ?
                <a className="af-link" href="#" onClick={(e) => { e.preventDefault(); setError(''); setMode('login'); }}>Se connecter</a>
              </p>
            </React.Fragment>
          )}

          {/* ─── SIGNUP — Saisie du code OTP 6 chiffres reçu par email ─── */}
          {mode === 'signup-email-confirm' && (
            <React.Fragment>
              <div style={{textAlign:'center'}}>
                <div style={{width:64, height:64, margin:'0 auto 16px', borderRadius:'50%', background:'#FFF7ED', display:'flex', alignItems:'center', justifyContent:'center'}}>
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#E04E1A" strokeWidth="2"><path d="M4 6h16v12H4z"/><path d="m4 7 8 6 8-6"/></svg>
                </div>
                <h2 className="af-title" style={{marginBottom:8}}>Entre ton code</h2>
                <p className="af-sub" style={{marginBottom:24, fontSize:13.5}}>
                  Code de vérification envoyé à<br/><b style={{color:'#1A1A1A'}}>{su.email}</b>
                </p>

                {error && <div className="af-error-msg" style={{textAlign:'left', marginBottom:14}}>{error}</div>}

                <OtpInput
                  value={otpCode}
                  onChange={setOtpCode}
                  onComplete={(code) => submitOtp(code)}
                  disabled={loading}
                />

                <button
                  type="button"
                  className="af-submit"
                  style={{marginTop:20, width:'100%', opacity: (loading || otpCode.replace(/\D/g,'').length < 6) ? 0.5 : 1}}
                  disabled={loading || otpCode.replace(/\D/g,'').length < 6}
                  onClick={() => submitOtp(otpCode)}
                >
                  {loading ? 'Vérification…' : 'Valider mon code'}
                </button>

                <div style={{marginTop:32, paddingTop:24, borderTop:'1px solid #F0EBE0'}}>
                  <p style={{fontSize:12.5, color:'#9CA3AF', margin:'0 0 12px'}}>Pas reçu de code ?</p>
                  <button
                    type="button"
                    onClick={async () => {
                      setError('');
                      try {
                        await window.DevisFlashAuth.resendOtp(su.email);
                        window.dfToast({ type: 'success', title: 'Nouveau code envoyé', message: "Vérifie ta boîte mail (et les spams)." });
                      } catch (err) {
                        setError(err.message || "Impossible de renvoyer le code.");
                      }
                    }}
                    style={{background:'transparent', border:'none', color:'#E04E1A', fontSize:13, fontWeight:600, cursor:'pointer', textDecoration:'underline'}}
                  >
                    Renvoyer un code
                  </button>
                  <span style={{margin:'0 8px', color:'#D1D5DB'}}>·</span>
                  <button
                    type="button"
                    onClick={() => { setMode('signup'); setOtpCode(''); setError(''); }}
                    style={{background:'transparent', border:'none', color:'#6B7280', fontSize:13, cursor:'pointer', textDecoration:'underline'}}
                  >
                    Changer d'email
                  </button>
                </div>
              </div>
            </React.Fragment>
          )}

          {/* ─── SIGNUP step 2 — country, address, phone ─── */}
          {mode === 'signup-step2' && (
            <React.Fragment>
              <h2 className="af-title">Encore quelques détails</h2>
              <p className="af-sub">Indique où est basée ton entreprise pour les bons taux de TVA et mentions légales.</p>
              {error && <div className="af-error-msg">{error}</div>}
              <form onSubmit={submitSignupStep2}>
                <div className="af-country-section">
                  <label className="af-country-label">Mon entreprise est basée en :</label>
                  <button type="button" className="af-country-trigger" onClick={() => setCountryOpen(true)}>
                    <span className="flag">{country.flag}</span>
                    <span className="name">{country.name}</span>
                    <span className="hint">choisir un autre pays…</span>
                  </button>
                  <p className="af-helper-red">Ce choix n'est pas modifiable par la suite.</p>
                </div>

                <label className="af-section-label">Mon adresse (facultatif)</label>
                <div className="af-address-block">
                  <input type="text" placeholder="Numéro et voie" value={addr.street} onChange={(e) => setAddr({...addr, street: e.target.value})}/>
                  <input type="text" placeholder="Complément d'adresse" value={addr.complement} onChange={(e) => setAddr({...addr, complement: e.target.value})}/>
                  <div className="row-cp">
                    <input type="text" placeholder="Code postal" value={addr.postalCode} onChange={(e) => setAddr({...addr, postalCode: e.target.value})}/>
                    <input type="text" placeholder="Ville" value={addr.city} onChange={(e) => setAddr({...addr, city: e.target.value})}/>
                  </div>
                  <select value={addr.country} onChange={(e) => setAddr({...addr, country: e.target.value})}>
                    {COUNTRIES.map(c => <option key={c.code} value={c.name}>{c.name}</option>)}
                  </select>
                </div>

                <label className="af-section-label">Mon téléphone (facultatif)</label>
                <div className="af-input-group">
                  <span className="ic">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.86 19.86 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.86 19.86 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92Z"/></svg>
                  </span>
                  <input type="tel" placeholder="+33 6 12 34 56 78" value={phone} onChange={(e) => setPhone(e.target.value)}/>
                </div>

                <div style={{display:'flex', gap:10, marginTop:10}}>
                  <button type="button" className="af-submit" style={{background:'transparent', color:'var(--t2-light)', border:'1px solid var(--hair-light)', flex:'0 0 auto', width:120}} onClick={submitSignupStep2} disabled={loading}>
                    Plus tard
                  </button>
                  <button className="af-submit" type="submit" style={{flex:1}} disabled={loading}>
                    {loading ? 'Enregistrement…' : 'Terminer'}
                  </button>
                </div>
              </form>
            </React.Fragment>
          )}
        </div>
      </div>
      {countryOpen && (
        <CountryPicker
          current={country.code}
          onClose={() => setCountryOpen(false)}
          onSelect={(c) => { setCountry(c); setCountryOpen(false); }}
        />
      )}
      {googleOpen && (
        <GoogleChooser
          defaultEmail={mode === 'signup' ? su.email : loginEmail}
          onClose={() => setGoogleOpen(false)}
          onPick={onGooglePick}
        />
      )}
    </React.Fragment>
  );
}

// ─── Account page (Mon compte) ───
function AccountModal({ open, onClose }) {
  const user = useAuthUser();
  const [form, setForm] = React.useState({});
  const [saved, setSaved] = React.useState(false);
  const [saving, setSaving] = React.useState(false);
  const [activeTab, setActiveTab] = React.useState('headers');
  React.useEffect(() => {
    const onTabSwitch = (e) => setActiveTab(e?.detail || 'headers');
    window.addEventListener('devisflash:account-tab', onTabSwitch);
    return () => window.removeEventListener('devisflash:account-tab', onTabSwitch);
  }, []);
  React.useEffect(() => {
    if (user) setForm({
      firstName: user.firstName || '',
      lastName:  user.lastName  || '',
      email:     user.email     || '',
      company:   user.company   || '',
      phone:     user.phone     || '',
      address:   user.address   || { street:'', complement:'', postalCode:'', city:'', country:'France' },
      // Champs fiche entreprise (style Tolteck)
      siret:     user.siret     || '',
      siren:     user.siren     || '',
      rcs:       user.rcs       || '',
      rm:        user.rm        || '',
      tvaIntra:  user.tvaIntra  || '',
      formeJuridique: user.formeJuridique || '',
      capitalSocial:  user.capitalSocial  || '',
      codeApe:   user.codeApe   || '',
      iban:      user.iban      || '',
      siteWeb:   user.siteWeb   || '',
      assureurDecennale: user.assureurDecennale || '',
      numeroDecennale:   user.numeroDecennale   || '',
      validiteDevisJours: user.validiteDevisJours || 90,
      noteFinDevis: user.noteFinDevis || '',
    });
  }, [user, open]);
  if (!open || !user) return null;

  const initials = ((user.firstName || ' ')[0] + (user.lastName || ' ')[0]).trim().toUpperCase() || (user.email[0] || '?').toUpperCase();

  const save = async (e) => {
    e?.preventDefault();
    if (saving) return;
    setSaving(true);
    try {
      await window.DevisFlashAuth.updateUser({
        firstName: form.firstName, lastName: form.lastName,
        company: form.company, phone: form.phone, address: form.address,
        // Fiche entreprise
        siret: form.siret, siren: form.siren, rcs: form.rcs, rm: form.rm,
        tvaIntra: form.tvaIntra, formeJuridique: form.formeJuridique,
        capitalSocial: form.capitalSocial, codeApe: form.codeApe,
        iban: form.iban, siteWeb: form.siteWeb,
        assureurDecennale: form.assureurDecennale, numeroDecennale: form.numeroDecennale,
        validiteDevisJours: parseInt(form.validiteDevisJours) || 90,
        noteFinDevis: form.noteFinDevis,
      });
      setSaved(true);
      setTimeout(() => setSaved(false), 2500);
      if (window.dfToast) window.dfToast({
        type: 'success',
        title: 'Profil enregistré',
        message: 'Tes informations ont bien été sauvegardées.'
      });
    } catch (err) {
      if (window.dfToast) window.dfToast({
        type: 'error',
        title: 'Erreur de sauvegarde',
        message: err.message || "Impossible d'enregistrer tes informations.",
        duration: 8000,
      });
      console.error('[AccountModal] save error:', err);
    } finally {
      setSaving(false);
    }
  };

  return (
    <div className="af-overlay" onClick={(e) => { if (e.target.classList.contains('af-overlay')) onClose(); }}>
      <div className="af-account-modal">
        <button className="af-close" onClick={onClose} aria-label="Fermer">×</button>
        <div className="af-account-header">
          <div className="af-account-avatar">{initials}</div>
          <div className="who-block">
            <div className="n">{user.firstName} {user.lastName}</div>
            <div className="e">{user.email}{user.provider === 'google' ? ' · via Google' : ''}</div>
          </div>
        </div>
        {saved && <div className="af-success-msg">Modifications enregistrées.</div>}

        {/* ── Navigation tabs style Tolteck ── */}
        <div className="af-tabs-nav">
          <button type="button" className={`af-tab ${activeTab === 'headers' ? 'active' : ''}`} onClick={() => setActiveTab('headers')}>En-têtes</button>
          <button type="button" className={`af-tab ${activeTab === 'footers' ? 'active' : ''}`} onClick={() => setActiveTab('footers')}>Pieds de page</button>
          <button type="button" className={`af-tab ${activeTab === 'style' ? 'active' : ''}`} onClick={() => setActiveTab('style')}>Style</button>
          <button type="button" className={`af-tab ${activeTab === 'defaults' ? 'active' : ''}`} onClick={() => setActiveTab('defaults')}>Devis & factures</button>
          <button type="button" className={`af-tab ${activeTab === 'account' ? 'active' : ''}`} onClick={() => setActiveTab('account')}>Mon compte</button>
        </div>

        <form onSubmit={save}>

          {/* ═══ TAB : MON COMPTE (Prénom, Nom, Email — infos perso) ═══ */}
          <div style={{display: activeTab === 'account' ? 'block' : 'none'}}>
          <label className="af-section-label" style={{textAlign:'left', marginTop:0}}>Informations personnelles</label>
          <div className="af-row-2">
            <div className="af-input-group"><input type="text" placeholder="Prénom" style={{paddingLeft:14}} value={form.firstName} onChange={(e) => setForm({...form, firstName: e.target.value})}/></div>
            <div className="af-input-group"><input type="text" placeholder="Nom" style={{paddingLeft:14}} value={form.lastName} onChange={(e) => setForm({...form, lastName: e.target.value})}/></div>
          </div>
          <div className="af-input-group"><input type="email" value={form.email} disabled style={{paddingLeft:14, color:'var(--t2-light)'}}/></div>
          </div>

          {/* ═══ TAB : EN-TÊTES (info entreprise pour le haut du devis) ═══ */}
          <div style={{display: activeTab === 'headers' ? 'block' : 'none'}}>
          <div className="af-tab-layout">
          <div className="af-tab-form">
          <label className="af-section-label" style={{textAlign:'left', marginTop:0}}>Nom de mon entreprise</label>
          <div className="af-input-group"><input type="text" placeholder="Nom de l'entreprise" style={{paddingLeft:14}} value={form.company} onChange={(e) => setForm({...form, company: e.target.value})}/></div>

          <label className="af-section-label" style={{textAlign:'left'}}>Adresse</label>
          <div className="af-address-block">
            <input type="text" placeholder="Numéro et voie" value={form.address?.street || ''} onChange={(e) => setForm({...form, address: {...form.address, street: e.target.value}})}/>
            <input type="text" placeholder="Complément d'adresse" value={form.address?.complement || ''} onChange={(e) => setForm({...form, address: {...form.address, complement: e.target.value}})}/>
            <div className="row-cp">
              <input type="text" placeholder="Code postal" value={form.address?.postalCode || ''} onChange={(e) => setForm({...form, address: {...form.address, postalCode: e.target.value}})}/>
              <input type="text" placeholder="Ville" value={form.address?.city || ''} onChange={(e) => setForm({...form, address: {...form.address, city: e.target.value}})}/>
            </div>
            <select value={form.address?.country || 'France'} onChange={(e) => setForm({...form, address: {...form.address, country: e.target.value}})}>
              {COUNTRIES.map(c => <option key={c.code} value={c.name}>{c.name}</option>)}
            </select>
          </div>

          <label className="af-section-label" style={{textAlign:'left'}}>Téléphone</label>
          <div className="af-input-group"><input type="tel" placeholder="+33 6 12 34 56 78" style={{paddingLeft:14}} value={form.phone} onChange={(e) => setForm({...form, phone: e.target.value})}/></div>

          <label className="af-section-label" style={{textAlign:'left'}}>Site web (optionnel)</label>
          <div className="af-input-group"><input type="url" placeholder="https://mon-site.fr" style={{paddingLeft:14}} value={form.siteWeb} onChange={(e) => setForm({...form, siteWeb: e.target.value})}/></div>
          </div>

          {/* Aperçu live de l'en-tête */}
          <div className="af-preview">
            <div className="af-preview-title">En-tête par défaut</div>

              <div className="af-preview-row">{form.address?.country || 'France'}</div>
              {form.phone && <div className="af-preview-row" style={{marginTop:8}}>{form.phone}</div>}

          </div>
          </div>

            <div className="af-input-group"><input type="text" placeholder="RM (Répertoire métiers)" style={{paddingLeft:14}} value={form.rm} onChange={(e) => setForm({...form, rm: e.target.value})}/></div>

// ─── Admin Panel (stats + gestion comptes) — accessible aux emails dans DEVISFLASH_ADMIN_EMAILS ───
function AdminPanel({ open, onClose }) {
  const user = useAuthUser();
  const [profiles, setProfiles] = React.useState([]);
  const [devisData, setDevisData] = React.useState([]);
  const [loading, setLoading] = React.useState(false);
  const [actionLoading, setActionLoading] = React.useState({});
  const [customValues, setCustomValues] = React.useState({}); // { [profileId]: { days, hours } }
  const isAdmin = user && (window.DEVISFLASH_ADMIN_EMAILS || []).includes(user.email);

  const loadData = React.useCallback(async () => {
    if (!isAdmin) return;
    setLoading(true);
    try {
      const [pRes, dRes] = await Promise.all([
        window.sb.from('profiles').select('*').order('created_at', { ascending: false }),
        window.sb.from('devis').select('id, user_id, total_ht, total_ttc, created_at, objet, client_nom'),
      ]);
      if (pRes.error) console.warn('[Admin] profiles error:', pRes.error);
      if (dRes.error) console.warn('[Admin] devis error:', dRes.error);
      setProfiles(pRes.data || []);
      setDevisData(dRes.data || []);
    } catch (e) {
      console.error('[Admin] load error:', e);
    }
    setLoading(false);
  }, [isAdmin]);

  React.useEffect(() => {
    if (open && isAdmin) loadData();
  }, [open, isAdmin, loadData]);

  if (!open || !isAdmin) return null;

  // Calcule les stats globales
  const now = new Date();
  const trialDays = window.TRIAL_DAYS || 14;
  let trialActive = 0, paidActive = 0, expired = 0;
  profiles.forEach(p => {
    const subscribed = !!p.subscription_active;
    if (subscribed) { paidActive++; return; }
    const start = p.trial_start ? new Date(p.trial_start) : null;
    if (!start) { trialActive++; return; }
    const end = new Date(start.getTime() + trialDays * 24*60*60*1000);
    if (end > now) trialActive++; else expired++;
  });
  const totalDevis = devisData.length;
  const totalRevenue = devisData.reduce((sum, d) => sum + (Number(d.total_ttc) || 0), 0);
  const thisMonth = devisData.filter(d => {
    if (!d.created_at) return false;
    const created = new Date(d.created_at);
    return created.getMonth() === now.getMonth() && created.getFullYear() === now.getFullYear();
  });
  const devisByUser = {};
  devisData.forEach(d => { devisByUser[d.user_id] = (devisByUser[d.user_id] || 0) + 1; });

  const userStatus = (p) => {
    if (p.subscription_active) return { kind: 'paid', label: 'Abonné', class: 'paid' };
    const start = p.trial_start ? new Date(p.trial_start) : null;
    if (!start) return { kind: 'unknown', label: 'Pas de trial', class: 'unknown' };
    const end = new Date(start.getTime() + trialDays * 24*60*60*1000);
    if (end <= now) return { kind: 'expired', label: 'Essai expiré', class: 'expired' };
    const msLeft = end - now;
    const hoursTotal = msLeft / (60*60*1000);
    const days = Math.floor(hoursTotal / 24);
    const hours = Math.floor(hoursTotal % 24);
    let label;
    if (days >= 2) label = `Essai · ${days}j ${hours}h`;
    else if (days >= 1) label = `Essai · ${days}j ${hours}h`;
    else if (hoursTotal >= 1) label = `Essai · ${Math.floor(hoursTotal)}h ${Math.floor((hoursTotal % 1) * 60)}min`;
    else label = `Essai · <1h`;
    return { kind: 'trial', label, class: 'trial' };
  };

  // Définit X jours restants pour l'essai (precision aux heures)
  const setTrialDuration = async (profileId, daysWanted, hoursWanted = 0) => {
    setActionLoading(p => ({ ...p, [profileId]: 'set' }));
    // trial_start doit être tel que end = now + daysWanted (j) + hoursWanted (h)
    // end = start + TRIAL_DAYS*24h, donc start = now + (daysWanted + hoursWanted/24 - TRIAL_DAYS) * 24h
    const totalHoursWanted = daysWanted * 24 + hoursWanted;
    const startOffsetMs = (totalHoursWanted - trialDays * 24) * 60 * 60 * 1000;
    const newStart = new Date(Date.now() + startOffsetMs);
    try {
      const { error } = await window.sb.from('profiles').update({
        trial_start: newStart.toISOString(),
        subscription_active: false, // on remet en mode essai
        subscription_plan: null,
      }).eq('id', profileId);
      if (error) throw error;
      if (window.dfToast) window.dfToast({
        type: 'success',
        title: 'Essai mis à jour',
        message: `${daysWanted}j ${hoursWanted}h restants. L'abonnement payant est désactivé.`
      });
      await loadData();
    } catch (e) {
      if (window.dfToast) window.dfToast({ type: 'error', title: 'Échec', message: e.message });
    }
    setActionLoading(p => ({ ...p, [profileId]: null }));
  };

  // BLOQUE complètement l'accès : essai expiré + pas d'abonnement = pas d'IA
  const blockAccess = async (profileId) => {
    setActionLoading(p => ({ ...p, [profileId]: 'block' }));
    const veryOld = new Date(Date.now() - 365 * 24*60*60*1000); // -1 an
    try {
      const { error } = await window.sb.from('profiles').update({
        trial_start: veryOld.toISOString(),
        subscription_active: false,
        subscription_plan: null,
      }).eq('id', profileId);
      if (error) throw error;
      if (window.dfToast) window.dfToast({
        type: 'success',
        title: 'Accès bloqué',
        message: 'Cet utilisateur ne peut plus utiliser l\'IA. Essai expiré + abonnement désactivé.'
      });
      await loadData();
    } catch (e) {
      if (window.dfToast) window.dfToast({ type: 'error', title: 'Échec', message: e.message });
    }
    setActionLoading(p => ({ ...p, [profileId]: null }));
  };

  const toggleSub = async (profileId, currentlyActive) => {
    setActionLoading(p => ({ ...p, [profileId]: 'sub' }));
    try {
      const { error } = await window.sb.from('profiles').update({
        subscription_active: !currentlyActive,
        subscription_plan: !currentlyActive ? 'DevisFlash (admin)' : null,
      }).eq('id', profileId);
      if (error) throw error;
      if (window.dfToast) window.dfToast({
        type: 'success',
        title: !currentlyActive ? 'Abonnement activé' : 'Abonnement désactivé',

  <script type="text/babel" data-presets="env,react">

const TWEAK_DEFAULTS = { "accent": "#E04E1A", "density": "standard", "voice": "geometric" };
function App() {
  useReveal();
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [qgOpen, setQgOpen]       = React.useState(false);
  const [authOpen, setAuthOpen]   = React.useState(false);
  const [authMode, setAuthMode]   = React.useState('login');
  const [accountOpen, setAccountOpen] = React.useState(false);
  const [adminOpen, setAdminOpen] = React.useState(false);
  const user = useAuthUser();

  // CTAs on the page (Essayer / Voir une démonstration / etc) — gate behind login
  React.useEffect(() => {
    const onClick = (e) => {
      const a = e.target.closest('a.btn, button.btn');
      if (!a) return;
      // Skip CTAs owned by the navbar (those are handled by NavAccount directly)
      if (a.closest('.nav')) return;
      const txt = (a.textContent || '').toLowerCase();
      const wantsTrial = txt.includes('essayer') || txt.includes("commencer l'essai") || txt.includes('démonstration') || txt.includes('demonstration');
      if (!wantsTrial) return;
      e.preventDefault();
      if (window.DevisFlashAuth.getUser()) {
        setQgOpen(true);
      } else {
        setAuthMode('signup');
        setAuthOpen(true);
      }
    };
    document.addEventListener('click', onClick);
    return () => document.removeEventListener('click', onClick);
  }, []);

  // "Nouveau devis" from the account dropdown
  React.useEffect(() => {
    const open = () => setQgOpen(true);
    window.addEventListener('devisflash:open-quote', open);
    return () => window.removeEventListener('devisflash:open-quote', open);
  }, []);

  // Navbar dispatches these events; App owns the modal state.
  React.useEffect(() => {
    const openAuth    = (e) => { setAuthMode(e?.detail?.mode || 'login'); setAuthOpen(true); };
    const openAccount = () => setAccountOpen(true);
    const openAdmin   = () => setAdminOpen(true);
    const openLegal   = (e) => setLegalDoc(e?.detail || 'mentions');
    window.addEventListener('devisflash:open-auth', openAuth);
    window.addEventListener('devisflash:open-account', openAccount);
    window.addEventListener('devisflash:open-admin', openAdmin);
    window.addEventListener('devisflash:open-legal', openLegal);
    return () => {
      window.removeEventListener('devisflash:open-auth', openAuth);
      window.removeEventListener('devisflash:open-account', openAccount);
      window.removeEventListener('devisflash:open-admin', openAdmin);
      window.removeEventListener('devisflash:open-legal', openLegal);
    };
  }, []);
  const [legalDoc, setLegalDoc] = React.useState(null); // 'mentions' | 'confidentialite' | 'cgv' | null

  React.useEffect(() => {
    document.documentElement.style.setProperty('--accent', t.accent);
    document.body.dataset.density = t.density;
    document.body.dataset.voice = t.voice;
  }, [t.accent, t.density, t.voice]);

  const onAuthSuccess = (kind) => {
    setAuthOpen(false);
    // L'utilisateur reste sur la page d'accueil avec son profil chip visible dans la navbar.
    // De là il peut cliquer "Mon compte" ou "Nouveau devis". Petit toast de bienvenue.
    if (window.dfToast) {
      setTimeout(() => window.dfToast({
        type: 'success',
        title: kind === 'signup' ? 'Compte créé' : 'Connecté',
        message: kind === 'signup' ? 'Bienvenue sur DevisFlash !' : 'Bon retour parmi nous !'
      }), 200);
    }
  };

  return (
    <React.Fragment>
      <Cursor/><Navbar/>
      {user && user.trialActive && (
        <TrialBanner user={user} onSubscribe={() => {
          // Scroll vers la section Tarifs au lieu d'ouvrir Mon compte
          const tarifs = document.getElementById('tarifs');
          if (tarifs) tarifs.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }}/>
      )}
      <Hero/><LogosBand/><Pourquoi/><CommentCaMarche/>
      <Produit/><Stats/><Pricing/><Testimonial/><FAQ/><CTAFinal/><Footer/>
      <QuoteGenerator open={qgOpen} onClose={() => setQgOpen(false)}/>
      <AuthModal open={authOpen} mode={authMode} onClose={() => setAuthOpen(false)} onSuccess={onAuthSuccess}/>
      <AccountModal open={accountOpen} onClose={() => setAccountOpen(false)}/>
      <AdminPanel open={adminOpen} onClose={() => setAdminOpen(false)}/>
      <LegalModal doc={legalDoc} onClose={() => setLegalDoc(null)}/>
      {user && !user.accessAllowed && (
        <TrialExpiredModal user={user} onLogout={() => window.DevisFlashAuth.logout()}/>
      )}
      <TweaksPanel>
        <TweakSection label="Direction artistique"/>
        <TweakColor label="Accent" value={t.accent}
          options={['#E04E1A', '#1B5E20', '#1E3A5F', '#7C2D2D']}
          onChange={(v) => setTweak('accent', v)}/>
        <TweakSection label="Densité éditoriale"/>
        <TweakRadio label="Rythme" value={t.density}
          options={[{value:'aere', label:'Aéré'},{value:'standard', label:'Standard'},{value:'compact', label:'Compact'}]}
          onChange={(v) => setTweak('density', v)}/>
        <TweakSection label="Voix typographique"/>
        <TweakRadio label="Display" value={t.voice}
          options={[{value:'sans', label:'Sans'},{value:'serif', label:'Serif'},{value:'geometric', label:'Géo.'}]}
          onChange={(v) => setTweak('voice', v)}/>
      </TweaksPanel>
    </React.Fragment>
  );
}

// Bandeau d'essai : affiché en haut de page si trialActive
function TrialBanner({ user, onSubscribe }) {
  const days = user.daysLeft;

  React.useEffect(() => {
    document.body.classList.add('df-trial-active');
    return () => document.body.classList.remove('df-trial-active');

  return (
    <div className={"trial-banner " + (urgent ? 'urgent' : '')}>
      <div className="container trial-banner-inner">
        <span className="trial-icon" aria-hidden="true">
          {urgent ? '⚠️' : '🎁'}
        </span>
        <span className="trial-text">
          {days > 1 ? (
            <>Essai gratuit : <b>{days} jours restants</b> avant la fin de ta période d'essai.</>

            <>Essai gratuit : <b>dernier jour</b> avant la fin de ta période d'essai !</>

            <>Essai gratuit : <b>il te reste quelques heures</b> avant la fin de ta période d'essai !</>

        <button className="trial-cta" onClick={onSubscribe}>
          Choisir un abonnement <span aria-hidden="true">→</span>
        </button>
      </div>
    </div>
  );
}

          </button>
        </div>
        <p className="trial-expired-foot">
          Rien n'est supprimé : tes devis et réglages sont conservés sur le compte <b>{user.email}</b>, et tu les retrouveras dès que tu actives ton abonnement.
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

  </script>
</body>
</html>
