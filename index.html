  'bricoman':     ['gros-oeuvre', 'elec', 'plomberie'],
  'tout-faire':   ['gros-oeuvre']
};

function distanceKmDB(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

function hashFloatDB(str) {
  let h = 2166136261;
  for (let i = 0; i < str.length; i++) { h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
  return ((h >>> 0) % 1000) / 1000;
}

// Parse la chaîne `availability` renvoyée par Gemini en statut normalisé pour l'UI
function parseStockStatus(availabilityStr) {
  const s = (availabilityStr || '').toLowerCase().trim();
  if (!s) return { status: 'unknown', label: '', dot: '⚪' };
  // Rupture / indispo en premier (mots les plus précis)
  if (/rupture|épuis|indisponible|hors\s*stock|out\s*of\s*stock|non\s+commercialis|fin\s+de\s+série|n['' ]a\s+plus/.test(s)) {
    return { status: 'none', label: 'Indisponible', dot: '🔴' };
  }
  // Sur commande / délai
  if (/sur\s+commande|à\s+commander|commande|d[ée]lai|livraison|sous\s*\d|\d+\s*(?:jours?|semaines?|j\b)|stock\s+limité|stock\s+faible|presque\s+épuis/.test(s)) {
    return { status: 'order', label: 'Sur commande', dot: '🟠' };
  }
  // En stock
  if (/en\s+stock|disponible|stock\s+ok|en\s+rayon|disponibilit[ée]\s+(?:imm[ée]diate|web|magasin)|retrait\s+(?:1h|aujourd|today)|stock\s+suffisant/.test(s)) {
    return { status: 'ok', label: 'En stock', dot: '🟢' };
  }
  return { status: 'unknown', label: s.slice(0, 40), dot: '⚪' };
}

function categorizeItemDB(desc) {
  // STRIP les préfixes de localisation ("SDB :", "Pièce :", "Salon —", "Cuisine -", "Tous lieux :")
  // pour que l'analyse des verbes d'action fonctionne même quand la ligne commence par un lieu.
  const raw = (desc || '');
  const stripped = raw.replace(/^\s*[-–·•]?\s*(?:SDB|salle\s+de\s+bain|salon|cuisine|chambres?|entr[ée]e|couloir|wc|toilettes?|pi[èe]ce|tous\s+lieux|extérieur|jardin|garage|cave|grenier|terrasse|balcon|hall|palier|buanderie|dressing|bureau|chambre|s[ée]jour)\s*[:\-—–]\s*/i, '');
  const d = stripped.toLowerCase();

  // ÉTAPE 1 : Le client fournit le matériau / hors fourniture → rien à acheter
  const clientSupplies = /\(?\s*fourni\s+par\s+(?:le\s+)?client|fourni\s+par\s+ma[îi]tre|hors\s+fourniture|sans\s+fourniture/.test(d);
  if (clientSupplies) return 'service';

  // ÉTAPE 1bis : Services additionnels qu'on doit absolument exclure (anti-oubli typiques)
  const isObviousService = /^(?:test\s+(?:mise|en)|proc[èe]s-?verbal|certificat|attestation|diagnostic|consuel|attestation\s+rt|étude\s+thermique|étude\s+rt|étude\s+structure|étude\s+bureau|marge\s+technique|liaison\s+équipotentielle|étanchéité\s+spec|primaire\s+d'?accrochage|coordination|encadrement|suivi\s+chantier)/i.test(d);
  if (isObviousService) return 'service';

  // ÉTAPE 2 : LABEUR PUR — ligne commence par un verbe d'action sans matériau identifiable
  const isPureLaborOnly = /^(\s*[-–·•]\s*)?(?:dépose|d[ée]molition|démontage|d[ée]molir|d[ée]poser|d[ée]monter|évacuation\s+(?:gravats?|déchets|déblais|du\s+chantier)?|évacuer|manutention|nettoyage(?:\s+(?:fin\s+de\s+chantier|chantier|sol|de\s+sol))?|nettoyer|préparation\s+(?:des?\s+)?supports?|protection\s+(?:du\s+)?chantier|d[ée]placement\b|frais\b|forfait\s+(?:déplacement|intervention|urgence|main)|majoration|saignées?|tirage\s+(?:de\s+)?câbles?|raccordement\b|main\s*d.œuvre|raclage|ragréage\s+(?:léger)?(?!\s+inclus)|reprise\s+(?:de\s+)?(?:joint|chape|enduit)|pose\b|fixation|installation\s+(?:simple)?(?!\s+inclus))/i.test(d);
  const includesMaterial = /fourniture|matériau|matériel|inclus|comprenant|achat/.test(d);
  if (isPureLaborOnly && !includesMaterial) return 'service';

  // ÉTAPE 3 : Catégorie matériau (la ligne contient un produit à acheter)
  if (/parpaing|béton|ciment|brique|mortier|sable|graviers?|enduit|chape|dalle|fondation|ferraillage|ravalement|placo|ba13|isolation|carrelage|faïence|colle\s+carrelage|joint\s+carrelage/.test(d)) return 'gros-oeuvre';
  if (/peinture|sous-couche|toile\s+de\s+verre|papier\s+peint|lasure|vernis|pinceau|rouleau\s+(?:peinture|laqueur)|bâche|enduit\s+de\s+lissage/.test(d)) return 'peinture';
  if (/tableau\s+(?:électrique|élec)|disjoncteur|prise(?:\s+de\s+courant)?|interrupteur|câblage|câble\b|différentiel|parafoudre|borne(?:\s+(?:irve|recharge))?|rj45|p17|point\s+lumineux|spot\b|led\b|luminaire|consuel/.test(d)) return 'elec';
  if (/per\b|cuivre\b|tube\b|pvc|robinet|mitigeur|chauffe-eau|chaudière|wc\b|douche|vasque|baignoire|sanitaire|colonne|receveur|paroi|meuble.*vasque|bâti.*support|geberit|thermostatique/.test(d)) return 'plomberie';

  // ÉTAPE 4 : Filets : main d'œuvre / déplacement / forfait restés sans matière
  if (/main\s*d.œuvre|déplacement|forfait\b|majoration|frais\b/.test(d)) return 'service';

  return 'general';
}

function itemAvailabilityDB(store, designation) {
  const cat = categorizeItemDB(designation);
  if (cat === 'service') return null;
  const spec = BRAND_SPECIALTY_DB[store.brand] || [];
  const isSpec = spec.includes(cat);
  const h = hashFloatDB(store.id + '::' + (designation || '').toLowerCase());
  const t = isSpec ? [0.72, 0.94] : [0.42, 0.78];
  if (h < t[0]) return { status: 'ok',    label: 'En stock' };
  if (h < t[1]) return { status: 'order', label: 'Sur commande' };
  return { status: 'none', label: 'Indispo.' };
}

const UNIT_NORMALIZE = {
  'm2': 'm²', 'm²': 'm²',
  'm3': 'm³', 'm³': 'm³',
  'ml': 'ml', 'metre lineaire': 'ml', 'mètre linéaire': 'ml',
  'm': 'm', 'metre': 'm', 'mètre': 'm',
  'h': 'h', 'heure': 'h', 'heures': 'h', 'hr': 'h',
  'j': 'jour', 'jour': 'jour', 'jours': 'jour',
  'forfait': 'forfait', 'ft': 'forfait', 'ff': 'forfait',
  'u': 'u', 'unite': 'u', 'unité': 'u', 'unites': 'u', 'unités': 'u',
  'kg': 'kg',
  'l': 'l', 'litre': 'l', 'litres': 'l',
  'piece': 'pièce', 'pièce': 'pièce', 'pieces': 'pièce', 'pièces': 'pièce', 'pc': 'pièce',
  'ens': 'ensemble', 'ensemble': 'ensemble',
};

function normUnit(raw) {
  if (!raw) return 'u';
  const t = raw.trim().toLowerCase();
  return UNIT_NORMALIZE[t] || 'u';
}

// True si le mot est une unité reconnue (m², h, forfait, etc.) — pas un mot quelconque
function isKnownUnit(raw) {
  if (!raw) return false;
  return raw.trim().toLowerCase() in UNIT_NORMALIZE;
}

function parseNumber(s) {
  if (!s) return NaN;
  const clean = s.replace(/\s/g, '').replace(',', '.');
  return parseFloat(clean);
}

// Mots-nombres français → chiffres (un artisan dit souvent "deux interrupteurs", "huit heures")
const FR_NUMBERS = {
  'un': 1, 'une': 1, 'deux': 2, 'trois': 3, 'quatre': 4, 'cinq': 5,
  'six': 6, 'sept': 7, 'huit': 8, 'neuf': 9, 'dix': 10, 'onze': 11, 'douze': 12,
  'treize': 13, 'quatorze': 14, 'quinze': 15, 'seize': 16,
  'vingt': 20, 'trente': 30, 'quarante': 40, 'cinquante': 50, 'soixante': 60, 'cent': 100,
};

function convertFrenchNumbers(line) {
  // Trier par longueur décroissante pour éviter "dix" qui matche dans "dix-sept"
  const keys = Object.keys(FR_NUMBERS).sort((a, b) => b.length - a.length);
  let out = line;
  for (const word of keys) {
    out = out.replace(new RegExp(`\\b${word}\\b`, 'gi'), FR_NUMBERS[word]);
  }
  return out;
}

// Masque les dimensions (90×90, 60x30, 80×80×20) avec des espaces pour préserver les positions
// → évite que "90×90" devienne qty=90, prix=90 (bug classique du receveur de douche)
function maskDimensions(line) {
  return line.replace(
    /(\d+(?:[.,]\d+)?)\s*[×x*]\s*(\d+(?:[.,]\d+)?)(?:\s*[×x*]\s*(\d+(?:[.,]\d+)?))?/gi,
    (match) => ' '.repeat(match.length)
  );
}

// Synonymes familiers de "euro" à filtrer dans la description
const EURO_SYNONYMS = /\b(?:balles?|boules?|sacs?|euros?|eur)\b/gi;

// Patterns à supprimer en fin de description (souvent du bruit après le prix)
function cleanDescriptionTail(s) {
  return s
    .replace(/^[\s€/\-,;:]+/, '')
    .replace(EURO_SYNONYMS, '')
    .replace(/\b(?:le|la|du|par|de|d['']|à|au|en|pour|pièce|chacun|chaque|unitaire)\b\s*(?:m[²2³3]?|h|heure|m[èe]tre|jour|kilo|kg|litre|l)?$/gi, '')
    .replace(/\s+/g, ' ')
    .replace(/^[\s,;:]+|[\s,;:.]+$/g, '')
    .trim();
}

// Passe finale appliquée à la description assemblée — supprime les résidus de structure
// (prépositions orphelines, unités orphelines, ponctuation flottante)
function finalDescriptionCleanup(s) {
  if (!s) return s;
  let out = s.trim();
  const endStrip = [
    // "de l'heure", "par le mètre", "le m²"  → expressions de tarification orphelines
    /\s+(?:de|du|par|le|la|à|au|en|pour)\s+(?:l['']\s*)?(?:m[²³]|ml|m|h|heure|mètre|metre|jour|mois|kilo|kg|litre|l)$/i,
    // Symbole d'unité orphelin (m², h, m, kg…) — résidu de "/m²" ou "€/h"
    /\s+(?:m[²³]|ml|h|j|kg|l|heure|mètre|metre|jour|mois|forfait|unité|unite)$/i,
    // Préposition / article / connecteur en fin
    /\s+(?:pour|à|au|aux|de|du|des|en|par|le|la|les|chaque|chacun|pièce|unitaire|d['']|et|ou|chez|sur|avec|sans|dans)$/i,
    // Séparateur orphelin
    /\s*[/×x*\-]\s*$/i,
    // Ponctuation trainante
    /[\s,;:.\-–—]+$/,
  ];
  let prev;
  do {
    prev = out;
    for (const re of endStrip) out = out.replace(re, '');
  } while (out !== prev && out.length > 0);
  // Préposition en début (résidus de structure "de carrelage" → "carrelage")
  out = out.replace(/^(?:pour|à|au|aux|de|du|des|en|par|et|ou|d[''])\s+/i, '');
  out = out.replace(/\s+/g, ' ').trim();
  return out;
}

function parseLine(rawLine) {
  let line = rawLine.trim().replace(/^[-*•·–—]\s*/, '').trim();
  if (!line) return null;

  // 1) Conversion des mots-nombres FR (deux → 2, huit → 8, etc.)
  line = convertFrenchNumbers(line);

  // 2) Normalisations m2/m3 et séparation chiffre-lettre
  line = line.replace(/m2(?=[\s:,;\-–—€]|$)/gi, 'm²').replace(/m3(?=[\s:,;\-–—€]|$)/gi, 'm³');
  line = line.replace(/(\d)[.,](?=[a-zA-Zé²³°ç])/g, '$1 ');
  line = line.replace(/(\d)(?=[a-zA-Zé²³°ç])/g, '$1 ');

  // 3) Masque les dimensions (90×90, 60×30) — elles ne doivent pas être prises comme qty/prix
  const lineForNumbers = maskDimensions(line);

  // 4) Trouve TOUS les nombres dans la ligne masquée avec leur position
  const numbers = [];
  const numRegex = /(\d[\d.,\s]*?\d|\d)(?=[\s:,;\-–—€]|$|[a-zA-Zé²³°ç])/g;
  let m;
  while ((m = numRegex.exec(lineForNumbers)) !== null) {
    const val = parseNumber(m[1]);
    if (!isNaN(val)) {
      numbers.push({ value: val, text: m[1], start: m.index, end: m.index + m[1].length });
    }
  }

  if (numbers.length === 0) {
    return { raw: rawLine, _error: "Aucun chiffre trouvé. Exemple : « carrelage 12 m² 25€ »." };
  }

  let qty, price, unit, description;

  if (numbers.length === 1) {
    // 1 seul nombre = prix, quantité = 1
    price = numbers[0];
    qty = { value: 1, start: price.start, end: price.start };
    const beforePrice = line.substring(0, price.start).replace(/[\s:;,\-—–à@x*=]+$/i, '').trim();
    const afterPriceRaw = line.substring(price.end);
    const afterPrice = cleanDescriptionTail(afterPriceRaw);
    description = [beforePrice, afterPrice].filter(Boolean).join(' ').trim() || "Prestation";
    unit = 'u';
  } else {
    // 2+ nombres : dernier = prix, avant-dernier = quantité
    price = numbers[numbers.length - 1];
    qty = numbers[numbers.length - 2];

    // Texte entre qty et price : 1er mot = unité SI reconnue, sinon = description
    const between = line.substring(qty.end, price.start).trim();
    const cleaned = between.replace(/\s*(?:à|@|pour|=|x|\*|×)\s*$/i, '').trim();
    const unitMatch = cleaned.match(/^([a-zA-Zé²³°ç]+)/);
    const candidateUnit = unitMatch ? unitMatch[1] : null;
    const unitRecognized = isKnownUnit(candidateUnit);
    unit = unitRecognized ? normUnit(candidateUnit) : 'u';

    // Si l'unité n'est PAS reconnue (ex: "interrupteurs", "prises"), le mot fait partie de la description
    const afterUnit = unitRecognized ? cleaned.substring(unitMatch[0].length) : cleaned;
    const middlePart = afterUnit
      .replace(/^\s*(?:de|du|d['']|en|pour|par|à|au)\s+/i, '')
      .replace(/\s*(?:à|@|pour|=|x|\*|×)\s*$/i, '')
      .trim();

    // Avant qty + après price (nettoyé des synonymes €, "/m²", "le mètre", etc.)
    const beforeQty = line.substring(0, qty.start).trim().replace(/[:;,\-—–]+$/, '').trim();
    const afterPrice = cleanDescriptionTail(line.substring(price.end));

    description = [beforeQty, middlePart, afterPrice].filter(Boolean).join(' ').trim();
    if (!description) description = "Prestation";
  }

  description = finalDescriptionCleanup(description) || "Prestation";

  return {
    raw: rawLine,
    description,
    quantity: qty.value,
    unit,
    unitPrice: price.value,
    total: Math.round(qty.value * price.value * 100) / 100,
  };
}

function categorize(line) {
  const d = line.description.toLowerCase();
  if (/(d[ée]molition|d[ée]pose|d[ée]molir|enl[èe]vement|d[ée]barass|gravats|[ée]vacuation|curage|d[ée]construction)/.test(d)) {
    return 'Démolition & dépose';
  }
  if (line.unit === 'h' || line.unit === 'jour' || /(main\s*d['']?(?:œ|oe)uvre|pose\b|installation|raccordement|montage|c[âa]blage)/.test(d)) {
    return "Main d'œuvre";
  }
  return 'Fourniture';
}

const fmtEUR = (n) => n.toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
const fmtQty = (n) => n.toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

// Numéro de devis : généré UNE fois par devis (séquentiel, compteur local),
// puis réutilisé partout (écran, impression, markdown). L'ancien code tirait un
// numéro ALÉATOIRE à chaque affichage : le devis imprimé ne portait pas le même
// numéro que l'écran, et il changeait à chaque modification d'une ligne.
let _devisNumCourant = null;
function newDevisNum() {
  const y = new Date().getFullYear();
  let seq = 1;
  try {
    seq = (parseInt(localStorage.getItem('devisFlash_devisSeq') || '0', 10) || 0) + 1;
    localStorage.setItem('devisFlash_devisSeq', String(seq));
  } catch (e) {}
  _devisNumCourant = `${y}-${String(seq).padStart(3, '0')}`;
  return _devisNumCourant;
}
function generateDevisNum() {
  // Renvoie le numéro du devis EN COURS (stable) — en crée un si besoin.
  return _devisNumCourant || newDevisNum();
}

function buildQuoteMarkdown(artisan, client, projet, parsedLines) {
  const lines = parsedLines.filter(l => !l._error && l.total != null);
  let totalHT = 0;
  for (const l of lines) totalHT += l.total;
  totalHT = Math.round(totalHT * 100) / 100;
  const tvaRate = parseFloat(projet.tva) / 100;
  const tva = Math.round(totalHT * tvaRate * 100) / 100;
  const ttc = Math.round((totalHT + tva) * 100) / 100;
  const acompte = Math.round(ttc * 30) / 100;

  let md = '';
  if (artisan.logo) md += `<img src="${artisan.logo}" alt="Logo" class="qg-devis-logo"/>\n\n`;
  md += `# DEVIS N° ${generateDevisNum()}\n\n`;
  md += `*Devis gratuit · établi le ${projet.date}*\n\n`;

  // Identité de l'artisan (obligatoire — art. R123-237 Code de commerce)
  // Forcer le retour à la ligne markdown avec deux espaces de fin de ligne
  md += `**${artisan.entreprise || 'Entreprise'}**`;
  if (artisan.formeJuridique) md += ` — ${artisan.formeJuridique.toUpperCase()}`;
  md += `  \n`;
  if (artisan.adresse) md += `${artisan.adresse}  \n`;
  if (artisan.contact) md += `${artisan.contact}  \n`;
  if (artisan.siteWeb) md += `${artisan.siteWeb}  \n`;

  // Mentions légales (SIRET, TVA intra, RCS, APE, capital)
  const _legals = [];
  if (artisan.siret) _legals.push(`SIRET : ${artisan.siret}`);
  if (artisan.tvaIntra) _legals.push(`TVA intra. : ${artisan.tvaIntra}`);
  if (artisan.rcs) _legals.push(`RCS : ${artisan.rcs}`);
  if (artisan.codeApe) _legals.push(`APE : ${artisan.codeApe}`);
  if (artisan.capitalSocial) _legals.push(`Capital social : ${artisan.capitalSocial}`);
  if (_legals.length) md += `*${_legals.join(' · ')}*  \n`;

  if (artisan.decennale) md += `Assurance décennale : ${artisan.decennale}  \n`;
  if (artisan.iban) md += `IBAN : ${artisan.iban}  \n`;
  md += `\n`;

  // Identité du client (obligatoire)
  md += `**Client** — ${client.nom || ''}  \n`;
  if (client.adresseFact) md += `${client.adresseFact}  \n`;
  if (client.adresseChantier && client.adresseChantier !== client.adresseFact) {
    md += `Adresse du chantier : ${client.adresseChantier}  \n`;
  }
  md += `\n`;

  md += `**Objet :** ${projet.titre || 'Travaux'}\n\n`;

  // Date de début prévue + durée + date de fin calculée
  if (projet.debut || projet.dureeJours) {
    const debutFR = projet.debut ? new Date(projet.debut + 'T12:00:00').toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric' }) : '';
    const duree = parseInt(projet.dureeJours, 10);
    let finFR = '';
    if (projet.debut && Number.isFinite(duree) && duree > 0) {
      // Calcule fin = début + jours ouvrés (lundi-vendredi)
      const d = new Date(projet.debut + 'T12:00:00');
      let added = 0;
      while (added < duree - 1) {
        d.setDate(d.getDate() + 1);
        const day = d.getDay();
        if (day !== 0 && day !== 6) added++;
      }
      finFR = d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric' });
    }
    md += `**Période d'exécution :** `;
    if (debutFR && finFR) md += `du ${debutFR} au ${finFR} *(${duree} jours ouvrés)*\n\n`;
    else if (debutFR) md += `démarrage prévu le ${debutFR}\n\n`;
    else if (Number.isFinite(duree) && duree > 0) md += `${duree} jours ouvrés à compter de la date de démarrage\n\n`;
  }

  // Détail des prestations (obligatoire — art. L441-3 C. commerce)
  // Rendu HIÉRARCHIQUE si _section / _subsection sont présents, sinon tableau plat.
  const hasHierarchy = lines.some(l => l._section);
  if (hasHierarchy) {
    // Pré-calcule combien de sous-postes uniques par section (pour cacher la ligne sous-poste quand redondante)
    const subsBySection = new Map();
    for (const l of lines) {
      if (!l._section) continue;
      if (!subsBySection.has(l._section)) subsBySection.set(l._section, new Set());
      subsBySection.get(l._section).add(l._subsection || '');
    }
    md += `<table class="qg-devis-table"><thead><tr><th>Description</th><th class="num">Quantité</th><th class="num">Unité</th><th class="num">P.U. HT</th><th class="num">Total HT</th></tr></thead><tbody>\n`;
    let lastSection = null, lastSubsection = null;
    for (const l of lines) {
      if (l._section && l._section !== lastSection) {
        const tot = Number.isFinite(l._sectionTotal) ? fmtEUR(l._sectionTotal) : '';
        md += `<tr class="qg-section-row"><td colspan="4"><strong>${l._section}</strong></td><td class="num"><strong>${tot}</strong></td></tr>\n`;
        lastSection = l._section;
        lastSubsection = null;
      }
      const sectionHasMultipleSubs = (subsBySection.get(l._section) || new Set()).size > 1;
      if (sectionHasMultipleSubs && l._subsection && l._subsection !== lastSubsection) {
        const tot = Number.isFinite(l._subsectionTotal) ? fmtEUR(l._subsectionTotal) : '';
        md += `<tr class="qg-subsection-row"><td colspan="4">${l._subsection}</td><td class="num">${tot}</td></tr>\n`;
        lastSubsection = l._subsection;
      }
      md += `<tr><td>${l.description}</td><td class="num">${fmtQty(l.quantity)}</td><td class="num">${l.unit}</td><td class="num">${fmtEUR(l.unitPrice)}</td><td class="num">${fmtEUR(l.total)}</td></tr>\n`;
    }
    md += `</tbody></table>\n\n`;
  } else {
    md += `| Description | Quantité | Unité | Prix Unitaire HT | Total HT |\n`;
    md += `|---|---:|:---:|---:|---:|\n`;
    for (const l of lines) {
      md += `| ${l.description} | ${fmtQty(l.quantity)} | ${l.unit} | ${fmtEUR(l.unitPrice)} | ${fmtEUR(l.total)} |\n`;
    }
    md += `\n`;
  }

  // Décompte HT / TVA / TTC (obligatoire) — HTML direct pour éviter la ligne TR vide d'un tableau markdown sans en-tête
  const tvaNonApplicable = (projet.tva === '0' || projet.tva === 0);
  md += `<table class="qg-totals-table"><tbody>\n`;
  md += `<tr><td>Total HT</td><td><strong>${fmtEUR(totalHT)}</strong></td></tr>\n`;
  if (!tvaNonApplicable) {
    md += `<tr><td>TVA ${projet.tva} %</td><td>${fmtEUR(tva)}</td></tr>\n`;
    md += `<tr class="qg-totals-final"><td><strong>Net à payer TTC</strong></td><td><strong>${fmtEUR(ttc)}</strong></td></tr>\n`;
  } else {
    md += `<tr><td>TVA</td><td><em>non applicable</em></td></tr>\n`;
    md += `<tr class="qg-totals-final"><td><strong>Net à payer</strong></td><td><strong>${fmtEUR(totalHT)}</strong></td></tr>\n`;
  }
  md += `</tbody></table>\n\n`;

  // Modalités de paiement
  const modes = Array.isArray(projet.modesPaiement) ? projet.modesPaiement : [];
  if (modes.length > 0) {
    const map = { virement: 'Virement bancaire', cheque: 'Chèque', especes: 'Espèces', cb: 'Carte bancaire' };
    md += `**Modalités de paiement :** ${modes.map(m => map[m]).filter(Boolean).join(', ')}.  \n`;
    if (modes.includes('virement') && projet.iban) {
      md += `IBAN : ${projet.iban}\n\n`;
    } else {
      md += `\n`;
    }
  }

  // Mentions légales obligatoires
  md += `**Mentions légales**\n\n`;
  md += `- Validité du devis : 1 mois à compter de l'émission.\n`;
  md += `- Acompte de 30 % à la signature (${fmtEUR(tvaNonApplicable ? Math.round(totalHT * 30) / 100 : acompte)}), solde à la fin des travaux.\n`;
  if (tvaNonApplicable) md += `- TVA non applicable, art. 293 B du CGI (franchise en base de TVA — micro-entrepreneur / auto-entrepreneur).\n`;
  if (projet.tva === '10') md += `- TVA à 10 % au titre de l'article 279-0 bis du CGI (logement achevé depuis plus de 2 ans, affecté à l'habitation — attestation client requise).\n`;
  if (projet.tva === '5.5') md += `- TVA à 5,5 % au titre de l'article 278-0 bis A du CGI (travaux d'amélioration énergétique).\n`;
  md += `- **Garanties légales applicables :** parfait achèvement (1 an), bon fonctionnement (2 ans), décennale (10 ans).\n`;
  md += `- Procès-verbal de réception signé en fin de chantier.\n\n`;

  // Signature client (obligatoire pour engagement)
  md += `**Bon pour accord**\n\n`;
  md += `À ........................................, le ......../......../..........\n\n`;
  md += `Signature du client précédée de la mention manuscrite « Bon pour accord » :\n`;

  return md;
}

  // Pile des états passés (avant chaque modification). Plus on en garde, plus on peut annuler loin en arrière.
  // 50 niveaux d'undo = largement assez pour un artisan qui édite un devis.
  const historyRef = React.useRef({ past: [], future: [] });
  const HISTORY_MAX = 50;

  const pushHistory = (currentVariants) => {
    historyRef.current.past.push(JSON.stringify(currentVariants));

  };

  const undoEdit = () => {
    if (historyRef.current.past.length === 0) {
      if (typeof showToast === 'function') showToast("Rien à annuler", 'info');
      return;
    }
    const prevSnapshot = historyRef.current.past.pop();
    historyRef.current.future.push(JSON.stringify(editedVariants));
    try {
      setEditedVariants(JSON.parse(prevSnapshot));
      if (typeof showToast === 'function') showToast("Action annulée (Ctrl+Z)", 'info');

    if (historyRef.current.future.length === 0) {
      if (typeof showToast === 'function') showToast("Rien à rétablir", 'info');
      return;
    }
    const nextSnapshot = historyRef.current.future.pop();
    historyRef.current.past.push(JSON.stringify(editedVariants));

  const [lineNotes, setLineNotes] = React.useState({}); // { 'standard-3': 'note...' }

  const linesFromVariant = (variantData) => {
    if (!variantData) return [];
    // Nouvelle structure hiérarchique (prestations > sous_postes > lignes) ou ancienne (lignes plat)
    const flat = [];
    if (Array.isArray(variantData.prestations)) {
      for (const pr of variantData.prestations) {
        if (!Array.isArray(pr.sous_postes)) continue;
        for (const sp of pr.sous_postes) {
          if (!Array.isArray(sp.lignes)) continue;
          for (const l of sp.lignes) {

          }

      }
    } else if (Array.isArray(variantData.lignes)) {
      for (const l of variantData.lignes) flat.push(l);
    }
    return flat.map((l, i) => {
      const q = parseFloat(l.quantite) || 0;
      const p = parseFloat(l.prix_unitaire_ht) || 0;
      const baseDesc = l.designation || 'Prestation';
      const loc = l.localisation && l.localisation.trim();
      return {
        id: `line-${Date.now()}-${i}-${Math.random().toString(36).slice(2,6)}`,
        designation: loc ? `${loc} : ${baseDesc}` : baseDesc,
        quantite: q,
        unite: l.unite || 'u',
        prix_unitaire_ht: p,
        total_ht: Math.round(q * p * 100) / 100,
        section: l._section || null,
        subsection: l._subsection || null,
      };
    });
  };

  const recalcLine = (line) => ({
    ...line,
    total_ht: Math.round((parseFloat(line.quantite) || 0) * (parseFloat(line.prix_unitaire_ht) || 0) * 100) / 100,
  });

  const updateLine = (variantKey, lineId, patch) => {
    pushHistory(editedVariants);
    setEditedVariants(prev => ({
      ...prev,
      [variantKey]: (prev[variantKey] || []).map(l => l.id === lineId ? recalcLine({ ...l, ...patch }) : l),
    }));
  };

  const deleteLine = (variantKey, lineId) => {
    pushHistory(editedVariants);
    setEditedVariants(prev => ({
      ...prev,
      [variantKey]: (prev[variantKey] || []).filter(l => l.id !== lineId),

    if (!video || !setter || !video.videoWidth) return;
    const canvas = document.createElement('canvas');
    const maxSize = 1200;
    let w = video.videoWidth, h = video.videoHeight;
    if (w > maxSize || h > maxSize) {
      const r = Math.min(maxSize / w, maxSize / h);
      w = Math.round(w * r); h = Math.round(h * r);
    }
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(video, 0, 0, w, h);
    canvas.toBlob(blob => {
      if (!blob) return;
      const reader = new FileReader();
      reader.onload = e => {
        const dataUrl = e.target.result;
        setter(prev => [...prev, { dataUrl, base64: dataUrl.split(',')[1], mimeType: 'image/jpeg', size: blob.size }].slice(0, 6));

                      const newSection = line.section && line.section !== (prev && prev.section);
                      // Cache la ligne sous-poste si la section n'en contient qu'un seul (évite doublon de total)
                      const subsInThisSection = new Set(currentLines.filter(l => l.section === line.section).map(l => l.subsection || ''));
                      const sectionHasMultipleSubs = subsInThisSection.size > 1;
                      const newSubsection = sectionHasMultipleSubs && line.subsection && line.subsection !== (prev && prev.subsection);
                      const sectionTotal = newSection ? currentLines.filter(l => l.section === line.section).reduce((s, l) => s + (l.total_ht || 0), 0) : null;

                  {projet.tva === '5.5' && <li>TVA à 5,5 % au titre de l'article 278-0 bis A du CGI (travaux d'amélioration énergétique).</li>}

                <p>Signature du client précédée de la mention manuscrite « Bon pour accord et lu et approuvé » :</p>

              <div className="qg-stores-section no-print">

                  </div>
                  {!storeFinderOpen && (

                      📍 Activer la localisation
                    </button>

                </div>

                {storeFinderOpen && (
                  <div className="qg-stores-body">
                    {geoStatus === 'locating' && (

                      </div>

                    {(geoStatus === 'error' || showCityList) && !userLocation && (

                        .sort((a, b) => a.distance - b.distance)
                        .slice(0, 3);
                      const locLabel = userLocation.source === 'gps'
                        ? `📍 Position GPS détectée`
                        : `📍 ${userLocation.cityName}`;
                      return (
                        <React.Fragment>
                          <div className="qg-stores-location">

                          </div>
                          {/* Bouton "Tout chercher" + comparateur en haut */}
                          {(() => {
                            const allDone = sorted.every(s => iaStoreResults.has(s.id));
                            const anyLoading = sorted.some(s => iaStoreLoading.has(s.id));
                            // Calcule les stats par magasin pour identifier le meilleur
                            const storeStats = {};
                            sorted.forEach(s => {
                              if (!iaStoreResults.has(s.id)) return;
                              const results = iaStoreResults.get(s.id);
                              const aligned = lines.map((line, idx) => {
                                const found = results.find(r =>
                                  (r.index === idx + 1) ||
                                  (r.query_devis && line.designation && r.query_devis.includes(line.designation.slice(0, 30)))
                                ) || results[idx];
                                return found || null;
                              });
                              let inStock = 0, total = 0, found = 0;
                              aligned.forEach(p => {
                                if (!p || p._isFallback) return;
                                found++;
                                if (p.price_eur != null && Number(p.price_eur) > 0) total += Number(p.price_eur);
                                const st = parseStockStatus(p.availability).status;
                                if (st === 'ok') inStock++;
                              });
                              storeStats[s.id] = { found, inStock, total, score: inStock * 10 + found - (total / 1000) };

                            // Le meilleur = le plus PROCHE (vu que les prix marché sont identiques)
                            const bestStoreId = sorted.length > 0 && iaStoreResults.has(sorted[0].id)

                            const alignedByStore = {};
                            sorted.forEach(s => {
                              if (!iaStoreResults.has(s.id)) { alignedByStore[s.id] = null; return; }
                              const results = iaStoreResults.get(s.id);
                              alignedByStore[s.id] = lines.map((line, idx) => {
                                const found = results.find(r =>
                                  (r.index === idx + 1) ||
                                  (r.query_devis && line.designation && r.query_devis.includes(line.designation.slice(0, 30)))
                                ) || results[idx] || null;
                                return found;
                              });
                            });

                            return (
                              <React.Fragment>
                                {/* ─── LISTE DE COURSES : liens directs magasins, sans faux prix ─── */}
                                {lines.length === 0 ? (
                                  <div className="qg-shop-empty">Aucune fourniture à acheter dans ce devis (uniquement de la main d'œuvre).</div>
                                ) : (
                                  <div className="qg-shop">
                                    <div className="qg-shop-stores">
                                      {sorted.map(s => {
                                        const b = BRAND_INFO_DB[s.brand];
                                        return (
                                          <a key={s.id} className="qg-shop-store"
                                             href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.addr)}`}
                                             target="_blank" rel="noopener noreferrer">
                                            <span className="qg-shop-store-pill" style={{background:b.color, color:b.textColor}}>{b.label}</span>
                                            <span className="qg-shop-store-dist">📍 {s.distance.toFixed(1)} km</span>
                                            <span className="qg-shop-store-go">Itinéraire →</span>
                                          </a>
                                        );
                                      })}
                                    </div>
                                    <div className="qg-shop-list">
                                      {lines.map((line, idx) => {
                                        const cleanName = (line.designation || '').replace(/^(?:SDB|salle\s+de\s+bain|salon|cuisine|chambres?|entr[ée]e|couloir|wc|toilettes?|pi[èe]ce|tous\s+lieux)\s*[:\-—–]\s*/i, '').trim();
                                        const term = searchTermFromDesignation(cleanName || line.designation);
                                        return (
                                          <div key={idx} className="qg-shop-item">
                                            <div className="qg-shop-item-info">
                                              <span className="qg-shop-item-name">{cleanName || 'Fourniture'}</span>
                                              {line.quantite > 0 && <span className="qg-shop-item-qty">{line.quantite} {line.unite || 'u'}</span>}
                                            </div>
                                            <div className="qg-shop-item-links">
                                              {sorted.map(s => {
                                                const b = BRAND_INFO_DB[s.brand];
                                                const url = b.directSearchUrl ? b.directSearchUrl(term) : b.searchUrl(term);
                                                return (
                                                  <a key={s.id} className="qg-shop-chip"
                                                     href={url} target="_blank" rel="noopener noreferrer"
                                                     title={`Chercher « ${term} » sur ${b.label}`}>
                                                    <span className="qg-shop-chip-dot" style={{background:b.color}}/>
                                                    {b.label}
                                                    <svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M7 17 17 7M9 7h8v8"/></svg>
                                                  </a>
                                                );
                                              })}
                                            </div>
                                          </div>
                                        );
                                      })}
                                    </div>
                                    <p className="qg-shop-foot">💡 Les liens ouvrent la recherche du produit sur le site du magasin — tu vois le <b>vrai prix</b> et le stock en cliquant.</p>
                                  </div>
                                )}

                                {/* ═══ ANCIEN COMPARATEUR TABLEAU — désactivé (remplacé par la liste de courses ci-dessus) ═══ */}
                                {false && (
                                  <div className="qg-comp-wrapper">
                                    {/* Header global */}
                                    <div className="qg-comp-header">
                                      <div className="qg-comp-header-title">
                                        <span className="qg-ia-star">⚡</span>
                                        <span>Comparateur Magasins · {lines.length} produit{lines.length > 1 ? 's' : ''} × {sorted.length} enseignes</span>
                                      </div>
                                      <div className="qg-comp-best-summary" style={{background: '#FFF7ED', border: '1px solid #FED7AA'}}>
                                        💡 <b>Prix marché indicatifs</b> · clique sur une cellule pour voir le rayon + prix exact du magasin
                                      </div>
                                    </div>

                                    {/* Le tableau comparateur */}
                                    <div className="qg-comp-scroll">
                                      <table className="qg-comp-table">
                                        <thead>
                                          <tr>
                                            <th className="qg-comp-th-product">Produit du devis</th>
                                            {sorted.map(s => {
                                              const b = BRAND_INFO_DB[s.brand];
                                              const isBest = bestStoreId === String(s.id);
                                              return (
                                                <th key={s.id} className={`qg-comp-th-store ${isBest ? 'is-best' : ''}`}>
                                                  <div className="qg-comp-th-store-inner">
                                                    {/* Réserve l'espace du badge dans TOUTES les colonnes pour aligner */}
                                                    <div className="qg-comp-th-best-tag-slot">
                                                      {isBest && <span className="qg-comp-th-best-tag-inline">📍 LE PLUS PROCHE</span>}
                                                    </div>
                                                    <span className="qg-store-pill" style={{background: b.color, color: b.textColor}}>{b.label}</span>
                                                    <div className="qg-comp-th-name">{s.name}</div>
                                                    <div className="qg-comp-th-dist">📍 {s.distance.toFixed(1)} km · <a href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.addr)}`} target="_blank" rel="noopener">itinéraire</a></div>
                                                  </div>
                                                </th>
                                              );
                                            })}
                                          </tr>
                                        </thead>
                                        <tbody>
                                          {lines.map((line, idx) => {
                                            // Trouve le meilleur prix pour cette ligne
                                            const cellPrices = sorted.map(s => {
                                              const aligned = alignedByStore[s.id];
                                              return aligned ? aligned[idx] : null;
                                            });
                                            const validPrices = cellPrices.map(p => p && p.price_eur != null ? Number(p.price_eur) : null).filter(v => v != null && v > 0);
                                            const minPrice = validPrices.length > 1 ? Math.min(...validPrices) : null;

                                            // Nom court produit (strip préfixe "SDB :", "Salon :", etc.)
                                            const cleanLineName = line.designation.replace(/^(?:SDB|salle\s+de\s+bain|salon|cuisine|chambres?|entr[ée]e|couloir|wc|toilettes?|pi[èe]ce|tous\s+lieux)\s*[:\-—–]\s*/i, '').trim();

                                            return (
                                              <tr key={idx}>
                                                <td className="qg-comp-td-product">
                                                  <div className="qg-comp-td-product-name">{cleanLineName}</div>
                                                  {(line.quantite > 0) && (
                                                    <div className="qg-comp-td-product-qty">{line.quantite} {line.unite || 'u'}</div>
                                                  )}
                                                </td>
                                                {sorted.map((s, sIdx) => {
                                                  const b = BRAND_INFO_DB[s.brand];
                                                  const p = cellPrices[sIdx];
                                                  const aligned = alignedByStore[s.id];
                                                  if (!aligned) {
                                                    return (
                                                      <td key={s.id} className="qg-comp-td-empty">
                                                        <span className="qg-comp-td-wait">—</span>
                                                      </td>
                                                    );
                                                  }
                                                  if (!p) {
                                                    return (
                                                      <td key={s.id} className="qg-comp-td-not-found">
                                                        <span className="qg-comp-td-na">non trouvé</span>
                                                      </td>
                                                    );
                                                  }
                                                  const stock = parseStockStatus(p.availability);
                                                  const isMinPrice = minPrice != null && Number(p.price_eur) === minPrice;
                                                  const productName = (p.product_name || p.query_devis || cleanLineName).replace(/^(?:SDB|salle\s+de\s+bain|salon|cuisine|chambres?|entr[ée]e|couloir|wc|toilettes?|pi[èe]ce|tous\s+lieux)\s*[:\-—–]\s*/i, '').trim();
                                                  // URL : directe magasin si instant, sinon Google search
                                                  const url = p.url && p.url !== '#' ? p.url : `https://www.google.com/search?q=${encodeURIComponent('"' + productName.slice(0, 80) + '" site:' + b.site)}&hl=fr`;
                                                  const hasRange = p.isInstant && p.price_min && p.price_max;
                                                  return (
                                                    <td key={s.id} className={`qg-comp-td-cell ${isMinPrice ? 'is-min-price' : ''}`}>
                                                      <a href={url} target="_blank" rel="noopener noreferrer" className="qg-comp-cell-link" title={`Voir sur ${b.label}`}>
                                                        <div className="qg-comp-cell-body">
                                                          <div className="qg-comp-cell-name">{productName}</div>
                                                          <div className="qg-comp-cell-bottom">
                                                            {hasRange ? (
                                                              <span className="qg-comp-cell-price">
                                                                <span style={{fontSize: '11px', color: '#6E6E6E', fontWeight: 500}}>≈ </span>
                                                                {p.price_min}-{p.price_max} €
                                                              </span>
                                                            ) : p.price_eur != null && Number(p.price_eur) > 0 ? (
                                                              <span className="qg-comp-cell-price">
                                                                {Number(p.price_eur).toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })} €
                                                                {isMinPrice && <span className="qg-comp-cell-badge-min">MEILLEUR</span>}
                                                              </span>
                                                            ) : (
                                                              <span className="qg-comp-cell-price-na">Voir sur {b.label} →</span>
                                                            )}
                                                            {p.isInstant ? (
                                                              <span className="qg-ia-stock-pill" style={{background: '#EFF6FF', color: '#1E40AF', border: '1px solid #BFDBFE'}}>
                                                                🔗 Cliquer
                                                              </span>
                                                            ) : (
                                                              <span className={`qg-ia-stock-pill stock-${stock.status}`} title={p.availability}>
                                                                <span className="qg-ia-stock-dot"/>
                                                                {stock.label || (p.availability ? p.availability.slice(0, 14) : '')}
                                                              </span>
                                                            )}
                                                          </div>
                                                        </div>
                                                      </a>
                                                    </td>
                                                  );
                                                })}
                                              </tr>
                                            );
                                          })}
                                        </tbody>
                                        <tfoot>
                                          <tr>
                                            <td className="qg-comp-tf-label">Total marché ≈</td>
                                            {sorted.map(s => {
                                              const aligned = alignedByStore[s.id];
                                              if (!aligned) {
                                                return <td key={s.id} className="qg-comp-tf-total"><span className="qg-comp-tf-na">—</span></td>;
                                              }
                                              // Calcule totaux min/max
                                              let totalMin = 0, totalMax = 0;
                                              aligned.forEach((p, i) => {
                                                const qty = (lines[i]?.quantite > 0) ? Number(lines[i].quantite) : 1;
                                                if (p && p.price_min && p.price_max) {
                                                  totalMin += p.price_min * qty;
                                                  totalMax += p.price_max * qty;
                                                } else if (p && p.price_eur) {
                                                  totalMin += Number(p.price_eur) * qty;
                                                  totalMax += Number(p.price_eur) * qty;
                                                }
                                              });
                                              return (
                                                <td key={s.id} className="qg-comp-tf-total">
                                                  {totalMin > 0 ? (
                                                    <React.Fragment>
                                                      <span className="qg-comp-tf-price">{Math.round(totalMin).toLocaleString('fr-FR')}-{Math.round(totalMax).toLocaleString('fr-FR')} €</span>
                                                      <span className="qg-comp-tf-info">📍 {s.distance.toFixed(1)} km · à vérifier</span>
                                                    </React.Fragment>
                                                  ) : (
                                                    <span className="qg-comp-tf-na">—</span>
                                                  )}
                                                </td>
                                              );
                                            })}
                                          </tr>
                                        </tfoot>
                                      </table>
                                    </div>

                                    {anyLoading && (
                                      <div className="qg-comp-loading">
                                        <span className="qg-stores-spinner"/>
                                        <span>Génération des liens magasins…</span>
                                      </div>
                                    )}
                                  </div>
                                )}

                                {/* === Ancien grid 3 cards : caché en mode comparateur, mais on garde le wrapper pour les états init === */}
                                <div className="qg-stores-grid" style={{display: 'none'}}>
                                  {sorted.map(s => {
                                    const b = BRAND_INFO_DB[s.brand];
                                    const stats = storeStats[s.id];
                                    const isBest = bestStoreId === String(s.id);
                                    return (
                                      <div key={s.id} className={`qg-store-card ${isBest ? 'is-best' : ''}`}>
                                        {isBest && <div className="qg-store-best-badge">⭐ MEILLEUR CHOIX</div>}
                                        <div className="qg-store-card-head">
                                          <div>
                                            <span className="qg-store-pill" style={{background: b.color, color: b.textColor}}>{b.label}</span>
                                            <div className="qg-store-name">{s.name}</div>
                                            <div className="qg-store-addr">{s.addr}</div>
                                          </div>
                                          <div className="qg-store-dist">
                                            <div className="km">{s.distance.toFixed(1)}</div>
                                            <div className="lbl">km</div>
                                          </div>
                                        </div>

                                        {/* Stats compactes après recherche IA */}
                                        {stats && (
                                          <div className="qg-store-stats">
                                            <div className="qg-store-stat">
                                              <span className="qg-store-stat-dot stock-ok">🟢</span>
                                              <span className="qg-store-stat-val">{stats.inStock}</span>
                                              <span className="qg-store-stat-lbl">en stock</span>
                                            </div>
                                            <div className="qg-store-stat">
                                              <span className="qg-store-stat-val">{stats.found}/{lines.length}</span>
                                              <span className="qg-store-stat-lbl">trouvés</span>
                                            </div>
                                            {stats.total > 0 && (
                                              <div className="qg-store-stat">
                                                <span className="qg-store-stat-val">≈ {Math.round(stats.total).toLocaleString('fr-FR')} €</span>
                                                <span className="qg-store-stat-lbl">total estimé</span>
                                              </div>
                                            )}
                                          </div>
                                        )}

                                        {/* === IA PRODUCT FINDER (seule source de vérité) === */}
                                        {!iaStoreResults.has(s.id) && !iaStoreLoading.has(s.id) && (
                                          <button type="button" className="qg-ia-find-btn" onClick={() => fetchIAProductsForStore(s, lines)}>
                                            <span className="qg-ia-star">✨</span>
                                            <span>Chercher les {lines.length} produit{lines.length > 1 ? 's' : ''} du devis chez {b.label}</span>
                                          </button>
                                        )}
                                  {iaStoreLoading.has(s.id) && (
                                    <div className="qg-ia-loading-row">
                                      <div className="qg-stores-spinner"/>
                                      <span>L'IA cherche les fiches produits chez {b.label}…</span>
                                    </div>
                                  )}
                                  {iaStoreError.has(s.id) && (
                                    <div className="qg-ia-error-row">⚠️ {iaStoreError.get(s.id)}</div>
                                  )}
                                  {iaStoreResults.has(s.id) && (() => {
                                    const iaResults = iaStoreResults.get(s.id);
                                    // Construit un tableau aligné avec les lignes du devis :
                                    // si Gemini a sauté des lignes, on génère des entrées "fallback Google"
                                    const aligned = lines.map((line, idx) => {
                                      const found = iaResults.find(r =>
                                        (r.index === idx + 1) ||
                                        (r.query_devis && line.designation && r.query_devis.includes(line.designation.slice(0, 30)))
                                      ) || iaResults[idx];
                                      if (found) return found;
                                      const term = searchTermFromDesignation(line.designation);
                                      return {
                                        query_devis: line.designation,
                                        found: false,
                                        store_name: null,
                                        product_name: line.designation,
                                        url: `https://www.google.com/search?q=${encodeURIComponent(term + ' "' + b.label + '"')}&hl=fr`,
                                        price_eur: null,
                                        availability: 'À chercher manuellement',
                                        image_url: null,
                                        _isFallback: true
                                      };
                                    });
                                    const realCount = aligned.filter(r => !r._isFallback).length;
                                    return (
                                    <div className="qg-ia-results">
                                      <div className="qg-ia-results-header">
                                        <span className="qg-ia-results-label">
                                          ✨ Vérifié par l'IA · {b.label}
                                          {realCount < aligned.length && (
                                            <span className="qg-ia-count-note"> ({realCount}/{aligned.length} trouvés)</span>
                                          )}
                                        </span>
                                        <button type="button" className="qg-ia-refresh" onClick={() => fetchIAProductsForStore(s, lines)} title="Relancer la recherche">↻</button>
                                      </div>
                                      {aligned.map((p, i) => {
                                        // Stratégie 0% 404 : toujours passer par Google search restreint au domaine du magasin.
                                        // Le 1er résultat organique sera la vraie fiche produit (Google l'a indexée).
                                        // On garde Gemini pour le NOM et le PRIX (fiables), pas pour l'URL (souvent hallucinée).
                                        const productName = (p.product_name || p.query_devis || '').replace(/^(?:SDB|salon|cuisine|chambres?|entr[ée]e|couloir|wc|toilettes?|pi[èe]ce|tous\s+lieux)\s*[:\-—–]\s*/i, '').trim();
                                        const fallbackTerm = searchTermFromDesignation(p.query_devis || p.product_name || '');
                                        // URL principale : recherche précise "nom du produit" restreinte au domaine du magasin
                                        // → ramène DIRECTEMENT à la fiche produit chez Leroy Merlin / Castorama / Point.P / etc.
                                        const url = `https://www.google.com/search?q=${encodeURIComponent('"' + productName.slice(0, 80) + '" site:' + b.site)}&hl=fr`;
                                        // URL fallback (loupe à droite) : recherche plus large sans quotes (au cas où la précise renvoie vide)
                                        const fallbackUrl = `https://www.google.com/search?q=${encodeURIComponent(fallbackTerm + ' ' + b.label)}&hl=fr`;
                                        const isExactStore = !p.store_name || p.store_name.toLowerCase().includes(b.label.toLowerCase().split(' ')[0]);
                                        return (
                                          <div key={i} className={`qg-ia-product-row-wrap ${!p.found ? 'fallback' : ''}`}>
                                            <a href={url} target="_blank" rel="noopener noreferrer"
                                               className="qg-ia-product-row"
                                               title={`Voir ${p.product_name || p.query_devis} sur ${p.store_name || b.label}`}>
                                              {p.image_url && /^https?:\/\//.test(p.image_url) && (
                                                <img src={p.image_url} alt="" className="qg-ia-product-img" onError={(e) => { e.target.style.display = 'none'; }}/>
                                              )}
                                              <div className="qg-ia-product-text">
                                                <div className="qg-ia-product-name">{p.product_name || p.query_devis || 'Produit'}</div>
                                                <div className="qg-ia-product-meta">
                                                  {!isExactStore && p.store_name && (
                                                    <span className="qg-ia-other-store">📍 {p.store_name}</span>
                                                  )}
                                                  {p.availability && (() => {
                                                    const stock = parseStockStatus(p.availability);
                                                    return (
                                                      <span className={`qg-ia-stock-pill stock-${stock.status}`} title={p.availability}>
                                                        <span className="qg-ia-stock-dot"/>
                                                        {stock.label || p.availability}
                                                      </span>
                                                    );
                                                  })()}
                                                </div>
                                              </div>
                                              {p.price_eur != null && Number(p.price_eur) > 0 ? (
                                                <div className="qg-ia-product-price">{Number(p.price_eur).toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })} €</div>
                                              ) : (
                                                <div className="qg-ia-product-price-na">Voir prix</div>
                                              )}
                                              <svg className="qg-ia-product-arrow" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2">
                                                <polyline points="9 6 15 12 9 18"/>
                                              </svg>
                                            </a>
                                            {/* Bouton fallback : si le lien IA est cassé, ouvre une recherche Google de secours */}
                                            <a className="qg-ia-fallback-btn"
                                               href={fallbackUrl}
                                               target="_blank" rel="noopener noreferrer"
                                               title="Lien cassé ? Cherche sur Google une alternative">
                                              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                                <circle cx="11" cy="11" r="7"/>
                                                <line x1="21" y1="21" x2="16.5" y2="16.5"/>
                                              </svg>
                                            </a>
                                          </div>
                                        );
                                      })}
                                    </div>
                                    );
                                  })()}
                                        <div className="qg-store-actions">
                                          <a href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.addr)}`} target="_blank" rel="noopener">🗺️ Itinéraire</a>
                                          <a href={`https://www.${b.site}`} target="_blank" rel="noopener">🌐 Site</a>
                                        </div>
                                      </div>
                                    );
                                  })}
                                </div>
                              </React.Fragment>
                            );
                          })()}
                        </React.Fragment>
                      );
                    })()}
                  </div>
                )}
              </div>
            </React.Fragment>
          );
        })()}

        {result && (mode !== 'expert' || !expertResult) && (
          <React.Fragment>
            {/* Template selector aussi en Mode rapide */}
            <div className="qg-tpl-selector no-print">
              <span className="qg-tpl-label">🎨 Style du devis</span>
              {[
                { id: 'classique', label: 'Classique', swatch: '#0A0A0A' },
                { id: 'moderne',   label: 'Moderne',   swatch: '#06b6d4' },
                { id: 'elegant',   label: 'Élégant',   swatch: '#b45309' },
                { id: 'nature',    label: 'Nature',    swatch: '#10b981' }
              ].map(t => (
                <button key={t.id} type="button"
                  className={`qg-tpl-btn ${expertTemplate === t.id ? 'active' : ''}`}
                  onClick={() => setExpertTemplate(t.id)}>
                  <span className="qg-tpl-swatch" style={{background: t.swatch}}/>
                  {t.label}
                </button>
              ))}
            </div>
            {mode === 'rapide' && parsedLines.length > 0 && (
              <div className="qg-lines-edit no-print">
                <div className="qg-lines-edit-header">
                  <span className="qg-lines-edit-title">📋 Lignes du devis</span>
                  <span className="qg-lines-edit-hint">Clique <strong>×</strong> pour retirer une ligne mal interprétée</span>
                </div>
                <ul className="qg-lines-edit-list">
                  {parsedLines.map((l, idx) => (
                    <li key={`${l.raw}-${idx}`} className="qg-line-edit">
                      <button
                        type="button"
                        className="qg-line-del"
                        onClick={() => removeLine(idx)}
                        aria-label={`Supprimer la ligne ${idx + 1}`}
                        title="Supprimer cette ligne"
                      >×</button>
                      <span className="qg-line-desc">{l.description}</span>
                      <span className="qg-line-detail">
                        {fmtQty(l.quantity)} {l.unit} × {fmtEUR(l.unitPrice)} = <strong>{fmtEUR(l.total)}</strong>
                      </span>
                    </li>
                  ))}
                </ul>
              </div>
            )}
            <div className={`qg-result qg-tpl-${expertTemplate}`} dangerouslySetInnerHTML={{ __html: renderedHtml }}/>
          </React.Fragment>

// ─── Composant OtpInput : cases pour saisir un code de vérification ───
// Navigation auto (taper passe à la case suivante, backspace revient en arrière),
// paste accepté (colle un code d'un coup). length = 8 (Supabase envoie 8 chiffres).
function OtpInput({ value, onChange, onComplete, disabled, length = 8 }) {
  const refs = React.useRef([]);
  const chars = (value || '').split('').concat(Array(length).fill('')).slice(0, length);

  const setCharAt = (i, ch) => {
    const arr = chars.slice();
    arr[i] = ch;
    const next = arr.join('').slice(0, length);
    onChange(next);
    if (next.length === length && onComplete) onComplete(next);
  };

  const handleInput = (i, e) => {
    const v = (e.target.value || '').replace(/\D/g, ''); // chiffres seulement
    if (!v) { setCharAt(i, ''); return; }
    if (v.length === 1) {
      setCharAt(i, v);
      if (i < length - 1) refs.current[i + 1]?.focus();
    } else {
      // L'utilisateur a tapé/collé plusieurs chiffres d'un coup → répartir
      const newValue = (value || '').slice(0, i) + v;
      onChange(newValue.slice(0, length));
      const focusIdx = Math.min(i + v.length, length - 1);
      setTimeout(() => refs.current[focusIdx]?.focus(), 0);
      if (newValue.length >= length && onComplete) onComplete(newValue.slice(0, length));
    }
  };

  const handleKeyDown = (i, e) => {
    if (e.key === 'Backspace') {
      if (!chars[i] && i > 0) {
        // case vide → backspace remonte d'une case
        refs.current[i - 1]?.focus();
        setCharAt(i - 1, '');
        e.preventDefault();
      } else if (chars[i]) {
        setCharAt(i, '');
        e.preventDefault();
      }
    } else if (e.key === 'ArrowLeft' && i > 0) {
      refs.current[i - 1]?.focus();
    } else if (e.key === 'ArrowRight' && i < length - 1) {
      refs.current[i + 1]?.focus();
    }
  };

  const handlePaste = (e) => {
    e.preventDefault();
    const txt = (e.clipboardData?.getData('text') || '').replace(/\D/g, '').slice(0, length);
    if (!txt) return;
    onChange(txt);
    setTimeout(() => refs.current[Math.min(txt.length, length - 1)]?.focus(), 0);
    if (txt.length >= length && onComplete) onComplete(txt);
  };

  return (
    <div className="otp-wrap">
      {Array.from({ length }).map((_, i) => (
        <input
          key={i}
          ref={el => refs.current[i] = el}
          type="text"
          inputMode="numeric"
          autoComplete="one-time-code"
          maxLength={1}
          value={chars[i] || ''}
          disabled={disabled}
          onChange={e => handleInput(i, e)}
          onKeyDown={e => handleKeyDown(i, e)}
          onPaste={i === 0 ? handlePaste : undefined}
          onFocus={e => e.target.select()}
          className="otp-input"
          autoFocus={i === 0}
        />
      ))}
    </div>
  );
}

                    <span className="ic">

                <div className="af-input-group">
                  <span className="ic">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M4 6h16v12H4z"/><path d="m4 7 8 6 8-6"/></svg>
                  </span>
                  <input type="email" placeholder="Adresse email" value={su.email} onChange={(e) => setSu({...su, email: e.target.value})} required/>

                <div className="af-input-group">
                  <span className="ic">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
                  </span>

                <div className={"af-input-group " + (!su.company && error.includes('entreprise') ? 'error' : '')}>

                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                  </span>
                  <input type="text" placeholder="Nom de mon entreprise" value={su.company} onChange={(e) => setSu({...su, company: e.target.value})} required/>
                </div>
                <div className="af-input-group">
                  <span className="ic">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M14 5l3 3-9 9-3 3v-3l9-9z"/><path d="M2 22h20"/></svg>
                  </span>
                  <select value={su.metier} onChange={(e) => setSu({...su, metier: e.target.value})} required style={{paddingLeft:42, appearance:'none', backgroundImage:'none', cursor:'pointer'}}>
